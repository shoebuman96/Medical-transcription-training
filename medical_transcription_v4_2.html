de:`<h1>Allergien</h1><p class="subtitle">Korrekte Allergie-Dokumentation ist eine Patientensicherheitspflicht. Unerwünschte Arzneimittelwirkungen sind in D dem BfArM, in A der AGES zu melden.</p>
<h2>Allergie vs. Unverträglichkeit vs. UAW</h2>
<table><tr><th>Typ</th><th>Mechanismus</th><th>Beispiel</th><th>Dokumentation</th></tr>
<tr><td><strong>Echte Allergie (IgE-vermittelt)</strong></td><td>Immunreaktion — IgE-Antikörper</td><td>Anaphylaxie nach Penicillin</td><td>ALLERGIE — genaue Reaktion angeben</td></tr>
<tr><td><strong>Nicht-IgE-Immunreaktion</strong></td><td>T-Zell- / Immunkomplex-vermittelt</td><td>SJS, DRESS, Serumkrankheit</td><td>ALLERGIE — genaue Reaktion angeben</td></tr>
<tr><td><strong>Intoleranz</strong></td><td>Pharmakologisch, nicht immunologisch</td><td>Reizhusten unter ACE-Hemmer</td><td>UNVERTRÄGLICHKEIT oder UAW</td></tr>
<tr><td><strong>Pseudoallergie</strong></td><td>Nicht-immunologische Mastzellaktivierung</td><td>Aspirin-induzierte Urtikaria</td><td>ÜBEREMPFINDLICHKEIT (nicht-allergisch)</td></tr></table>
<div class="alert-box"><strong>Niemals umklassifizieren:</strong> Immer genau so transkribieren, wie diktiert. UAW sind in Deutschland dem BfArM (Bundesinstitut für Arzneimittel und Medizinprodukte) zu melden, in Österreich der AGES.</div>
<h2>Reaktionsschwere (D/A — nach EAACI/Ring &amp; Messmer)</h2>
<table><tr><th>Grad</th><th>Ausprägung</th><th>Klinische Merkmale</th></tr>
<tr><td><strong>I — Leicht</strong></td><td>Haut / Schleimhaut</td><td>Urtikaria, Flush, Angioödem</td></tr>
<tr><td><strong>II — Mittelgradig</strong></td><td>Multiorgan, nicht lebensbedrohlich</td><td>Tachykardie, Hypotonie, Übelkeit, Dyspnoe</td></tr>
<tr><td><strong>III — Schwer</strong></td><td>Lebensbedrohlich</td><td>Bronchospasmus, Schock, Bewusstseinsstörung</td></tr>
<tr><td><strong>IV — Vital bedrohlich</strong></td><td>Herz-Kreislauf-Stillstand</td><td>Atemstillstand, Herzstillstand</td></tr></table>
<h2>Anaphylaxie — AWMF-Leitlinie (D/A)</h2>
<div class="info-card"><p><strong>Klinische Trias:</strong> (1) Atemwege — Stridor, Angioödem; (2) Atmung — Giemen, SpO₂-Abfall; (3) Kreislauf — Hypotonie, Tachykardie, Schock. <strong>Soforttherapie (AWMF-Leitlinie Anaphylaxie):</strong> Adrenalin i.m. 0,5 mg (Erwachsener) in den Oberschenkel-Anterolateralbereich. Wiederholung nach 5 min bei fehlendem Ansprechen. Notarzt (112 in D/A). High-Flow-Sauerstoff. Volumenersatz: NaCl 0,9% 500–1000 ml i.v. Kortikosteroide + Antihistaminika als Adjuvanzien.</p></div>
<h2>Allergie-Abkürzungen (D/A)</h2>
<table><tr><th>Abk.</th><th>Bedeutung</th></tr>
<tr><td><strong>NKDA</strong></td><td>Keine bekannten Medikamentenallergien</td></tr>
<tr><td><strong>keine bekannten Allergien / KBA</strong></td><td>Keine bekannten Allergien</td></tr>
<tr><td><strong>UAW</strong></td><td>Unerwünschte Arzneimittelwirkung</td></tr>
<tr><td><strong>SJS</strong></td><td>Stevens-Johnson-Syndrom</td></tr>
<tr><td><strong>DRESS</strong></td><td>Drug Reaction with Eosinophilia and Systemic Symptoms</td></tr>
<tr><td><strong>TEN</strong></td><td>Toxische epidermale Nekrolyse</td></tr>
<tr><td><strong>BfArM</strong></td><td>Bundesinstitut für Arzneimittel und Medizinprodukte (UAW-Meldung D)</td></tr>
<tr><td><strong>AGES</strong></td><td>Agentur für Gesundheit und Ernährungssicherheit (UAW-Meldung A)</td></tr></table>
<h2>Hochrisiko-Allergene und Kreuzreaktivität</h2>
<table><tr><th>Gruppe</th><th>Beispiele (Rote Liste D / Austria Codex)</th><th>Kreuzreaktivitätshinweis</th></tr>
<tr><td>Beta-Laktam-Antibiotika</td><td>Penicillin V, Amoxicillin, Amoxicillin/Clavulansäure, Cefalexin, Cefuroxim, Meropenem</td><td>~1–2% Kreuzreaktivität Penicilline ↔ Cephalosporine. Spezifisches Präparat immer angeben — "Penicillinallergie" ist nicht automatisch eine Klassenallergie.</td></tr>
<tr><td>NSAR</td><td>ASS, Ibuprofen (Nurofen), Diclofenac (Voltaren), Naproxen, Celecoxib (Celebrex)</td><td>Häufige Kreuzreaktivität (COX-1-Hemmung). Celecoxib (COX-2-selektiv) wird gelegentlich toleriert — allergologische Abklärung.</td></tr>
<tr><td>Sulfonamide</td><td>Cotrimoxazol (Bactrim), Furosemid (partiell)</td><td>Sulfonamid-Antibiotika ≠ Nicht-Antibiotika-Sulfonamide allergologisch.</td></tr>
<tr><td>Kontrastmittel</td><td>Jodhaltiges KM (CT, Angio), Gadolinium (MRT)</td><td>Prämedikation nach lokaler Radiologieprotokoll (Kortikosteroide + Antihistaminika).</td></tr>
<tr><td>Latex</td><td>OP-Handschuhe, Katheter, i.v.-Ports</td><td>Latex-Frucht-Syndrom: Banane, Avocado, Kiwi. DGAKI-Leitlinie: latexarme Umgebung für Latex-Allergiker.</td></tr>
<tr><td>Nahrungsmittel</td><td>Erdnüsse, Baumnüsse, Schalentiere, Fisch, Milch, Ei, Weizen, Soja, Sesam</td><td>EU-Lebensmittelinformations-VO (LMIV): 14 deklarationspflichtige Allergene. Genaue Nussart immer angeben.</td></tr>
<tr><td>ACE-Hemmer</td><td>Ramipril (Delix/Tritace), Lisinopril, Enalapril (Xanef/Renitec)</td><td>Angioödem (Bradykinin-vermittelt, nicht IgE). Kann Monate bis Jahre nach Therapiebeginn auftreten. Erhöhtes Risiko bei Patienten mit afrikanischer Herkunft.</td></tr>
<tr><td>Muskelrelaxanzien</td><td>Succinylcholin, Rocuronium, Atracurium, Vecuronium, Cisatracurium</td><td>Hohes Anaphylaxierisiko im OP (DGAI-Empfehlung). Immer im Anästhesieprotokoll vermerken.</td></tr></table>
<h2>Kutane Arzneimittelreaktionen — Typen und Zeitverlauf</h2>
<table><tr><th>Reaktion</th><th>Beschreibung</th><th>Zeitverlauf</th></tr>
<tr><td><strong>Urtikaria</strong></td><td>Erhabene Quaddeln — blasses Zentrum, roter Hof</td><td>Minuten bis Stunden</td></tr>
<tr><td><strong>Angioödem</strong></td><td>Tiefe Gewebeschwellung — Gesicht, Zunge, Larynx</td><td>Minuten bis Stunden</td></tr>
<tr><td><strong>Makulopapulöses Exanthem</strong></td><td>Häufigste Arzneimittelreaktion — verbreiteter flach-erhabener Ausschlag</td><td>Tage 1–2 nach Beginn</td></tr>
<tr><td><strong>SJS</strong></td><td>Schleimhauterosionen + Hautblasen (&lt;10% KOF)</td><td>Tage 1–3 nach Beginn</td></tr>
<tr><td><strong>TEN</strong></td><td>Schleimhauterosionen + Hautablösung (&gt;30% KOF) — Notfall</td><td>Tage 1–3 nach Beginn</td></tr>
<tr><td><strong>DRESS</strong></td><td>Fieber, Lymphadenopathie, Gesichtsschwellung, Exanthem, Eosinophilie, Organbeteiligung</td><td>2–8 Wochen nach Beginn</td></tr>
<tr><td><strong>Kontaktdermatitis</strong></td><td>Lokalisiertes Ekzem an Kontaktstelle</td><td>24–72 Stunden (Typ IV, verzögert)</td></tr></table>
<div class="tip-box"><strong>D/A-Dokumentationsstandard:</strong> Angabe von: (1) vollständiger Wirkstoffname (Rote Liste/Austria Codex bevorzugt); (2) genaue Reaktion; (3) Schweregrad; (4) Datum falls bekannt; (5) bestätigt (z.B. Prick-Test, RAST, Provokation) oder Verdacht. Beispiel: "Penicillin V — Anaphylaxie 2019, allergologisch gesichert (USZ)."</div>

nl:`<h1>Allergieën</h1><p class="subtitle">Een allergie is een immuunreactie op een onschuldige stof, terwijl een intolerantie een verteringsprobleem is zonder betrokkenheid van het immuunsysteem. Nauwkeurige allergie-documentatie is een patiëntveiligheidsplicht.</p>
<h2>Allergie vs. intolerantie vs. ongewenste bijwerking</h2>
<table><tr><th>Type</th><th>Mechanisme</th><th>Voorbeeld</th><th>Documenteer als</th></tr>
<tr><td><strong>Echte allergie (IgE-gemedieerd)</strong></td><td>Immuun — IgE-antilichaamvorming</td><td>Anafylaxie na penicilline</td><td>ALLERGIE — exacte reactie specificeren</td></tr>
<tr><td><strong>Niet-IgE immuunreactie</strong></td><td>T-cel / immuuncomplex</td><td>SJS, DRESS, serumziekte</td><td>ALLERGIE — exacte reactie specificeren</td></tr>
<tr><td><strong>Intolerantie</strong></td><td>Farmacologisch, niet-immunologisch</td><td>Droge hoest bij ACE-remmer</td><td>INTOLERANTIE of BIJWERKING</td></tr>
<tr><td><strong>Pseudo-allergie</strong></td><td>Niet-immunologische mestcelactivatie</td><td>Aspirine-geïnduceerde urticaria</td><td>OVERGEVOELIGHEID (niet-allergisch)</td></tr></table>
<div class="alert-box"><strong>Nooit herclassificeren:</strong> Altijd precies transcriberen wat gedicteerd wordt. Het onderscheid allergie/intolerantie bepaalt of alternatieven veilig kunnen worden voorgeschreven. Lareb (Nederlands bijwerkingencentrum) is vermeld onder Afkortingen.</div>
<h2>Ernst van de reactie (NL — conform EAACI/Ring &amp; Messmer)</h2>
<table><tr><th>Graad</th><th>Uiting</th><th>Klinische kenmerken</th></tr>
<tr><td><strong>I — Mild</strong></td><td>Huid / slijmvliezen</td><td>Urticaria, flush, angio-oedeem</td></tr>
<tr><td><strong>II — Matig</strong></td><td>Multiorgan, niet-levensbedreigend</td><td>Tachycardie, hypotensie, misselijkheid, dyspneu</td></tr>
<tr><td><strong>III — Ernstig</strong></td><td>Levensbedreigend</td><td>Bronchospasme, shock, bewustzijnsdaling</td></tr>
<tr><td><strong>IV — Vitaal bedreigend</strong></td><td>Hart-ademstilstand</td><td>Ademstilstand, hartstilstand</td></tr></table>
<h2>Anafylaxie — NVvA/ERC-richtlijn (NL)</h2>
<div class="info-card"><p><strong>Klinische triade:</strong> (1) Luchtwegen — stridor, angio-oedeem; (2) Ademhaling — wheeze, SpO&#8322;-daling; (3) Circulatie — hypotensie, tachycardie, collaps. <strong>Eerste lijn (ERC/NVvA):</strong> Adrenaline i.m. 0,5 mg in anterolateraal bovenbeen. Herhalen na 5 min bij geen respons. Bel 112. Zuurstof hoog-flow. Infuus NaCl 0,9% 500–1000 mL. Clemastine + dexamethason als adjuvantia.</p></div>
<h2>Allergie-afkortingen (NL)</h2>
<table><tr><th>Afk.</th><th>Betekenis</th></tr>
<tr><td><strong>NKDA</strong></td><td>Geen bekende medicatie-allergieën</td></tr>
<tr><td><strong>geen bekende allergieën</strong></td><td>Geen bekende allergieën</td></tr>
<tr><td><strong>ADR / bijwerking</strong></td><td>Adverse drug reaction / ongewenste bijwerking</td></tr>
<tr><td><strong>SJS</strong></td><td>Stevens-Johnson-syndroom</td></tr>
<tr><td><strong>DRESS</strong></td><td>Drug Reaction with Eosinophilia and Systemic Symptoms</td></tr>
<tr><td><strong>TEN</strong></td><td>Toxische epidermale necrolyse</td></tr>
<tr><td><strong>Lareb</strong></td><td>Nederlands bijwerkingencentrum (meldpunt bijwerkingen)</td></tr></table>
<h2>Hoog-risico allergenen en kruisreactiviteit (NL)</h2>
<table><tr><th>Groep</th><th>Voorbeelden (G-Standaard)</th><th>Kruisreactiviteit</th></tr>
<tr><td>Bèta-lactam antibiotica</td><td>Penicilline V, Amoxicilline, Co-amoxiclav, Cefalexine, Cefuroxim, Meropenem</td><td>~1–2% kruisreactiviteit penicillines ↔ cefalosporinen. Specifiek middel altijd vermelden.</td></tr>
<tr><td>NSAID's</td><td>Aspirine (Aspirine Cardio), Ibuprofen (Brufen), Diclofenac (Voltaren), Naproxen (Aleve), Celecoxib (Celebrex)</td><td>Frequente kruisreactiviteit (COX-1-remming). Celecoxib (COX-2-selectief) soms getolereerd — allergologisch oordeel.</td></tr>
<tr><td>Sulfonamiden</td><td>Co-trimoxazol (Bactrim), Furosemide (partieel)</td><td>Antibiotische sulfonamiden ≠ niet-antibiotische sulfonamiden.</td></tr>
<tr><td>Contrastmiddelen</td><td>Jodiumhoudend KM (CT), gadolinium (MRI)</td><td>Premedicatie per lokaal radiologieprotocol (dexamethason + clemastine of antihistaminica).</td></tr>
<tr><td>Latex</td><td>Chirurgische handschoenen, katheters, i.v.-poorten</td><td>Latex-fruitsyndroom: banaan, avocado, kiwi. NVVAA-richtlijn: latexarm milieu bij latexallergie.</td></tr>
<tr><td>Voedsel</td><td>Pinda's, bosnoten, schaal-/schelpdieren, vis, melk, ei, tarwe, soja, sesamzaad</td><td>EU-levensmiddeleninformatieverordening: 14 verplicht te declareren allergenen. Altijd specifiek noottype vermelden.</td></tr>
<tr><td>ACE-remmers</td><td>Ramipril (Tritace), Lisinopril (Zestril), Enalapril (Renitec)</td><td>Bradykinine-gemedieerd angio-oedeem (niet-IgE). Kan maanden tot jaren na start optreden. Hoger risico bij patiënten van Afrikaanse afkomst.</td></tr>
<tr><td>Spierverslappers</td><td>Suxamethonium, Rocuronium, Atracurium, Vecuronium, Cisatracurium</td><td>Hoog anafylaxierisico op de OK (NVA-richtlijn). Altijd vermelden in het anesthesiedossier.</td></tr></table>
<h2>Huidreacties op geneesmiddelen</h2>
<table><tr><th>Reactie</th><th>Beschrijving</th><th>Tijdsbeloop</th></tr>
<tr><td><strong>Urticaria</strong></td><td>Verheven bultjes — bleke kern, rode halo</td><td>Minuten tot uren</td></tr>
<tr><td><strong>Angio-oedeem</strong></td><td>Diepe weefstelzwelling — gezicht, tong, larynx</td><td>Minuten tot uren</td></tr>
<tr><td><strong>Maculo-papuleus exantheem</strong></td><td>Meest voorkomende geneesmiddeluitslag</td><td>Dag 1–2 na start</td></tr>
<tr><td><strong>SJS</strong></td><td>Erosies slijmvliezen + huidblaren (&lt;10% KOO)</td><td>Dag 1–3 na start</td></tr>
<tr><td><strong>TEN</strong></td><td>Erosies + loslaten huid (&gt;30% KOO) — spoed</td><td>Dag 1–3 na start</td></tr>
<tr><td><strong>DRESS</strong></td><td>Koorts, lymfadenopathie, uitslag, eosinofilie, orgaanschade</td><td>2–8 weken na start</td></tr>
<tr><td><strong>Contactdermatitis</strong></td><td>Gelokaliseerd eczeem ter hoogte van contact</td><td>24–72 uur (type IV vertraagd)</td></tr></table>
<div class="tip-box"><strong>NL documentatiestandaard:</strong> Vermeld: (1) volledige stofnaam (G-Standaard voorkeur); (2) exacte reactie; (3) ernst; (4) datum indien bekend; (5) bevestigd (bijv. priktest, RAST, provocatie) of verdacht. Voorbeeld: "Penicilline — anafylaxie 2019, bevestigd door allergoloog (UMCG)."</div>
<h2>Korte quiz</h2>`,

fr:`<h1>Allergies</h1><p class="subtitle">L'exactitude de la documentation des allergies est une obligation de sécurité. Les EIG/EIM doivent être déclarés à l'ANSM et aux CRPV (Centres Régionaux de Pharmacovigilance).</p>
<h2>Allergie vs intolérance vs effet indésirable médicamenteux</h2>
<table><tr><th>Type</th><th>Mécanisme</th><th>Exemple</th><th>Documenter comme</th></tr>
<tr><td><strong>Vraie allergie (médiée par IgE)</strong></td><td>Immunitaire — IgE</td><td>Anaphylaxie à la pénicilline</td><td>ALLERGIE — préciser la réaction exacte</td></tr>
<tr><td><strong>Réaction immune non-IgE</strong></td><td>Lymphocytes T / complexes immuns</td><td>SJS, DRESS, maladie sérique</td><td>ALLERGIE — préciser la réaction exacte</td></tr>
<tr><td><strong>Intolérance</strong></td><td>Pharmacologique, non immune</td><td>Toux sous IEC, nausées sous codéine</td><td>INTOLÉRANCE ou EFFET INDÉSIRABLE</td></tr>
<tr><td><strong>Pseudo-allergie</strong></td><td>Activation mastocytaire non immune</td><td>Urticaire induite par l'aspirine</td><td>HYPERSENSIBILITÉ (non allergique)</td></tr></table>
<div class="alert-box"><strong>Ne jamais reclassifier:</strong> Toujours transcrire exactement ce qui est dicté. Tout effet indésirable grave (EIG) doit être déclaré à l'<strong>ANSM</strong> et au CRPV régional. La distinction allergie/intolérance détermine la possibilité de prescription d'alternatives.</div>
<h2>Sévérité des réactions (France — classification SFAR/EAACI Ring &amp; Messmer)</h2>
<table><tr><th>Grade</th><th>Manifestation</th><th>Caractéristiques cliniques</th></tr>
<tr><td><strong>I — Légère</strong></td><td>Cutanée/muqueuse</td><td>Urticaire, flush, angio-œdème</td></tr>
<tr><td><strong>II — Modérée</strong></td><td>Multiviscérale, non mortelle</td><td>Tachycardie, hypotension, nausées, dyspnée</td></tr>
<tr><td><strong>III — Sévère</strong></td><td>Menaçant le pronostic vital</td><td>Bronchospasme, choc, trouble de conscience</td></tr>
<tr><td><strong>IV — Arrêt cardio-respiratoire</strong></td><td>Arrêt cardiaque/respiratoire</td><td>Arrêt respiratoire, arrêt cardiaque</td></tr></table>
<h2>Anaphylaxie — SFAR/SAMU-Urgences de France</h2>
<div class="info-card"><p><strong>Triade clinique:</strong> (1) Voies aériennes — stridor, angio-œdème; (2) Respiration — sibilances, SpO&#8322; ↓; (3) Circulation — hypotension, tachycardie, collapsus. <strong>Traitement de 1re intention (SFAR):</strong> Adrénaline IM 0,5 mg (adulte) en face antérolatérale de cuisse (auto-injecteur EpiPen ou Anapen). Répéter à 5 min si pas de réponse. Appel SAMU (15). Oxygène haut débit. Remplissage: NaCl 0,9% 500–1000 mL IV. Corticoïdes (méthylprednisolone IV) + antihistaminiques comme adjuvants.</p></div>
<h2>Abréviations allergies (France)</h2>
<table><tr><th>Abr.</th><th>Signification</th></tr>
<tr><td><strong>AUCDA / ADC</strong></td><td>Aucune allergie connue aux médicaments</td></tr>
<tr><td><strong>ATCD all. : 0</strong></td><td>Aucun antécédent allergique connu</td></tr>
<tr><td><strong>EIM / EIG</strong></td><td>Effet indésirable médicamenteux / grave</td></tr>
<tr><td><strong>SJS</strong></td><td>Syndrome de Stevens-Johnson</td></tr>
<tr><td><strong>DRESS</strong></td><td>Drug Reaction with Eosinophilia and Systemic Symptoms</td></tr>
<tr><td><strong>TEN</strong></td><td>Nécrolyse épidermique toxique (syndrome de Lyell)</td></tr>
<tr><td><strong>ANSM</strong></td><td>Agence nationale de sécurité du médicament (déclaration des EIG)</td></tr>
<tr><td><strong>CRPV</strong></td><td>Centre Régional de PharmacoVigilance</td></tr></table>
<h2>Allergènes à haut risque et réactivité croisée (France)</h2>
<table><tr><th>Groupe</th><th>Exemples Vidal (France)</th><th>Réactivité croisée</th></tr>
<tr><td>Bêta-lactamines</td><td>Pénicilline V (Oracilline), Amoxicilline (Clamoxyl), Augmentin, Céfalexine (Keforal), Céfuroxime (Zinnat), Méropénem (Méronem)</td><td>~1–2% réactivité croisée pénicillines ↔ céphalosporines. Préciser la molécule — "allergie pénicilline" n'est pas toujours un effet de classe.</td></tr>
<tr><td>AINS</td><td>Aspirine (Kardégic), Ibuprofène (Advil, Nurofen), Diclofénac (Voltarène), Naproxène (Apranax), Célécoxib (Celebrex)</td><td>Réactivité croisée fréquente (voie COX-1). Célécoxib (COX-2 sélectif) parfois toléré — avis allergologique.</td></tr>
<tr><td>Sulfamides</td><td>Cotrimoxazole (Bactrim), Furosémide (partiel)</td><td>Sulfamides antibiotiques ≠ non-antibiotiques en termes d'allergie.</td></tr>
<tr><td>Produits de contraste</td><td>PDC iodé (TDM, angiographie), gadolinium (IRM)</td><td>Prémédication selon protocole radiologique local (méthylprednisolone + anti-H1).</td></tr>
<tr><td>Latex</td><td>Gants chirurgicaux, cathéters, ports IV</td><td>Syndrome latex-fruit: banane, avocat, kiwi. SFAR: environnement sans latex pour allergiques.</td></tr>
<tr><td>Alimentaires</td><td>Cacahuètes, fruits à coque, crustacés, poisson, lait, œuf, blé, soja, sésame</td><td>Règlement INCO (UE) 1169/2011: 14 allergènes à déclaration obligatoire. Préciser le type exact.</td></tr>
<tr><td>IEC</td><td>Ramipril (Triatec), Lisinopril (Zestril), Énalapril (Renitec), Périndopril (Coversyl)</td><td>Angio-œdème médié par bradykinine (non IgE). Peut survenir des mois/années après l'introduction. Risque accru chez les patients d'origine africaine.</td></tr>
<tr><td>Curares</td><td>Suxaméthonium (Celocurine), Rocuronium (Esmeron), Atracurium (Tracrium), Vécuronium (Norcuron)</td><td>Risque élevé d'anaphylaxie peropératoire (SFAR). Toujours noter sur le dossier d'anesthésie.</td></tr></table>
<h2>Réactions cutanées médicamenteuses</h2>
<table><tr><th>Réaction</th><th>Description</th><th>Délai</th></tr>
<tr><td><strong>Urticaire</strong></td><td>Plaques surélevées — centre pâle, halo rouge</td><td>Minutes à heures</td></tr>
<tr><td><strong>Angio-œdème</strong></td><td>Gonflement profond — visage, langue, larynx</td><td>Minutes à heures</td></tr>
<tr><td><strong>Exanthème maculo-papuleux</strong></td><td>Éruption généralisée — type le plus fréquent</td><td>Jours 1–2</td></tr>
<tr><td><strong>SJS</strong></td><td>Érosions muqueuses + bulles (&lt;10% SC)</td><td>Jours 1–3</td></tr>
<tr><td><strong>TEN (Lyell)</strong></td><td>Érosions muqueuses + décollement (&gt;30% SC) — urgence</td><td>Jours 1–3</td></tr>
<tr><td><strong>DRESS</strong></td><td>Fièvre, adénopathies, œdème facial, éruption, éosinophilie, atteinte d'organe</td><td>2–8 semaines</td></tr>
<tr><td><strong>Dermatite de contact</strong></td><td>Eczéma localisé au contact</td><td>24–72 h (type IV retardé)</td></tr></table>
<div class="tip-box"><strong>Standard de documentation France (HAS):</strong> Consigner: (1) DCI (dénomination commune internationale) en priorité; (2) type exact de réaction; (3) sévérité; (4) date si connue; (5) confirmée (test cutané, ISAC, provocation) ou suspectée. Exemple: "Pénicilline V — anaphylaxie 2019, confirmée par centre d'allergologie (Hôpital Lariboisière)."</div>

const GLOSSARY_DATA={
en:[
{term:"pDMS",alt:"Peripheral neurovascular status",cat:"Orthopaedics",def:"Assessment of peripheral circulation (Durchblutung), motor function (Motorik), and sensibility (Sensibilität). Documented as 'pDMS intact bilaterally' after limb trauma or surgery.",ex:"'pDMS of both legs and feet intact.'"},
{term:"Swirl sign",alt:"",cat:"Neuroradiology",def:"CT/MRI finding: a hyperdense swirling pattern within a haematoma. Indicates active arterial bleeding and predicts haematoma expansion. Important finding in traumatic brain injury and intracerebral haemorrhage.",ex:"'CT showed a swirl sign within the left temporal haematoma.'"},
{term:"Fazekas scale",alt:"Fazekas 0–3",cat:"Neuroradiology",def:"Grading system for white matter lesions (leukoaraiosis) on MRI. Grade 0 = absent; Grade 1 = punctate; Grade 2 = beginning confluence; Grade 3 = large confluent areas. Frequently dictated as 'Fazekas 1' or 'Fazekas 2'.",ex:"'MRI brain: white matter changes Fazekas 1.'"},
{term:"White matter lesions",alt:"Wittestofafwijkingen (NL) / Weißmaterialveränderungen (DE)",cat:"Neuroradiology",def:"MRI T2-signal abnormalities in the cerebral white matter, indicating small vessel disease or demyelination. Graded using the Fazekas scale.",ex:"'Moderate wittestofafwijkingen, Fazekas 2.'"},
{term:"T2-signal",alt:"T2 hyperintensity",cat:"Radiology / MRI",def:"On T2-weighted MRI sequences, fluid and oedema appear bright (hyperintense). T2-signal changes indicate pathological processes such as inflammation, infarction, or demyelination.",ex:"'T2-signal change in the right temporal lobe.'"},
{term:"T1 (MRI sequence)",alt:"T1-weighted imaging",cat:"Radiology / MRI",def:"MRI sequence where fat appears bright and fluid appears dark. Used for anatomical detail. Contrast-enhancing lesions appear bright on T1 post-gadolinium.",ex:"'T1 post-contrast shows ring-enhancing lesion.'"},
{term:"Gamma Knife",alt:"Stereotactic radiosurgery",cat:"Neurosurgery / Radiology",def:"A focused gamma radiation device used for stereotactic radiosurgery — not a surgical scalpel. Treats brain tumours, AVMs, and acoustic neuromas with high-precision radiation without open surgery.",ex:"'Patient scheduled for Gamma Knife treatment of left acoustic neuroma.'"},
{term:"Anterolisthesis",alt:"Spondylolisthesis anterior",cat:"Neurology / Spine",def:"Forward displacement of one vertebra over the one below. Graded I–IV. Causes spinal canal narrowing and nerve root compression.",ex:"'L4 anterolisthesis grade I over L5.'"},
{term:"Parafalcine meningioma",alt:"Parafalcien meningioom (NL)",cat:"Neurology / Neuroradiology",def:"Meningioma arising adjacent to the falx cerebri (the dural fold separating the cerebral hemispheres). May cause contralateral motor or sensory deficits.",ex:"'MRI confirmed a 2 cm parafalcine meningioma on the right.'"},
{term:"Insular region",alt:"Insulaire regio (NL)",cat:"Neurology / Anatomy",def:"The insular cortex, located deep within the lateral sulcus (Sylvian fissure). Involved in taste, pain processing, and autonomic regulation. Infarcts here may cause dysarthria, dysphagia, and cardiac arrhythmias.",ex:"'DWI restriction in the left insular region consistent with acute ischaemic stroke.'"},
{term:"CMC-1 joint",alt:"Carpometacarpal joint of the thumb",cat:"Hand Surgery / Orthopaedics",def:"The first carpometacarpal joint at the base of the thumb. Site of rhizarthrosis (basal thumb osteoarthritis). Assessed with the Watson test and Durkan test.",ex:"'CMC-1 arthroplasty performed on the right thumb.'"},
{term:"TAVI",alt:"Transcatheter Aortic Valve Implantation",cat:"Cardiology / Cardiac Surgery",def:"Minimally invasive implantation of an artificial aortic valve via catheter. Alternative to open-heart surgery in high-risk patients. Also called TAVR (Transcatheter Aortic Valve Replacement).",ex:"'Patient underwent successful transfemoral TAVI.'"},
{term:"Tricuspid valve",alt:"Trikuspidalklappe (DE)",cat:"Cardiology",def:"A three-leaflet heart valve located between the right atrium and right ventricle. Prevents systolic backflow. Pathology: tricuspid regurgitation or stenosis.",ex:"'Mild tricuspid regurgitation on echocardiography.'"},
{term:"Tendinopathy",alt:"Tendopathie / Tendinopathie (DE)",cat:"Orthopaedics / Rheumatology",def:"Disease of a tendon. Encompasses tendinitis (acute inflammation) and tendinosis (chronic degeneration). Previously called tendopathy.",ex:"'Supraspinatus tendinopathy with partial thickness tear.'"},
{term:"Knee internal derangement",alt:"Kniebinnenschaden (DE)",cat:"Orthopaedics",def:"Collective term for intra-articular knee injuries affecting cruciate ligaments, menisci, cartilage, or other internal structures. May occur singly or in combination.",ex:"'MRI confirmed medial meniscus tear as part of a knee internal derangement.'"},
{term:"Varus/Valgus stress test",alt:"Varus- und Valgusstress (DE)",cat:"Orthopaedics",def:"Clinical test for lateral and medial collateral ligament stability. Valgus stress opens the medial joint space; varus stress opens the lateral joint space.",ex:"'Knee stable under varus and valgus stress in 0°, 30° and 90°.'"},
{term:"Skier's thumb",alt:"Skidaumen (DE) / Gamekeeper's thumb",cat:"Hand Surgery",def:"Rupture of the ulnar collateral ligament of the thumb MCP joint. Common in skiing and ball sports. Requires surgical repair if complete.",ex:"'X-ray and stress test confirmed skier\'s thumb with complete UCL rupture.'"},
{term:"A1 pulley",alt:"Pulley A1",cat:"Hand Surgery",def:"The first annular pulley of the flexor tendon sheath, located at the MCP joint. Site of stenosing tenosynovitis ('trigger finger'). Treated by percutaneous or open release.",ex:"'A1 pulley release performed for trigger index finger.'"},
{term:"Baker's cyst",alt:"Bakerscyste (NL) / Poplitealzyste (DE)",cat:"Orthopaedics / Rheumatology",def:"Synovial cyst arising in the popliteal fossa, often associated with knee pathology (meniscus tear, osteoarthritis). May rupture causing calf swelling mimicking DVT.",ex:"'Ultrasound confirmed a Baker\'s cyst in the right popliteal fossa.'"},
{term:"Carpal tunnel syndrome",alt:"Carpaaltunnelsyndroom (NL) / Karpaltunnelsyndrom (DE)",cat:"Hand Surgery / Neurology",def:"Compression of the median nerve within the carpal tunnel. Symptoms: nocturnal paraesthesia in the thumb, index, and middle fingers. Confirmed by nerve conduction studies or Durkan test.",ex:"'Bilateral carpal tunnel syndrome confirmed on NCS.'"},
{term:"FKDS",alt:"Farbkodierte Dopplersonografie (DE)",cat:"Radiology / Vascular",def:"Colour-coded Doppler ultrasound — combines B-mode ultrasound with colour-coded flow mapping. Used for vascular assessment of arteries and veins.",ex:"'FKDS showed stenosis of the right superficial femoral artery.'"},
{term:"Aortic bifurcation prosthesis",alt:"Aortabroekprothese (NL) / Aortenbifurkationsprothese (DE)",cat:"Vascular Surgery",def:"Y-shaped vascular graft replacing the aortic bifurcation and both iliac arteries. Used for aortoiliac occlusive disease or aneurysm. The term 'broekprothese' (trouser prosthesis) refers to its shape.",ex:"'Patient with previously placed aortic bifurcation prosthesis presented for follow-up.'"},
{term:"AFS (Arteria femoralis superficialis)",alt:"Superficial femoral artery",cat:"Vascular Surgery",def:"The continuation of the common femoral artery in the thigh. Most commonly affected by peripheral arterial disease. Site of stenting and endarterectomy.",ex:"'Occlusion of the right AFS with collateral reconstitution distally.'"},
{term:"Kidney-to-background ratio",alt:"Nier-achtergrond-ratio (NL)",cat:"Nuclear Medicine",def:"A ratio used in nuclear medicine (renal scintigraphy) to quantify renal uptake relative to background activity. Used in assessment of renal function and obstruction.",ex:"'Nier-achtergrond-ratio within normal limits on MAG3 scan.'"},
{term:"FDG accumulation",alt:"FDG-stapeling (NL) / FDG-Anreicherung (DE)",cat:"Nuclear Medicine / Oncology",def:"Increased uptake of fluorodeoxyglucose (FDG) on PET scan. Indicates metabolically active tissue — characteristic of malignancy, active infection, or inflammation.",ex:"'PET-CT: FDG accumulation in mediastinal lymph nodes.'"},
{term:"Non-target lesions",alt:"Non-targetlaesies (NL)",cat:"Oncology",def:"In RECIST (Response Evaluation Criteria in Solid Tumours), non-target lesions are measurable or non-measurable lesions not selected as target lesions. They are assessed qualitatively (present/absent, unequivocal progression).",ex:"'Stable non-target lesions. No new lesions.'"},
{term:"Intermetastatic",alt:"Intermetastatale (NL)",cat:"Oncology",def:"Relating to the interval or space between metastatic lesions. Used when assessing the distribution or treatment response of metastatic disease.",ex:"'Stable intermetastatic disease on latest CT.'"},
{term:"Atelectatic band",alt:"Atelectasestreng (NL)",cat:"Pulmonology / Radiology",def:"Linear or band-like atelectasis — collapse of a small segment of lung parenchyma, visible as a streak on chest X-ray or CT. Common post-operative finding.",ex:"'Bibasal atelectatic bands on chest X-ray, consistent with post-operative changes.'"},
{term:"Low-dose CT (LDCT)",alt:"Low-dose-CT",cat:"Radiology",def:"CT scan performed with reduced radiation dose. Used for lung cancer screening in high-risk patients (NELSON, NLST protocols). Also used in follow-up to reduce cumulative dose.",ex:"'Annual LDCT screening performed. No suspicious nodules.'"},
{term:"Ileus",alt:"",cat:"Gastroenterology / Surgery",def:"Bowel obstruction resulting in cessation of intestinal passage. Mechanical (adhesions, tumour) or paralytic (post-operative, metabolic). Life-threatening; requires urgent admission. Subileus = incomplete obstruction.",ex:"'Abdominal X-ray: no ileus picture.'"},
{term:"Synechiae",alt:"Synechie (DE)",cat:"Ophthalmology / General Surgery",def:"Adhesions between normally separate tissue layers. Anterior synechiae: iris to cornea. Posterior: iris to lens. Also occurs in abdominal/pelvic surgery.",ex:"'Posterior synechiae noted on slit-lamp examination.'"},
{term:"Convergence reaction",alt:"Konvergenzreaktion (DE)",cat:"Ophthalmology / Neurology",def:"Reflex convergence of both eyes (medial rectus contraction) when focusing on a near object, accompanied by accommodation and miosis (pupillary constriction).",ex:"'Convergence reaction intact bilaterally.'"}
,
{term:"BP (Blood Pressure)",alt:"RR (Riva-Rocci in DE) / PA/TA (in FR)",cat:"Vitals",def:"Force of blood against arterial walls, measured in mmHg. Written as systolic/diastolic (e.g. 120/80). NHS normal: <120/80. Stage 2 hypertension: >=140/90. Hypertensive crisis: >180/120.",ex:"\'BP 158/96 — stage 2 hypertension, commenced amlodipine.\'"},
{term:"HR (Heart Rate)",alt:"Pulse / bpm",cat:"Vitals",def:"Number of heartbeats per minute. Normal adult: 60-100 bpm. Below 60 = bradycardia. Above 100 = tachycardia.",ex:"\'HR 112 bpm — sinus tachycardia on ECG.\'"},
{term:"SpO2",alt:"Oxygen saturation / peripheral O2 saturation",cat:"Vitals",def:"Peripheral oxygen saturation measured by pulse oximetry (non-invasive). Normal: 95-100%. NHS/NICE target in COPD: 88-92%.",ex:"\'SpO2 88% on room air — commenced 2L/min O2 via nasal cannulae.\'"},
{term:"GCS (Glasgow Coma Scale)",alt:"",cat:"Vitals / Neurology",def:"Neurological scoring tool: Eye opening (E 1-4) + Verbal response (V 1-5) + Motor response (M 1-6). Total 3-15. GCS <=8 = intubation threshold. Always document as E/V/M individually.",ex:"\'GCS 9 (E3V2M4) — neurosurgery review requested.\'"},
{term:"NRS (Numeric Rating Scale)",alt:"Pain score 0-10",cat:"Vitals",def:"Pain assessment scale 0-10. 0=no pain, 1-3=mild, 4-6=moderate, 7-10=severe. Always transcribe the scale used and the value.",ex:"\'Pain 7/10 NRS at rest, 9/10 on movement.\'"},
{term:"BMI (Body Mass Index)",alt:"",cat:"Vitals",def:"Weight(kg)/height(m)^2. <18.5=underweight, 18.5-24.9=healthy, 25-29.9=overweight, 30-34.9=obese class I, 35-39.9=obese class II, >=40=obese class III (morbid).",ex:"\'BMI 32.4 — obese class I, referred to weight management programme.\'"},
{term:"RR (Respiratory Rate)",alt:"AF (Atemfrequenz DE), FR (fréquence respiratoire FR)",cat:"Vitals",def:"Breaths per minute. Normal adult: 12-20/min. >20 = tachypnoea. <12 = bradypnoea. Note: in German-speaking settings, RR = Blutdruck (blood pressure) — context determines meaning.",ex:"\'RR 24/min — tachypnoeic, accessory muscle use noted.\'"},
{term:"PRN",alt:"pro re nata / as required / b.B. (DE) / z.n. (NL) / si besoin (FR)",cat:"Medications",def:"Latin: pro re nata = as required/needed. Must always be accompanied by the maximum permitted frequency and interval.",ex:"\'Paracetamol 1g PO PRN up to QDS (max 4g/24h).\'"},
{term:"STAT",alt:"statim / sofort (DE) / onmiddellijk (NL) / immédiatement (FR)",cat:"Medications",def:"Latin: statim = immediately, once only. Single one-off dose given at once.",ex:"\'Ondansetron 4mg IV STAT for post-operative nausea.\'"},
{term:"DOAC",alt:"Direct Oral Anticoagulant / NOAK (DE) / AOD (FR)",cat:"Medications",def:"Direct oral anticoagulant — includes rivaroxaban (Xarelto), apixaban (Eliquis), dabigatran (Pradaxa), edoxaban (Lixiana). Do not require INR monitoring. Reversal agents: idarucizumab (dabigatran), andexanet alfa (Xa inhibitors).",ex:"\'Commenced rivaroxaban 20mg OD with evening meal for AF.\'"},
{term:"LMWH",alt:"Low-molecular-weight heparin / NMH (DE) / HBPM (FR)",cat:"Medications",def:"Low-molecular-weight heparin. UK brands: Clexane (enoxaparin), Fragmin (dalteparin), Innohep (tinzaparin). NL: Fraxiparine (nadroparin) most used. Subcutaneous injection. Used for DVT treatment/prophylaxis.",ex:"\'Clexane 40mg SC OD for VTE prophylaxis post-surgery.\'"},
{term:"INR",alt:"International Normalised Ratio",cat:"Medications / Haematology",def:"Monitoring parameter for warfarin (UK) / phenprocoumon (DE) / acenocoumarol (NL). Target ranges vary by indication: AF=2.0-3.0, mechanical heart valve=2.5-3.5. Check locally.",ex:"\'INR 4.8 — warfarin held, vitamin K administered.\'"},
{term:"DAPT",alt:"Dual antiplatelet therapy",cat:"Medications / Cardiology",def:"Combination of aspirin + a P2Y12 inhibitor (clopidogrel, ticagrelor, or prasugrel). Standard after ACS or coronary stenting. Duration depends on stent type and bleeding risk.",ex:"\'DAPT: aspirin 75mg OD + ticagrelor 90mg BD for 12 months post-NSTEMI.\'"},
{term:"SGLT2 inhibitor",alt:"Gliflozins / empagliflozin / dapagliflozin",cat:"Medications / Endocrinology",def:"Sodium-glucose cotransporter-2 inhibitors — oral antidiabetics with additional cardiac and renal protective effects (NICE/ESC). Must be paused before IV contrast (DKA risk). Examples: empagliflozin (Jardiance), dapagliflozin (Forxiga).",ex:"\'Empagliflozin held 48h pre-operatively per protocol.\'"},
{term:"Charrière (Ch / Fr)",alt:"French gauge / Fg",cat:"Medications / Equipment",def:"Unit for outer diameter of catheters, tubes and cannulae. 1 Ch = 0.33 mm. Used for urinary catheters, NG tubes, chest drains. Example: 14 Ch NGT, 16 Fr urinary catheter.",ex:"\'16 Ch urinary catheter inserted, 350mL urine drained.\'"},
{term:"Controlled Drug (CD)",alt:"Betäubungsmittel BtM (DE) / Opiumwet list I (NL) / stupéfiant (FR)",cat:"Medications / Legal",def:"UK: regulated by the Misuse of Drugs Act 1971. Morphine, oxycodone, fentanyl = Schedule 2. Tramadol, temazepam = Schedule 3. Transcription must include: full name, strength, form, dose, frequency, total quantity.",ex:"\'Morphine sulfate 5mg PO PRN 4-hourly — CD prescription issued.\'"},
{term:"LASA",alt:"Look-Alike Sound-Alike drugs",cat:"Medications / Safety",def:"Drug pairs that can be confused due to similar names or appearance. Common UK pairs: Hydroxyzine/Hydralazine, Metformin/Metronidazole, Prednisolone/Prednisone, Cyclophosphamide/Ciclosporin. Flag uncertainty — never guess.",ex:"\'LASA alert: clarified with prescriber — metformin (not metronidazole).\'"},
{term:"FBC",alt:"Full blood count / BB Blutbild (DE) / VBB (NL) / NFS (FR)",cat:"Tests",def:"Full blood count. Includes: Hb, WBC (white cell count), platelets, haematocrit. Normal Hb: female 120-160 g/L, male 130-175 g/L. Normal WBC: 4-11 x10^9/L.",ex:"\'FBC: Hb 98 g/L, WBC 14.2, Plt 312 — iron deficiency anaemia.\'"},
{term:"U&Es",alt:"Urea and electrolytes / Nierenwerte (DE) / nierfuncties (NL) / bilan rénal (FR)",cat:"Tests",def:"UK standard renal function panel including sodium, potassium, urea, creatinine, eGFR. Essential before ACEi/ARB, NSAID, or diuretic prescribing.",ex:"\'U&Es: Na 138, K 5.9, Creat 198 — ACE inhibitor dose reduced.\'"},
{term:"LFTs",alt:"Liver function tests / Leberwerte (DE) / leverfuncties (NL) / bilan hépatique (FR)",cat:"Tests",def:"UK: ALT, AST, GGT, ALP, bilirubin, albumin. DE: GPT (=ALT), GOT (=AST), GGT. NL/FR: ALAT (=ALT), ASAT (=AST), GGT. Always transcribe the abbreviation dictated.",ex:"\'LFTs: ALT 156, AST 98, GGT 210 — alcohol-related liver disease.\'"},
{term:"eGFR",alt:"Estimated glomerular filtration rate",cat:"Tests",def:"Estimated kidney function. CKD staging: >=90=G1 (normal), 60-89=G2, 45-59=G3a, 30-44=G3b, 15-29=G4, <15=G5 (kidney failure). Used to adjust drug doses and identify contraindications.",ex:"\'eGFR 28 mL/min/1.73m2 — NSAIDs contraindicated, metformin dose reduced.\'"},
{term:"HbA1c",alt:"Glycated haemoglobin",cat:"Tests / Endocrinology",def:"Long-term blood glucose control marker (2-3 month average). Diabetes diagnosis: >=48 mmol/mol (6.5%) on two occasions (NICE/WHO). Prediabetes: 42-47 mmol/mol.",ex:"\'HbA1c 64 mmol/mol — diabetes poorly controlled, metformin dose titrated.\'"},
{term:"CRP",alt:"C-reactive protein",cat:"Tests",def:"Inflammatory marker. Normal: <5 mg/L. Elevated in infection, inflammation, malignancy. Serial CRP useful for monitoring treatment response.",ex:"\'CRP 148 mg/L — broad-spectrum antibiotics commenced.\'"},
{term:"ABG",alt:"Arterial blood gas / BGA Blutgasanalyse (DE) / GDS gaz du sang (FR)",cat:"Tests",def:"Arterial blood gas analysis — measures pH, PaO2, PaCO2, bicarbonate, lactate. Essential in respiratory failure, acid-base disturbances, shock.",ex:"\'ABG on 2L O2: pH 7.28, PaO2 8.1, PaCO2 7.8 — type 2 respiratory failure.\'"},
{term:"BNP / NT-proBNP",alt:"B-type natriuretic peptide",cat:"Tests / Cardiology",def:"Heart failure biomarker. Elevated in heart failure, right heart strain, PE. NT-proBNP >125 pg/mL (age-adjusted) supports HF diagnosis (ESC guideline).",ex:"\'NT-proBNP 4800 pg/mL — new diagnosis heart failure, echo requested.\'"},
{term:"Dyspnoea",alt:"Breathlessness / Dyspnoe (DE) / Dyspneu (NL) / Dyspnée (FR)",cat:"Symptoms",def:"Difficulty breathing or breathlessness. Grade by MRC scale 1-5. Note at rest vs on exertion. Distinguish from tachypnoea (fast rate) and apnoea (cessation).",ex:"\'MRC grade 3 dyspnoea — breathless walking on flat ground.\'"},
{term:"Orthopnoea",alt:"Orthopnoe (DE/NL) / Orthopnée (FR)",cat:"Symptoms",def:"Breathlessness when lying flat, relieved by sitting upright. Sign of heart failure (pulmonary congestion). Number of pillows used = proxy for severity.",ex:"\'3-pillow orthopnoea — commenced furosemide, BNP 3200.\'"},
{term:"Syncope",alt:"TLOC / Synkope (DE) / Syncope (NL) / Syncope (FR)",cat:"Symptoms",def:"Transient loss of consciousness (TLOC) due to cerebral hypoperfusion, with spontaneous recovery. Types: vasovagal, cardiac, orthostatic, neurological. Note prodrome and recovery.",ex:"\'Witnessed syncope with 30s LOC — 24h cardiac monitoring arranged.\'"},
{term:"Angina pectoris",alt:"Chest pain / Brustschmerz (DE) / Angor (FR)",cat:"Symptoms / Cardiology",def:"Chest pain/tightness/pressure on exertion, relieved by rest or GTN. CCS grading I-IV. Unstable = angina at rest or new-onset severe. Note radiation pattern (left arm, jaw, back).",ex:"\'CCS grade II angina — chest tightness climbing two flights of stairs.\'"},
{term:"DVT (Deep Vein Thrombosis)",alt:"TVT Tiefe Venenthrombose (DE) / TVP thrombose veineuse profonde (FR)",cat:"Symptoms / Vascular",def:"Blood clot in a deep vein — usually calf or thigh. Symptoms: swelling, warmth, redness, pain. Use Wells score for pre-test probability. Complications: PE (pulmonary embolism).",ex:"\'Suspected DVT right calf — Wells score 2 (moderate), D-dimer 1.8.\'"},
{term:"Melaena",alt:"Meläna (DE) / Méléna (FR)",cat:"Symptoms / Gastroenterology",def:"Black tarry stools from digested blood = upper GI bleeding source (oesophagus, stomach, duodenum). Distinguish from haematochezia (fresh red blood = lower GI bleed).",ex:"\'3-day history of melaena, Hb drop 20g/L — urgent OGD.\'"},
{term:"PERLA",alt:"Pupils Equal and Reactive to Light and Accommodation",cat:"Symptoms / Neurology / Ophthalmology",def:"Standard neurological documentation confirming normal pupillary reflexes. Both eyes: equal size, react promptly to direct and consensual light, accommodate on near fixation.",ex:"\'Pupils PERLA, no papilloedema on fundoscopy.\'"},
{term:"Paroxysmal nocturnal dyspnoea (PND)",alt:"PND",cat:"Symptoms / Cardiology",def:"Sudden breathlessness waking the patient from sleep, typically 1-2 hours after lying down. Due to pulmonary oedema redistribution. Sign of left heart failure.",ex:"\'PND 3 nights per week — echocardiogram: EF 28%, severe LV dysfunction.\'"},
{term:"Anaphylaxis",alt:"Anaphylaxie (DE/FR/NL)",cat:"Allergies",def:"Severe life-threatening multi-system allergic reaction. Triad: airway compromise, bronchospasm, cardiovascular collapse. Treatment: IM adrenaline 0.5mg (adult) anterolateral thigh. UK: Resuscitation Council guideline.",ex:"\'Anaphylaxis to penicillin — IM adrenaline given, EpiPen prescribed.\'"},
{term:"Urticaria",alt:"Hives / Urtikaria (DE) / Urticaire (FR)",cat:"Allergies / Dermatology",def:"Raised, itchy wheals with pale centre and red flare. Allergic (IgE) or non-allergic (idiopathic, pressure, cold). Can be part of anaphylaxis (grade 1-2).",ex:"\'Generalised urticaria within 20 minutes of amoxicillin — drug stopped.\'"},
{term:"Angioedema",alt:"Angioödem (DE) / Angio-oedeem (NL) / Angio-oedème (FR)",cat:"Allergies",def:"Deep tissue swelling — face, lips, tongue, throat, extremities. Allergic (IgE) or non-allergic (ACEi-induced = bradykinin-mediated). Laryngeal angioedema is life-threatening.",ex:"\'Lip and tongue angioedema, commenced on ramipril 3 months ago — drug stopped.\'"},
{term:"DRESS syndrome",alt:"Drug Reaction with Eosinophilia and Systemic Symptoms",cat:"Allergies / Dermatology",def:"Severe delayed drug hypersensitivity: fever, lymphadenopathy, facial oedema, widespread rash, eosinophilia, multi-organ involvement. Onset 2-8 weeks after starting culprit drug. Mortality ~10%. Causative drugs: carbamazepine, allopurinol, sulfonamides, vancomycin.",ex:"\'DRESS syndrome 5 weeks post-allopurinol — drug stopped, dermatology/hepatology review.\'"},
{term:"SJS / TEN",alt:"Stevens-Johnson Syndrome / Toxic Epidermal Necrolysis",cat:"Allergies / Dermatology",def:"SJS = mucosal erosions + skin blistering <10% BSA. TEN (Lyell) = >30% BSA skin detachment. Both are medical emergencies. Common causes: allopurinol, carbamazepine, lamotrigine, sulfonamides. Mortality TEN up to 30%.",ex:"\'SJS secondary to carbamazepine — transferred to burns unit.\'"},
{term:"Yellow Card scheme",alt:"MHRA pharmacovigilance / BfArM (DE) / Lareb (NL) / ANSM/CRPV (FR)",cat:"Allergies / Safety",def:"UK national adverse drug reaction reporting system run by MHRA. Healthcare professionals and patients can report ADRs. Equivalent: BfArM/AGES in D/A, Lareb in NL, ANSM + CRPV in France.",ex:"\'Suspected ADR reported to MHRA Yellow Card scheme.\'"},
{term:"NICE",alt:"National Institute for Health and Care Excellence",cat:"Abbreviations / NHS",def:"UK body responsible for clinical guidelines, technology appraisals, and quality standards. NICE guidelines referenced in prescribing decisions, diagnostics, and pathway design.",ex:"\'As per NICE guideline CG127, atorvastatin 20mg commenced.\'"},
{term:"MDT",alt:"Multidisciplinary team / RCP (FR) / MDT (D/A/NL)",cat:"Abbreviations",def:"Meeting or team of healthcare professionals from multiple specialties making joint decisions about patient care. Mandatory in oncology (UK, France), widely used in complex medicine.",ex:"\'MDT decision: proceed to surgical resection — colorectal meeting minutes enclosed.\'"},
{term:"DNACPR",alt:"Do Not Attempt Cardiopulmonary Resuscitation / ReSPECT (UK)",cat:"Abbreviations / NHS",def:"Clinical decision form documenting that CPR should not be attempted if cardiorespiratory arrest occurs. In many NHS trusts now replaced by ReSPECT (Recommended Summary Plan for Emergency Care and Treatment).",ex:"\'DNACPR decision made with patient and family — ReSPECT form completed.\'"},
{term:"TTO / TTA",alt:"To Take Out / To Take Away",cat:"Abbreviations / NHS",def:"NHS abbreviation for discharge medications — drugs prescribed for the patient to take home at discharge. Transcribe any TTO/TTA listed carefully — doses must be exact.",ex:"\'TTO: ramipril 5mg OD, amlodipine 10mg OD, atorvastatin 40mg ON.\'"}],
de:[
{term:"pDMS",alt:"Periphere Durchblutung, Motorik und Sensibilität",cat:"Orthopädie",def:"Untersuchung der peripheren Durchblutung, Motorik und Sensibilität an den Extremitäten. Standardmäßige Untersuchung nach Verletzungen, Operationen oder bei Verdacht auf Gefäß- oder Nervenschäden.",ex:"pDMS beider Beine und Füße intakt."},
{term:"Swirl Sign",alt:"Wirbelzeichen",cat:"Neuroradiologie",def:"CT-/MRT-Befund: hyperdenses Wirbelmuster innerhalb eines Hämatoms. Hinweis auf aktive arterielle Blutung und Prädikator für Hämatomexpansion.",ex:"CT zeigte ein Swirl Sign im linksseitigen Temporalhämatom."},
{term:"Fazekas-Skala",alt:"Fazekas 0–3",cat:"Neuroradiologie",def:"Bewertungssystem für Weißmaterialveränderungen (Leukoaraiosis) im MRT. Grad 0 = keine; Grad 1 = punktförmig; Grad 2 = beginnende Konfluenz; Grad 3 = großflächig konfluierend.",ex:"MRT Schädel: Weiße-Substanz-Veränderungen Fazekas 1."},
{term:"T2-Signal",alt:"T2-Hyperintensität",cat:"Radiologie / MRT",def:"Auf T2-gewichteten MRT-Sequenzen erscheinen Flüssigkeit und Ödem hell (hyperintens). T2-Signalveränderungen weisen auf pathologische Prozesse hin (Entzündung, Infarkt, Demyelinisierung).",ex:"T2-Signalveränderung im rechten Temporallappen."},
{term:"Gamma Knife",alt:"Stereotaktische Radiochirurgie",cat:"Neurochirurgie / Radiologie",def:"Gerät zur stereotaktischen Radiochirurgie mit fokussierter Gammastrahlung — kein chirurgisches Skalpell. Behandlung von Hirntumoren, AVM und Akustikusneurinomen ohne offene Operation.",ex:"Gamma-Knife-Behandlung des linksseitigen Akustikusneurinoms geplant."},
{term:"Anterolisthesis",alt:"Anteriore Spondylolisthesis",cat:"Neurologie / Wirbelsäule",def:"Anteriore Verschiebung eines Wirbelkörpers gegenüber dem darunter liegenden. Einteilung Grad I–IV. Führt zu Spinalkanalstenose und Nervenwurzelkompression.",ex:"Anterolisthesis L4 über L5, Grad I."},
{term:"Parafalciäres Meningeom",alt:"Parafalcien meningioom (NL)",cat:"Neurologie / Neuroradiologie",def:"Meningeom angrenzend an die Falx cerebri. Kann zu kontralateralen motorischen oder sensiblen Ausfällen führen.",ex:"MRT bestätigte ein 2 cm großes parafalciäres Meningeom rechts."},
{term:"Insuläre Region",alt:"Insula / Gyrus insularis",cat:"Neurologie / Anatomie",def:"Der insuläre Kortex, tief in der Sylvischen Fissur gelegen. Beteiligt an Geschmack, Schmerzverarbeitung und autonomer Regulation. Infarkte können Dysarthrie und Herzrhythmusstörungen verursachen.",ex:"DWI-Restriktion in der linken insulären Region, vereinbar mit akutem ischämischem Infarkt."},
{term:"CMC-1-Gelenk",alt:"Daumensattelgelenk",cat:"Handchirurgie / Orthopädie",def:"Erstes Karpometakarpalgelenk am Daumenbasis. Typische Lokalisation der Rhizarthrose (Daumensattelgelenksarthrose). Klinische Tests: Watson-Test, Durkan-Test.",ex:"CMC-1-Prothese rechts implantiert."},
{term:"TAVI",alt:"Transkatheter-Aortenklappenimplantation",cat:"Kardiologie / Herzchirurgie",def:"Minimalinvasive Implantation einer künstlichen Aortenklappe mittels Katheter. Alternative zur offenen Herzoperation bei Hochrisikopatienten.",ex:"Transfemoraler TAVI erfolgreich durchgeführt."},
{term:"Trikuspidalklappe",alt:"",cat:"Kardiologie",def:"Dreiflügelige Herzklappe zwischen rechtem Vorhof und rechter Kammer. Verhindert den systolischen Rückfluss. Pathologien: Trikuspidalinsuffizienz, Trikuspidalstenose.",ex:"Leichtgradige Trikuspidalinsuffizienz echokardiografisch nachgewiesen."},
{term:"Tendinopathie",alt:"Tendopathie",cat:"Orthopädie / Rheumatologie",def:"Sehnenerkrankung. Umfasst Tendinitis (akute Entzündung) und Tendinose (chronische Degeneration). Frühere Bezeichnung: Tendopathie.",ex:"Supraspinatussehnen-Tendinopathie mit Partialruptur."},
{term:"Kniebinnenschaden",alt:"",cat:"Orthopädie",def:"Sammelbezeichnung für Schäden und Verletzungen am Kniegelenk. Betrifft Kreuzbänder, Menisken, Knorpel oder sonstige intraartikuläre Strukturen.",ex:"MRT bestätigte Innenmeniskusriss als Teil des Kniebinnenschadens."},
{term:"Varus- und Valgusstress",alt:"",cat:"Orthopädie",def:"Klinischer Test zur Überprüfung der medialen und lateralen Kollateralbandstabilität. Valgus öffnet den medialen, Varus den lateralen Gelenkspalt.",ex:"Kniegelenk stabil unter Varus- und Valgusstress in 0°, 30° und 90°."},
{term:"Skidaumen",alt:"Gamekeeper's Thumb / UCL-Ruptur",cat:"Handchirurgie",def:"Riss des ulnaren Kollateralbandes am MCP-Gelenk des Daumens. Typisch beim Ski- und Ballsport. Vollständige Ruptur erfordert operative Versorgung.",ex:"Skidaumen rechts mit kompletter UCL-Ruptur bestätigt."},
{term:"A1-Pulley",alt:"Ringband A1",cat:"Handchirurgie",def:"Erstes Ringband der Beugesehne, am MCP-Gelenk. Ort der stenosierenden Tendovaginitis (schnellender Finger). Behandlung: perkutane oder offene Spaltung.",ex:"A1-Pulley-Spaltung bei schnellendem Zeigefinger links."},
{term:"Bakerzyste",alt:"Poplitealzyste",cat:"Orthopädie / Rheumatologie",def:"Synovialzyste in der Kniekehle, häufig bei Meniskusriss oder Gonarthrose. Ruptur kann Wadenödem imitieren (DD: TVT).",ex:"Ultraschall bestätigte Bakerzyste rechts popliteal."},
{term:"Karpaltunnelsyndrom",alt:"CTS",cat:"Handchirurgie / Neurologie",def:"Kompression des Nervus medianus im Karpaltunnel. Symptome: nächtliche Kribbelparästhesien in Daumen, Zeige- und Mittelfinger. Diagnose durch NLG oder Durkan-Test.",ex:"Beidseitiges Karpaltunnelsyndrom in der NLG bestätigt."},
{term:"FKDS",alt:"Farbkodierte Dopplersonografie",cat:"Radiologie / Gefäße",def:"Farbkodierte Duplexsonografie — Kombination aus B-Bild-Sonografie und Farbkodierung des Blutflusses. Zur Beurteilung von Arterien und Venen.",ex:"FKDS: Stenose der rechten Arteria femoralis superficialis."},
{term:"Aortabroekprothese",alt:"Aortenbifurkationsprothese / Y-Prothese",cat:"Gefäßchirurgie",def:"Y-förmiges Gefäßimplantat zum Ersatz der Aortenbifurkation und beider Iliakalarterien. Bei aorto-iliakalem Verschlussprozess oder Aneurysma.",ex:"Bekannte Aortenbifurkationsprothese, Kontrolluntersuchung."},
{term:"AFS",alt:"Arteria femoralis superficialis",cat:"Gefäßchirurgie",def:"Fortsetzung der Arteria femoralis communis im Oberschenkel. Häufigste Lokalisation der peripheren arteriellen Verschlusskrankheit (pAVK). Behandlung: Stentimplantation, TEA.",ex:"Verschluss der rechten AFS mit distaler Kollateralrekanalisierung."},
{term:"Nier-achtergrond-ratio",alt:"Nieren-Hintergrund-Verhältnis",cat:"Nuklearmedizin",def:"Verhältnis der Nierenaktivität zur Hintergrundaktivität in der Nierenszintigrafie (MAG3, DMSA). Beurteilung von Nierenfunktion und Obstruktion.",ex:"Nier-achtergrond-ratio im Normbereich."},
{term:"FDG-Anreicherung",alt:"FDG-Stapeling (NL) / FDG-Uptake",cat:"Nuklearmedizin / Onkologie",def:"Erhöhte Aufnahme von Fluordesoxyglukose (FDG) im PET. Zeigt metabolisch aktives Gewebe — typisch für Malignome, aktive Infektionen oder Entzündungen.",ex:"PET-CT: FDG-Anreicherung in mediastinalen Lymphknoten."},
{term:"Non-Target-Läsionen",alt:"Nicht-Zielläsionen",cat:"Onkologie",def:"Nach RECIST: Läsionen, die nicht als Zielläsionen ausgewählt wurden. Qualitative Beurteilung (vorhanden/nicht vorhanden, eindeutige Progression).",ex:"Stabile Non-Target-Läsionen. Keine neuen Läsionen."},
{term:"Atelektasestrang",alt:"Bandatelektase / lineare Atelektase",cat:"Pneumologie / Radiologie",def:"Band- oder streifenförmige Atelektase — Kollaps eines kleinen Lungenabschnitts. Im Röntgenbild als Strang sichtbar. Häufiger postoperativer Befund.",ex:"Beidseits basale Atelektasestränge im Röntgen-Thorax, postoperativ."},
{term:"Low-dose-CT (LDCT)",alt:"Niedrigdosis-CT",cat:"Radiologie",def:"CT mit reduzierter Strahlendosis. Einsatz zur Lungenkrebsvorsorge bei Risikopatienten (NELSON-Protokoll). Auch zur Verlaufskontrolle zur Dosisreduktion.",ex:"Jährliches LDCT-Screening: kein suspekter Befund."},
{term:"Konvergenzreaktion",alt:"",cat:"Ophthalmologie / Neurologie",def:"Reflektorische Konvergenzbewegung beider Augen bei Nahabsehen, begleitet von Akkommodation und Miosis (Pupillenverengung).",ex:"Konvergenzreaktion beidseits intakt."},
{term:"Synechie",alt:"Verwachsung / Verklebung",cat:"Ophthalmologie / Chirurgie",def:"Verklebung oder Verwachsung normalerweise nicht verbundener Gewebeschichten. Anterior: Iris–Kornea. Posterior: Iris–Linse. Auch nach Bauch- oder Beckenoperationen.",ex:"Hintere Synechie in der Spaltlampenuntersuchung."},
{term:"Ileus",alt:"Subileus",cat:"Gastroenterologie / Chirurgie",def:"Darmverschluss mit aufgehobener Darmpassage. Mechanisch (Adhäsionen, Tumor) oder paralytisch (postoperativ, metabolisch). Lebensbedrohlich; sofortige Einweisung erforderlich. Subileus = unvollständiger Verschluss.",ex:"Abdomen-Röntgen: kein Ileus-Bild."},
{term:"Metaphyse",alt:"",cat:"Orthopädie / Anatomie",def:"Knochenabschnitt zwischen Diaphyse (Schaft) und Epiphyse (Gelenkende). Wichtig für das Knochenwachstum (Wachstumsfuge). Häufige Lokalisation osteoporotischer Frakturen.",ex:"Metaphysäre Fraktur des distalen Radius."},
{term:"Kyfosestand",alt:"Kyphosestellung",cat:"Orthopädie / Wirbelsäule",def:"Vermehrte dorsale Krümmung der Wirbelsäule, insbesondere thorakal. Kann degenerativ, traumatisch oder kongenital sein.",ex:"Patient zeigt ausgeprägten Kyfosestand der BWS."},
{term:"K-Drähte",alt:"Kirschner-Drähte",cat:"Orthopädie / Chirurgie",def:"Dünne Metalldrähte zur vorübergehenden Fixierung von Knochenfrakturen oder nach Gelenkrekonstruktionen. Werden nach Heilung entfernt.",ex:"K-Draht-Osteosynthese nach distaler Radiusfraktur."}
,
{term:"RR (Riva-Rocci)",alt:"Blutdruck / BD",cat:"Vitalzeichen",def:"Blutdruck, benannt nach Scipione Riva-Rocci. Angabe: systolisch/diastolisch in mmHg. Normwert Erwachsene: <120/80. Hypertonie Grad 2: >=140/90. Hypertensive Krise: >180/120. Cave: In EN bedeutet RR Atemfrequenz.",ex:"\'RR 162/98 mmHg — Hypertonie Grad 2, Amlodipin begonnen.\'"},
{term:"HF (Herzfrequenz)",alt:"Puls / bpm",cat:"Vitalzeichen",def:"Herzschläge pro Minute. Normal Erwachsener: 60-100/min. Unter 60 = Bradykardie. Über 100 = Tachykardie.",ex:"\'HF 118/min — Sinustachykardie im EKG.\'"},
{term:"SpO2 (Sauerstoffsättigung)",alt:"Periphere O2-Sättigung",cat:"Vitalzeichen",def:"Periphere Sauerstoffsättigung (Pulsoximetrie, nicht-invasiv). Normal: 95-100%. COPD-Ziel: 88-92% (AWMF NVL COPD). Unter 90% = Hypoxie.",ex:"\'SpO2 86% bei Raumluft — 2 l/min O2 via Nasenbrille begonnen.\'"},
{term:"GCS (Glasgow Coma Scale)",alt:"Glasgower Koma Skala",cat:"Vitalzeichen / Neurologie",def:"Neurologisches Beurteilungsinstrument: Augenöffnen (A 1-4) + Verbale Reaktion (V 1-5) + Motorische Reaktion (M 1-6). Gesamt 3-15. GCS <=8 = Intubationsschwelle. Immer als A/V/M einzeln dokumentieren.",ex:"\'GCS 9 (A3V2M4) — neurochirurgische Konsiliaruntersuchung angefordert.\'"},
{term:"NRS (Numerische Rating-Skala)",alt:"Schmerzskala 0-10",cat:"Vitalzeichen",def:"Schmerzerfassung 0-10. 0=kein Schmerz, 1-3=leicht, 4-6=mittelgradig, 7-10=stark. Immer Skala und Wert dokumentieren.",ex:"\'Schmerz 8/10 NRS in Ruhe, 9/10 bei Bewegung.\'"},
{term:"BMI (Body-Mass-Index)",alt:"",cat:"Vitalzeichen",def:"Körpergewicht (kg)/Körpergrösse (m)². Klassifikation (WHO): <18,5=Untergewicht, 18,5-24,9=Normalgewicht, 25-29,9=Übergewicht, 30-34,9=Adipositas Grad I, 35-39,9=Grad II, >=40=Grad III (morbid).",ex:"\'BMI 32,4 — Adipositas Grad I, Ernährungsberatung veranlasst.\'"},
{term:"PRN / b.B.",alt:"pro re nata / bei Bedarf",cat:"Medikamente",def:"Lateinisch: pro re nata = bei Bedarf. Maximale Häufigkeit und Intervall müssen immer angegeben werden.",ex:"\'Paracetamol 1 g p.o. b.B. bis 4×tgl. (max. 4 g/24 h).\'"},
{term:"STAT / sofort",alt:"statim / einmalig",cat:"Medikamente",def:"Lateinisch: statim = sofort, einmalig. Einmalige Sofortgabe.",ex:"\'Ondansetron 4 mg i.v. sofort bei postoperativer Übelkeit.\'"},
{term:"NOAK (Neue Orale Antikoagulanzien)",alt:"DOAC / direkte orale Antikoagulanzien",cat:"Medikamente / Kardiologie",def:"Neue Orale Antikoagulanzien = DOAC. Umfasst: Rivaroxaban (Xarelto), Apixaban (Eliquis), Dabigatran (Pradaxa), Edoxaban (Lixiana). Kein INR-Monitoring erforderlich. Antagonisierung: Idarucizumab (Dabigatran), Andexanet alfa (Faktor-Xa-Hemmer).",ex:"\'Rivaroxaban 20 mg 1×tgl. zum Abendessen bei Vorhofflimmern begonnen.\'"},
{term:"NMH (Niedermolekulares Heparin)",alt:"LMWH / Enoxaparin / Certoparin / Nadroparin",cat:"Medikamente",def:"Niedermolekulares Heparin. D/A-Präparate: Clexane (Enoxaparin), Mono-Embolex (Certoparin). Subkutane Injektion. Für TVT-Prophylaxe und -Therapie.",ex:"\'Clexane 40 mg s.c. 1×tgl. zur TVT-Prophylaxe postoperativ.\'"},
{term:"INR (International Normalized Ratio)",alt:"Quick-Wert",cat:"Medikamente / Hämatologie",def:"Überwachungsparameter für Phenprocoumon (Marcumar) in D/A. Zielbereich je nach Indikation: Vorhofflimmern=2,0-3,0, mechanische Herzklappen=2,5-3,5. Wird von Gerinnungsambulanz überwacht.",ex:"\'INR 5,1 — Marcumar pausiert, Vitamin K 5 mg p.o. gegeben.\'"},
{term:"DAPT (Duale Plättchenhemmung)",alt:"Dual Antiplatelet Therapy",cat:"Medikamente / Kardiologie",def:"Kombination aus ASS + P2Y12-Hemmer (Clopidogrel, Ticagrelor oder Prasugrel). Standard nach ACS oder Koronarstenting. Dauer abhängig von Stenttyp und Blutungsrisiko.",ex:"\'DAPT: ASS 100 mg 1×tgl. + Ticagrelor 90 mg 2×tgl. für 12 Monate nach NSTEMI.\'"},
{term:"SGLT2-Hemmer",alt:"Gliflozine / Empagliflozin / Dapagliflozin",cat:"Medikamente / Endokrinologie",def:"Natriumglukose-Cotransporter-2-Hemmer — orale Antidiabetika mit zusätzlichem kardio- und nephroprotektiven Effekt (ESC/DDG-Leitlinie). Vor KM-Gabe pausieren (DKA-Risiko). Beispiele: Jardiance (Empagliflozin), Forxiga (Dapagliflozin).",ex:"\'Empagliflozin 48 h präoperativ pausiert gemäss Protokoll.\'"},
{term:"Charrière (Ch / Charr.)",alt:"French gauge / Fg",cat:"Medikamente / Material",def:"Masseinheit für den Aussendurchmesser von Kathetern, Sonden und Tuben. 1 Ch = 0,33 mm. Verwendung: Blasenkatheter, Magensonden, Thoraxdrainagen.",ex:"\'16-Charr.-Blasenkatheter inseriert, 380 ml Urin abgelassen.\'"},
{term:"Betäubungsmittel (BtM)",alt:"Suchtgift (A) / Controlled Drug (EN) / stupéfiant (FR)",cat:"Medikamente / Rechtlich",def:"D: BtMG (Betäubungsmittelgesetz). A: Suchtmittelgesetz (SMG). BtM-Anlage III: Morphin, Oxycodon, Fentanyl, Hydromorphone, Buprenorphin. BtM-Rezept erforderlich. Transkription: vollständiger Name, Stärke, Form, Dosis, Häufigkeit, Gesamtmenge.",ex:"\'Oxycodon retard 10 mg 2×tgl. — BtM-Rezept ausgestellt.\'"},
{term:"Blutbild (BB)",alt:"FBC / Grosses Blutbild / Differenzialblutbild",cat:"Tests",def:"Kleines BB: Hb, Leukozyten, Thrombozyten, Hämatokrit. Grosses BB + Diff-BB: zusätzlich Differenzialblutbild (Neutrophile, Lymphozyten etc.). Normwert Hb: Frauen 120-160 g/l, Männer 130-175 g/l.",ex:"\'BB: Hb 9,2 g/dl, Leukozyten 14,2 × 10⁹/l, Thrombozyten 312 — Eisenmangelanämie.\'"},
{term:"BGA (Blutgasanalyse)",alt:"ABG / Arterielles Blutgas",cat:"Tests",def:"Arterielle Blutgasanalyse: pH, PaO2, PaCO2, Bikarbonat, Laktat. Unabdingbar bei respiratorischer Insuffizienz, Säure-Basen-Störungen, Schock.",ex:"\'BGA unter 2 l/min O2: pH 7,28, PaO2 8,1 kPa, PaCO2 7,9 kPa — ventilatorische Globalinsuffizienz.\'"},
{term:"HbA1c",alt:"Glykiertes Hämoglobin / Langzeitzucker",cat:"Tests / Endokrinologie",def:"Langzeitblutzuckerkontrolle (2-3-Monatsdurchschnitt). Diabetes-Diagnose: >=48 mmol/mol (>=6,5%) bei 2 Messungen (DDG/ESC/DHL-Leitlinie). Prädiabetes: 42-47 mmol/mol.",ex:"\'HbA1c 71 mmol/mol — Diabetes schlecht eingestellt, Metformin titriert.\'"},
{term:"CRP (C-reaktives Protein)",alt:"Entzündungsmarker",cat:"Tests",def:"Entzündungsmarker. Normal: <5 mg/l. Erhöht bei Infektion, Entzündung, Malignom. Serielle Messung zur Verlaufskontrolle.",ex:"\'CRP 156 mg/l — Breitspektrum-Antibiotika begonnen.\'"},
{term:"Dyspnoe",alt:"Atemnot / Dyspneu (NL) / Dyspnoea (EN) / Dyspnée (FR)",cat:"Symptome",def:"Atemnot / erschwertes Atmen. MRC-Skala 1-5. In Ruhe vs. unter Belastung. Unterscheiden: Tachypnoe (schnelle Rate) und Apnoe (Atemstillstand).",ex:"\'MRC-Grad 3 Dyspnoe — Atemnot beim Gehen auf ebener Strecke.\'"},
{term:"Orthopnoe",alt:"Orthopnoea (EN) / Orthopnée (FR)",cat:"Symptome",def:"Dyspnoe im Liegen, Besserung durch aufrechte Haltung. Zeichen der Herzinsuffizienz (Lungenstauung). Kopfkissenanzahl als Schweregradindicator.",ex:"\'Orthopnoe mit 3 Kopfkissen — Furosemid begonnen, BNP 3400.\'"},
{term:"Synkope",alt:"Kurzer Bewusstseinsverlust / TLOC",cat:"Symptome",def:"Kurzer, selbstlimitierender Bewusstseinsverlust durch zerebrale Minderperfusion. Typen: vasovagal, kardial, orthostatisch, neurologisch. Prodromus und Erholung dokumentieren.",ex:"\'Beobachtete Synkope mit 30 s BVL — 24-h-EKG-Monitoring angeordnet.\'"},
{term:"Meläna",alt:"Teerstuhl",cat:"Symptome / Gastroenterologie",def:"Schwarzer, teerartiger Stuhl aus verdautem Blut = obere GI-Blutungsquelle. Abgrenzen von Hämatochezie (frisches rotes Blut = untere GI-Blutung).",ex:"\'3-tägige Meläna, Hb-Abfall 20 g/l — dringende Ösophagogastroduodenoskopie.\'"},
{term:"Anaphylaxie",alt:"Anaphylaxis (EN) / Anafylaxie (NL) / Anaphylaxie (FR)",cat:"Allergien",def:"Schwere, lebensbedrohliche multisystemische Allergiereaktion. Trias: Atemwegskompromittierung, Bronchospasmus, Kreislaufversagen. Therapie: Adrenalin i.m. 0,5 mg Oberschenkel-Anterolateral (AWMF-Leitlinie). Österreich: Suchtmittelgesetz.",ex:"\'Anaphylaxie Grad III auf Penicillin — Adrenalin i.m. gegeben, Notarzt (112) alarmiert.\'"},
{term:"UAW (Unerwünschte Arzneimittelwirkung)",alt:"NW Nebenwirkung / ADR",cat:"Allergien / Sicherheit",def:"Unerwünschte Wirkung eines Arzneimittels. Umfasst alle Reaktionstypen: Allergie, Intoleranz, Pseudoallergie. In D dem BfArM, in A der AGES zu melden.",ex:"\'UAW: Angioödem unter Ramipril — ACE-Hemmer abgesetzt, auf Sartan umgestellt.\'"},
{term:"DRESS-Syndrom",alt:"Drug Reaction with Eosinophilia and Systemic Symptoms",cat:"Allergien / Dermatologie",def:"Schwere verzögerte Arzneimittelüberempfindlichkeit: Fieber, Lymphadenopathie, Gesichtsschwellung, Exanthem, Eosinophilie, Organbeteiligung. Beginn 2-8 Wochen nach Therapiebeginn. Mortalität ~10%. Auslöser: Carbamazepin, Allopurinol, Sulfonamide, Vancomycin.",ex:"\'DRESS-Syndrom 5 Wochen nach Allopurinol-Beginn — Absetzen, Dermatologie/Hepatologie konsil.\'"},
{term:"AWMF",alt:"Arbeitsgemeinschaft der Wissenschaftlichen Medizinischen Fachgesellschaften",cat:"Abkürzungen / D/A",def:"Zusammenschluss wissenschaftlicher medizinischer Fachgesellschaften in Deutschland. Gibt medizinische Leitlinien (S1/S2/S3) heraus. S3-Leitlinien = höchste Evidenzstufe.",ex:"\'Gemäss AWMF-S3-Leitlinie Herzinsuffizienz wurde Bisoprolol optimiert.\'"},
{term:"Z.n. (Zustand nach)",alt:"St.n. Status nach (A) / St.n. (NL) / ATCD de (FR) / PMHx (EN)",cat:"Abkürzungen / D/A",def:"Zustand nach — beschreibt eine überstandene Erkrankung oder Operation in der Vorgeschichte. Standard in Arztbriefen und Epikrisien.",ex:"\'Z.n. Hüft-TEP links 2021, Z.n. NSTEMI 2019.\'"},
{term:"V.a. (Verdacht auf)",alt:"Verd. op (NL) / Sd (FR) / ? / query (EN)",cat:"Abkürzungen / D/A",def:"Verdacht auf — kennzeichnet eine Verdachtsdiagnose, die noch nicht gesichert ist. Wird häufig im Einweisungsschein und in der vorläufigen Diagnose verwendet.",ex:"\'V.a. tiefe Venenthrombose rechts — Duplex-Sonografie angeordnet.\'"},
{term:"BfArM",alt:"Bundesinstitut für Arzneimittel und Medizinprodukte",cat:"Abkürzungen / D",def:"Bundesbehörde in Deutschland, zuständig für Zulassung von Arzneimitteln und Medizinprodukten sowie Entgegennahme von UAW-Meldungen. Österreichisches Äquivalent: AGES.",ex:"\'Schwerwiegende UAW dem BfArM gemeldet.\'"}],
nl:[
{term:"pDMS",alt:"Perifere Doorbloeding, Motoriek en Sensibiliteit",cat:"Orthopedie",def:"Onderzoek van de perifere doorbloeding, motoriek en sensibiliteit aan de ledematen. Standaard bij letsel, operaties of verdenking op vaat- of zenuwschade.",ex:"'pDMS van beide benen en voeten intakt.'"},
{term:"Swirl sign",alt:"",cat:"Neuroradiologie",def:"CT/MRI-bevinding: hyperdense werveling in een hematoom. Duidt op actieve arteriële bloeding en is een voorspeller van hematoomexpansie.",ex:"'CT toonde een swirl sign in het linkszijdig temporaal hematoom.'"},
{term:"Fazekas-schaal",alt:"Fazekas 0–3",cat:"Neuroradiologie",def:"Graderingssysteem voor wittestofafwijkingen op MRI. Graad 0 = afwezig; Graad 1 = puntvorming; Graad 2 = beginnende confluentie; Graad 3 = groot confluerend gebied.",ex:"'MRI hersenen: wittestofafwijkingen Fazekas 1.'"},
{term:"Wittestofafwijkingen",alt:"Leukoaraiose",cat:"Neuroradiologie",def:"MRI T2-signaalafwijkingen in de witte stof van de hersenen, duidend op kleine-vaatziekte of demyelinisatie. Ingedeeld via de Fazekas-schaal.",ex:"'Matige wittestofafwijkingen, Fazekas 2.'"},
{term:"T2-signaal",alt:"T2-hyperintensiteit",cat:"Radiologie / MRI",def:"Op T2-gewogen MRI-sequenties verschijnen vocht en oedeem helder (hyperintens). T2-signaalveranderingen duiden op pathologische processen (ontsteking, infarct, demyelinisatie).",ex:"'T2-signaalverandering in de rechter temporaalkwab.'"},
{term:"Gamma Knife",alt:"Stereotactische radiochirurgie",cat:"Neurochirurgie / Radiologie",def:"Apparaat voor stereotactische radiochirurgie met gebundelde gammastraling — geen chirurgisch scalpel. Behandeling van hersentumoren, AVM's en akoestische neuromen zonder open operatie.",ex:"'Patiënt gepland voor Gamma Knife-behandeling van links akoestisch neuroom.'"},
{term:"Anterolisthesis",alt:"Anterieure spondylolisthesis",cat:"Neurologie / Wervelkolom",def:"Anterieure verplaatsing van een wervel ten opzichte van de eronder gelegen wervel. Graad I–IV. Veroorzaakt wervelkanaalstenose en zenuwwortelcompressie.",ex:"'Anterolisthesis L4 over L5, graad I.'"},
{term:"Parafalciën meningeoom",alt:"Parasagittaal meningeoom",cat:"Neurologie / Neuroradiologie",def:"Meningeoom grenzend aan de falx cerebri. Kan contralaterale motorische of sensibele uitval veroorzaken.",ex:"'MRI bevestigde 2 cm parafalciën meningeoom rechts.'"},
{term:"Insulaire regio",alt:"Insula / gyrus insularis",cat:"Neurologie / Anatomie",def:"De insulaire cortex, diep gelegen in de Sylvische fissuur. Betrokken bij smaak, pijnverwerking en autonome regulatie. Infarcten kunnen dysartrie en hartritmestoornissen veroorzaken.",ex:"'DWI-restrictie in de linker insulaire regio, passend bij acuut ischemisch infarct.'"},
{term:"CMC-1-gewricht",alt:"Duimzadelsgewricht",cat:"Handchirurgie / Orthopedie",def:"Eerste carpometacarpaalgewricht aan de duimbasis. Typische locatie van rizartrose (duimbasisartrose). Klinische tests: Watson-test, Durkan-test.",ex:"'CMC-1-arthroplastiek rechts verricht.'"},
{term:"SL-gewricht",alt:"Scapholunaat gewricht",cat:"Handchirurgie / Orthopedie",def:"Gewricht tussen het scafoïd (schuitbeentje) en het lunatum (maanbeentje) in het polsgewricht. Dissociatie van dit gewricht (SL-dissociatie) is een veelvoorkomende polsblessure.",ex:"'MRI pols: SL-bandletsel zonder dissociatie.'"},
{term:"TAVI",alt:"Transcatheter aortaklepimplantatie",cat:"Cardiologie / Hartchirurgie",def:"Minimaal-invasieve implantatie van een kunstmatige aortaklep via katheter. Alternatief voor openhartchirurgie bij hoog-risicopatiënten.",ex:"'Transfemoraal TAVI succesvol uitgevoerd.'"},
{term:"Tricuspidaalklep",alt:"Trikuspidaalklep",cat:"Cardiologie",def:"Driebladerige hartklep tussen rechter boezem en rechter kamer. Voorkomt systolisch terugstromen. Pathologie: tricuspidaalinsufficiëntie of -stenose.",ex:"'Lichte tricuspidaalinsufficiëntie op echocardiografie.'"},
{term:"Tendinopathie",alt:"Tendopathie",cat:"Orthopedie / Reumatologie",def:"Peesaandoening. Omvat tendinitis (acute ontsteking) en tendinose (chronische degeneratie). Vroegere term: tendopathie.",ex:"'Supraspinatus-tendinopathie met partiaalscheur.'"},
{term:"Kniebinnenschade",alt:"Intra-articulair knieletsel",cat:"Orthopedie",def:"Verzamelbegrip voor schade en letsels aan het kniegewricht: kruisbanden, menisci, kraakbeen of andere intra-articulaire structuren.",ex:"'MRI bevestigde mediale meniscusscheur als onderdeel van kniebinnenschade.'"},
{term:"Varus- en valgusstress",alt:"",cat:"Orthopedie",def:"Klinische test voor mediaal en lateraal collateraal bandletsel. Valgusstress opent de mediale gewrichtsspleet; varusstress de laterale.",ex:"'Kniegewricht stabiel onder varus- en valgusstress in 0°, 30° en 90°.'"},
{term:"Skidaum",alt:"UCL-ruptuur duim",cat:"Handchirurgie",def:"Ruptuur van het ulnaire collateraalband van het MCP-gewricht van de duim. Veelvoorkomend bij skiën en balsporten. Volledige ruptuur vereist chirurgische reparatie.",ex:"'Skidaum rechts met complete UCL-ruptuur bevestigd.'"},
{term:"A1-pulley",alt:"Eerste annulaire band",cat:"Handchirurgie",def:"Eerste ringband van de buigpeesschede, ter hoogte van het MCP-gewricht. Locatie van stenoserende tendovaginitis ('trekkersvinger'). Behandeling: percutane of open klieving.",ex:"'A1-pulley-klieving verricht bij trigger-wijsvinger links.'"},
{term:"Bakerscyste",alt:"Popliteaalcyste",cat:"Orthopedie / Reumatologie",def:"Synoviale cyste in de knieholte, vaak bij meniscusscheur of gonartrose. Ruptuur kan kuitoedeem veroorzaken (DD: DVT).",ex:"'Echo bevestigde bakerscyste rechts popliteaal.'"},
{term:"Carpaaltunnelsyndroom",alt:"CTS",cat:"Handchirurgie / Neurologie",def:"Compressie van de nervus medianus in het carpale kanaal. Symptomen: nachtelijke paresthesieën in duim, wijs- en middelvinger. Diagnose via NCS of Durkan-test.",ex:"'Bilateraal carpaaltunnelsyndroom bevestigd op NCS.'"},
{term:"FKDS",alt:"Kleurencodeerde Doppler-sonografie",cat:"Radiologie / Vaatchirurgie",def:"Kleurencodeerde Doppler-sonografie — combineert B-mode echografie met kleurkaart van bloedstroom. Voor beoordeling van arteriën en venen.",ex:"'FKDS: stenose van de rechter arteria femoralis superficialis.'"},
{term:"Aortabroekprothese",alt:"Aortabifurcatieprothese",cat:"Vaatchirurgie",def:"Y-vormige vaatprothese ter vervanging van de aortabifurcatie en beide iliacale arteriën. De naam verwijst naar de broekachtige vorm.",ex:"'Bekende aortabroekprothese, controleonderzoek.'"},
{term:"AFS",alt:"Arteria femoralis superficialis",cat:"Vaatchirurgie",def:"Voortzetting van de arteria femoralis communis in het bovenbeen. Meest aangedaan bij perifeer arterieel vaatlijden. Behandeling: stentplaatsing, endarteriëctomie.",ex:"'Afsluiting van de rechter AFS met distale collateraalrecanalisatie.'"},
{term:"Nier-achtergrond-ratio",alt:"",cat:"Nucleaire geneeskunde",def:"Verhouding van de nieractactiviteit ten opzichte van de achtergrondactiviteit bij nierscintigrafie (MAG3, DMSA). Beoordeling van nierfunctie en obstructie.",ex:"'Nier-achtergrond-ratio binnen normale grenzen op MAG3-scan.'"},
{term:"FDG-stapeling",alt:"FDG-opname / FDG-accumulatie",cat:"Nucleaire geneeskunde / Oncologie",def:"Verhoogde opname van fluorodeoxyglucose (FDG) op PET-scan. Duidt op metabolisch actief weefsel — kenmerkend voor maligniteit, actieve infectie of ontsteking.",ex:"'PET-CT: FDG-stapeling in mediastinale lymfeklieren.'"},
{term:"Non-targetlaesies",alt:"Niet-doellaesies",cat:"Oncologie",def:"Volgens RECIST: laesies die niet als doellaesies zijn geselecteerd. Kwalitatieve beoordeling (aanwezig/afwezig, ondubbelzinnige progressie).",ex:"'Stabiele non-targetlaesies. Geen nieuwe laesies.'"},
{term:"Intermetastataal",alt:"Intermetastatale ziekte",cat:"Oncologie",def:"Betrekking hebbend op de ruimte of het interval tussen metastasen. Gebruikt bij beoordeling van spreiding of behandelingsrespons van gemetastaseerde ziekte.",ex:"'Stabiel intermetastataal ziektebeloop op laatste CT.'"},
{term:"Atelectasestreng",alt:"Bandvormige atelectase",cat:"Pulmonologie / Radiologie",def:"Lijn- of bandvormige atelectase — collaps van een klein longgedeelte, zichtbaar als streep op thoraxfoto of CT. Veelvoorkomend postoperatief.",ex:"'Bибasale atelectasestrengen op thoraxfoto, passend bij postoperatieve bevindingen.'"},
{term:"Toegenomen vasculaire tekening",alt:"Verhoogde vaattekening",cat:"Radiologie / Pulmonologie",def:"Op de thoraxfoto zichtbare toename van de longvaattekening, wijzend op pulmonale veneuze stuwing (hartfalen) of verhoogde bloedflow.",ex:"'Thoraxfoto: toegenomen vasculaire tekening beiderzijds.'"},
{term:"Lichtversterkte zones",alt:"Hyperlucente gebieden",cat:"Radiologie",def:"Helderder gebieden op een röntgenfoto, duidend op een lagere weefseldichtheid. Kan wijzen op emfyseem of cysten.",ex:"'Lichtversterkte zones in de rechter bovenkwab op thoraxfoto.'"},
{term:"Streperig",alt:"Streping",cat:"Radiologie",def:"Beschrijvende term voor een streepvormig patroon op een röntgenfoto of CT, zoals bij fibreus weefsel, atelectase of littekenweefsel.",ex:"'Streperige densiteitstoenames beiderzijds basaal.'"},
{term:"X-TWK",alt:"Thoraxwervelkolom röntgen",cat:"Radiologie",def:"Röntgenopname van de thoracale wervelkolom. Gebruikt voor beoordeling van fracturen, kyfose, degeneratieve veranderingen en wervelpathologie.",ex:"'X-TWK: degeneratieve veranderingen T6–T10, geen fractuur.'"},
{term:"X-LWK",alt:"Lumbale wervelkolom röntgen",cat:"Radiologie",def:"Röntgenopname van de lumbale wervelkolom. Indicaties: lage rugpijn, spondylolisthesis, discushernia-evaluatie.",ex:"'X-LWK: anterolisthesis L4 over L5.'"},
{term:"Mamma-C",alt:"Mammografie compressieopname",cat:"Radiologie",def:"Mammografische opname met compressieview (C). Onderdeel van het bevolkingsonderzoek borstkanker (BOB) en diagnostische mammografie.",ex:"'Mamma-C beiderzijds: geen maligne kenmerken.'"},
{term:"LDCT",alt:"Low-dose CT / Lage-dosis CT",cat:"Radiologie",def:"CT-scan met gereduceerde stralingsdosis, gebruikt voor longkankerschreening bij risicogroepen (conform NELSON-protocol).",ex:"'Jaarlijkse LDCT-screening: geen verdachte nodulen.'"},
{term:"Wortel S1 links",alt:"S1-zenuwwortel links",cat:"Neurologie / Wervelkolom",def:"De eerste sacrale zenuwwortel aan de linkerzijde. Uitval veroorzaakt pijn langs het achterste been en de voetzool, verminderd achillespeesreflex.",ex:"'Klinisch beeld passend bij wortelprikkeling S1 links.'"},
{term:"Linkstemporaal / Rechtstemporaal",alt:"",cat:"Neurologie / Neuroradiologie",def:"Betrekking hebbend op de linker of rechter temporaalkwab. Frequent gebruikt in radiologische verslagen en neurologische beschrijvingen.",ex:"'Linkstemporaal corticaal defect op MRI.'"},
{term:"Linksfrontaal / Rechtsfrontaal",alt:"",cat:"Neurologie / Neuroradiologie",def:"Betrekking hebbend op de linker of rechter frontaalkwab. Gebruikt bij beschrijving van tumoren, infarcten of atrofie.",ex:"'Rechtsfrontale laag-grade tumor op MRI.'"},
{term:"IP1-hydrops",alt:"Gewrichtshydrops IP1",cat:"Handchirurgie / Reumatologie",def:"Vochtophoping (hydrops) in het eerste interphalangeaalgewricht. Duidt op gewrichtsontsteking of -overbelasting.",ex:"'IP1-hydrops rechter wijsvinger bij reumatoïde artritis.'"},
{term:"Ossa cuneiformia",alt:"Wigbeenderen",cat:"Anatomie / Orthopedie",def:"De drie wigvormige beenderen van de voet (os cuneiforme mediale, intermediale en laterale). Gelegen tussen de naviculaire en de metatarsalia.",ex:"'Fracuur van het os cuneiforme mediale links.'"},
{term:"Hili",alt:"Mv. van hilus",cat:"Radiologie / Anatomie",def:"Meervoud van hilus. Op thoraxfoto: het gebied van de longwortels, waar de grote bronchiën en vaten de long binnengaan. Vergroot bij lymfadenopathie of tumoren.",ex:"'Vergrotede hili beiderzijds op thoraxfoto.'"},
{term:"Lumbaalpunctie L5-S1",alt:"LP op niveau L5-S1",cat:"Neurologie",def:"Lumbale punctie verricht op het niveau L5-S1. Gebruikt voor liquoronderzoek bij verdenking op meningitis, subarachnoïdale bloeding of demyeliniserende ziekte.",ex:"'Lumbaalpunctie L5-S1: heldere liquor, geen cellen.'"},
{term:"MT5-correctie",alt:"Os metatarsale 5 correctie",cat:"Orthopedie",def:"Chirurgische correctie van een afwijking van het vijfde middenvoetsbeentje. Kan een osteotomie of botresectie omvatten.",ex:"'MT5-correctie links wegens symptoatische bunionette.'"},
{term:"Posterieur-apicaal",alt:"Posterior-apicaal",cat:"Radiologie / Pulmonologie",def:"Verwijzend naar het posterieure en apicale deel van een long of longkwab. Frequent gebruikt bij beschrijving van longafwijkingen.",ex:"'Posterieur-apicale condensatie rechts op CT-thorax.'"},
{term:"Extra-articulair",alt:"",cat:"Orthopedie / Reumatologie",def:"Buiten het gewricht gelegen. Extra-articulaire manifestaties bij reumatoïde artritis omvatten onder meer huidknobbels, vasculitis en serositis.",ex:"'Extra-articulaire manifestaties bij gegeneraliseerde reumatoïde artritis.'"},
{term:"Weke delen",alt:"Weke weefsels",cat:"Radiologie / Chirurgie",def:"Zachte, niet-benige weefsels: spieren, pezen, ligamenten, vetweefsel en fascia. Op beeldvorming: 'weke-delenafwijking' of 'weke-delencomponent'.",ex:"'CT-hals: weke-delenzwelling rechter parotisregio.'"},
{term:"Rechter/linker parotis",alt:"Glandula parotidea",cat:"KNO / Radiologie",def:"De grootste speekselklier, gelegen voor het oor. Parotisaandoeningen omvatten parotitis, stenen en tumoren (pleomorf adenoom, Warthin-tumor).",ex:"'Solide laesie in de rechter parotis op MRI, nader te differentiëren.'"},
{term:"Pancreasregio",alt:"Pancreaspancreasgebied",cat:"Oncologie / Radiologie",def:"Het anatomische gebied van de alvleesklier (pancreas). In oncologische verslagen verwijst 'pancreasregio' naar de locatie van metastasen of tumorgroei in dit gebied.",ex:"'PET-CT: geen FDG-stapeling in de pancreasregio.'"},
{term:"C3 en C4 (oncologie)",alt:"Cervicale wervels / halswervels",cat:"Oncologie / Anatomie",def:"In oncologische context: het derde en vierde cervicale segment. Relevant bij spinale metastasen, lymfadenopathie of tumoruitbreiding naar halswervelkolom.",ex:"'MRI: metastatische laesies op niveau C3–C4.'"},
{term:"Aortabroekprothese",alt:"Bifurcatieprothese",cat:"Vaatchirurgie",def:"Zie ook: aortabroekprothese. Y-vormige vaatprothese voor de aorta en beide iliacale arteriën.",ex:"'Revisie van aortabroekprothese wegens endoleak type II.'"},
{term:"Trombo-embolische complicaties",alt:"",cat:"Vaatchirurgie / Cardiologie",def:"Complicaties als gevolg van trombose of embolie, zoals DVT, longembolie of arteriële embolie. Risicovolle perioden: postoperatief, immobilisatie, maligniteit.",ex:"'Preventie van trombo-embolische complicaties met LMWH postoperatief.'"},
{term:"Midventriculair",alt:"Mid-ventriculair",cat:"Cardiologie",def:"Betrekking hebbend op het midden van de hartkamer (ventrikel). Midventriculaire hypertrofie of obstructie kan voorkomen bij hypertrofische cardiomyopathie.",ex:"'Midventriculaire obstructie bij hypertrofische cardiomyopathie.'"}
,
