// ─── STATE & GLOSSARY LOGIC ──────────────────────────────────────────────────
let lang='en', completed=new Set();

function setLang(l){
  lang=l; completed=new Set();
  document.getElementById('lbl-change-lang').textContent=T[lang].changeLang;
  document.getElementById('lbl-back').textContent=T[lang].back;
  document.getElementById('lbl-back2').textContent=T[lang].backtest;
  document.getElementById('home-title').textContent=T[lang].homeTitle;
  document.getElementById('home-sub').textContent=T[lang].homeSub;
  renderModuleGrid(); updateProgress(); showScreen('s-home');
}

function renderModuleGrid(){
  const grid=document.getElementById('module-grid');
  grid.innerHTML='';
  T[lang].mods.forEach(m=>{
    const done=completed.has(m.id);
    const card=document.createElement('div');
    card.className='mod-card'+(done?' completed':'');
    card.innerHTML=`<div class="mod-icon">${m.icon}</div><div class="mod-title">${m.title}</div><div class="mod-status">${done?'✓ '+m.title:m.status}</div>`;
    card.onclick=()=>openModule(m.id);
    grid.appendChild(card);
  });
  const total=T[lang].mods.length;
  const wrap=document.getElementById('test-launch-wrap');
  if(completed.size===total){
    wrap.innerHTML=`<button class="btn btn-primary" onclick="openFinalTest()">${T[lang].testLaunch}</button>`;
  } else {
    wrap.innerHTML=`<p style="font-size:0.82rem;color:var(--color-text-secondary)">${T[lang].progressLabel(completed.size,total)}</p>`;
  }
}

function updateProgress(){
  const total=T[lang].mods.length;
  const pct=(completed.size/total)*100;
  document.getElementById('overall-progress').style.width=pct+'%';
  document.getElementById('progress-label').textContent=T[lang].progressLabel(completed.size,total);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function openModule(modId){
  const body=document.getElementById('lesson-body');
  body.innerHTML=LESSONS[modId][lang];
  if(modId==='glossary'){
    initGlossaryFilters(lang);
    renderGlossary(lang);
  }
  renderModuleQuiz(modId,body);
  document.getElementById('lesson-btns').innerHTML='';
  showScreen('s-lesson');
}

// ── Glossary rendering ───────────────────────────────────────────────────────
function initGlossaryFilters(l){
  const cats=['All',...new Set(GLOSSARY_DATA[l].map(e=>e.cat))];
  const filterDiv=document.getElementById('gloss-filters-'+l);
  if(!filterDiv)return;
  filterDiv.innerHTML='';
  cats.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='gloss-tag'+(i===0?' active':'');
    btn.textContent=c;
    btn.dataset.cat=c;
    btn.onclick=()=>{
      filterDiv.querySelectorAll('.gloss-tag').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterGlossary(l);
    };
    filterDiv.appendChild(btn);
  });
}

function renderGlossary(l){
  const list=document.getElementById('gloss-list-'+l);
  if(!list)return;
  list.innerHTML='';
  const entries=[...GLOSSARY_DATA[l]].sort((a,b)=>a.term.localeCompare(b.term));
  entries.forEach(entry=>{
    const div=document.createElement('div');
    div.className='gloss-entry';
    div.dataset.term=(entry.term+'|'+(entry.alt||'')+'|'+entry.def+'|'+(entry.ex||'')).toLowerCase();
    div.dataset.cat=entry.cat;
    div.innerHTML=
      `<div><span class="gloss-term">${entry.term}</span>`+
      (entry.alt?`<span class="gloss-alt">${entry.alt}</span>`:'')+
      `<span class="gloss-cat">${entry.cat}</span></div>`+
      `<div class="gloss-def">${entry.def}</div>`+
      (entry.ex?`<div class="gloss-ex">${entry.ex}</div>`:'');
    list.appendChild(div);
  });
}

function filterGlossary(l){
  const searchEl=document.getElementById('gloss-search-'+l);
  const filterDiv=document.getElementById('gloss-filters-'+l);
  const list=document.getElementById('gloss-list-'+l);
  if(!list)return;
  const q=(searchEl?searchEl.value:'').toLowerCase().trim();
  const activeTag=filterDiv?filterDiv.querySelector('.gloss-tag.active'):null;
  const activeCat=activeTag?activeTag.dataset.cat:'All';
  let visible=0;
  list.querySelectorAll('.gloss-entry').forEach(div=>{
    const matchSearch=!q||div.dataset.term.includes(q);
    const matchCat=activeCat==='All'||div.dataset.cat===activeCat;
    if(matchSearch&&matchCat){div.classList.remove('gloss-hidden');visible++;}
    else{div.classList.add('gloss-hidden');}
  });
  let noRes=list.querySelector('.no-results');
  if(visible===0){
    if(!noRes){noRes=document.createElement('p');noRes.className='no-results';list.appendChild(noRes);}
    noRes.textContent='No results found.';
  } else {
    if(noRes)noRes.remove();
  }
}

// ── Module quiz rendering ────────────────────────────────────────────────────
function renderModuleQuiz(modId,container){
  const qs=MODULE_QUIZZES[modId][lang];
  const wrap=document.createElement('div');
  qs.forEach((q,qi)=>{
    const qd=document.createElement('div'); qd.className='quiz-q';
    qd.innerHTML=`<p>${qi+1}. ${q.q}</p>`;
    q.opts.forEach((opt,oi)=>{
      const btn=document.createElement('button'); btn.className='quiz-opt'; btn.textContent=opt;
      btn.onclick=()=>{
        if(btn.classList.contains('disabled'))return;
        qd.querySelectorAll('.quiz-opt').forEach(b=>{
          b.classList.add('disabled');
          if(b===btn){b.classList.add(oi===q.ans?'correct':'wrong');}
          else if(b.textContent===q.opts[q.ans]){b.classList.add('correct');}
        });
        if(q.exp){
          const fb=document.createElement('div'); fb.className='feedback '+(oi===q.ans?'ok':'bad');
          fb.textContent=q.exp; qd.appendChild(fb);
        }
        checkAllAnswered(modId,container,qs.length);
      };
      qd.appendChild(btn);
    });
    wrap.appendChild(qd);
  });
  container.appendChild(wrap);
}

function checkAllAnswered(modId,container,total){
  const answered=container.querySelectorAll('.quiz-opt.correct,.quiz-opt.wrong').length;
  if(answered>=total&&!completed.has(modId)){
    completed.add(modId); updateProgress(); renderModuleGrid();
    const btns=document.getElementById('lesson-btns');
    btns.innerHTML=`<button class="btn btn-primary" onclick="showScreen('s-home')">${T[lang].back} →</button>`;
  }
}

// ── Final test ───────────────────────────────────────────────────────────────
function openFinalTest(){
  document.getElementById('test-title').textContent=T[lang].testTitle;
  document.getElementById('test-sub').textContent=T[lang].testSub;
  const body=document.getElementById('test-body'); body.innerHTML='';
  const questions=FINAL_TEST[lang];
  const answers=new Array(questions.length).fill(null);
  const form=document.createElement('div');
  questions.forEach((q,qi)=>{
    const qd=document.createElement('div'); qd.className='quiz-q';
    qd.innerHTML=`<p>${qi+1}. ${q.q}</p>`;
    q.opts.forEach((opt,oi)=>{
      const btn=document.createElement('button'); btn.className='quiz-opt'; btn.textContent=opt;
      btn.onclick=()=>{
        if(btn.classList.contains('disabled'))return;
        qd.querySelectorAll('.quiz-opt').forEach(b=>b.style.fontWeight='400');
        btn.style.fontWeight='500'; answers[qi]=oi;
      };
      qd.appendChild(btn);
    });
    form.appendChild(qd);
  });
  const submitBtn=document.createElement('button');
  submitBtn.className='btn btn-primary'; submitBtn.style.marginTop='1rem';
  submitBtn.textContent=T[lang].submit;
  submitBtn.onclick=()=>{
    const unanswered=answers.filter(a=>a===null).length;
    if(unanswered>0){alert(`Please answer all ${unanswered} remaining question(s).`);return;}
    let score=0;
    form.querySelectorAll('.quiz-q').forEach((qd,qi)=>{
      qd.querySelectorAll('.quiz-opt').forEach((btn,oi)=>{
        btn.classList.add('disabled');
        if(oi===questions[qi].ans)btn.classList.add('correct');
        else if(oi===answers[qi])btn.classList.add('wrong');
      });
      if(answers[qi]===questions[qi].ans)score++;
    });
    submitBtn.remove();
    const passed=score>=23;
    const result=document.createElement('div');
    result.style.cssText='text-align:center;margin-top:1.5rem';
    result.innerHTML=`<div class="score-circle" style="border-color:${passed?'#1D9E75':'#E24B4A'}"><span class="score-num">${score}</span><span class="score-label">/ ${questions.length}</span></div><p style="font-size:1.1rem;font-weight:500;color:${passed?'#0F6E56':'#A32D2D'}">${passed?T[lang].passed:T[lang].failed}</p><p style="font-size:0.85rem;color:var(--color-text-secondary);margin-top:0.5rem">${T[lang].score(score,questions.length)}</p>`;
    const restartBtn=document.createElement('button');
    restartBtn.className='btn'; restartBtn.style.marginTop='1rem'; restartBtn.textContent=T[lang].restart;
    restartBtn.onclick=()=>showScreen('s-home');
    result.appendChild(restartBtn);
    body.appendChild(result);
    body.scrollIntoView({behavior:'smooth',block:'start'});
  };
  form.appendChild(submitBtn);
  body.appendChild(form);
  showScreen('s-test');
}
</script>
