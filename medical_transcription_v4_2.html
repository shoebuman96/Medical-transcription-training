<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Transcription Training</title>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;color:var(--color-text-primary);background:transparent}
.screen{display:none;padding:1.5rem 0}.screen.active{display:block}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;max-width:400px;margin:2rem auto}
.lang-btn{padding:1.5rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);cursor:pointer;font-size:1rem;font-weight:500;text-align:center;transition:background 0.15s;font-family:'DM Sans',sans-serif}
.lang-btn:hover{background:var(--color-background-secondary)}
.lang-flag{font-size:2rem;display:block;margin-bottom:0.5rem}
.module-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-top:1.5rem}
.mod-card{padding:1.25rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);cursor:pointer;transition:border-color 0.15s}
.mod-card:hover{border-color:var(--color-border-primary)}.mod-card.completed{border-color:#1D9E75}
.mod-icon{font-size:1.5rem;margin-bottom:0.5rem}.mod-title{font-size:0.9rem;font-weight:500}.mod-status{font-size:0.75rem;color:var(--color-text-secondary);margin-top:4px}
.progress-bar-wrap{background:var(--color-background-secondary);border-radius:99px;height:6px;margin:1rem 0}
.progress-bar{height:6px;border-radius:99px;background:#1D9E75;transition:width 0.4s}
.lesson-content{max-width:700px}
h1{font-size:1.5rem;font-weight:500;margin-bottom:0.5rem}
h2{font-size:1.05rem;font-weight:500;margin:1.75rem 0 0.75rem;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary)}
h3{font-size:0.9rem;font-weight:500;margin:1rem 0 0.4rem;color:var(--color-text-secondary)}
.subtitle{font-size:0.9rem;color:var(--color-text-secondary);margin-bottom:1.5rem}
.info-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem 1.25rem;margin-bottom:1rem;font-size:0.875rem;line-height:1.6}
.info-card h3{margin-top:0;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.04em}
table{width:100%;border-collapse:collapse;font-size:0.82rem;margin:0.5rem 0 1rem}
th{text-align:left;padding:6px 8px;background:var(--color-background-secondary);font-weight:500;font-size:0.78rem;color:var(--color-text-secondary)}
td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top;line-height:1.5}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:0.72rem;font-weight:500;white-space:nowrap}
.badge-normal{background:#EAF3DE;color:#3B6D11}
.badge-alert{background:#FCEBEB;color:#A32D2D}
.badge-caution{background:#FAEEDA;color:#854F0B}
.badge-info{background:#E6F1FB;color:#185FA5}
.badge-high{background:#FCEBEB;color:#A32D2D}
.badge-low{background:#E6F1FB;color:#185FA5}
.badge-specialty{background:#F0E8FF;color:#5B21B6}
.btn{padding:0.6rem 1.25rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:0.9rem;font-weight:500;color:var(--color-text-primary);font-family:'DM Sans',sans-serif}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#1D9E75;border-color:#1D9E75;color:#fff}.btn-primary:hover{background:#0F6E56}
.btn-row{display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap}
.quiz-q{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.quiz-q p{font-size:0.95rem;font-weight:500;margin-bottom:0.75rem}
.quiz-opt{display:block;padding:0.5rem 0.75rem;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:0.875rem;margin:0.3rem 0;text-align:left;width:100%;color:var(--color-text-primary);font-family:'DM Sans',sans-serif}
.quiz-opt:hover{border-color:var(--color-border-primary)}
.quiz-opt.correct{background:#EAF3DE;border-color:#1D9E75;color:#27500A}
.quiz-opt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.quiz-opt.disabled{cursor:not-allowed}
.feedback{font-size:0.82rem;margin-top:0.5rem;padding:0.4rem 0.75rem;border-radius:var(--border-radius-md)}
.feedback.ok{background:#EAF3DE;color:#27500A}.feedback.bad{background:#FCEBEB;color:#791F1F}
.score-circle{width:120px;height:120px;border-radius:50%;border:4px solid #1D9E75;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:1.5rem auto}
.score-num{font-size:2rem;font-weight:500}.score-label{font-size:0.75rem;color:var(--color-text-secondary)}
.back-link{font-size:0.85rem;color:var(--color-text-secondary);cursor:pointer;margin-bottom:1rem;display:inline-block}
.back-link:hover{color:var(--color-text-primary)}
.pill-row{display:flex;flex-wrap:wrap;gap:0.4rem;margin:0.5rem 0}
.pill{padding:3px 10px;border-radius:99px;font-size:0.8rem;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.abbr-table td:first-child{font-weight:500;color:#185FA5;font-size:0.85rem;width:80px}
.imaging-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:1rem;overflow:hidden}
.imaging-card-header{padding:0.75rem 1rem;background:var(--color-background-secondary);display:flex;align-items:center;gap:0.75rem}
.imaging-card-header .ic-icon{font-size:1.25rem}
.imaging-card-header .ic-title{font-weight:500;font-size:0.95rem}
.imaging-card-header .ic-badge{margin-left:auto}
.imaging-card-body{padding:0.85rem 1rem;font-size:0.85rem;line-height:1.65}
.imaging-card-body .tissue-row{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.5rem}
.tissue-pill{padding:2px 9px;border-radius:99px;font-size:0.75rem;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
@media(max-width:480px){.two-col{grid-template-columns:1fr}}

/* ── Glossary browser ── */
.glossary-search-wrap{position:sticky;top:0;background:var(--color-background-primary);padding:0.75rem 0 0.5rem;z-index:10}
.glossary-search{width:100%;padding:0.55rem 0.85rem;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:0.9rem;background:var(--color-background-secondary);color:var(--color-text-primary);font-family:'DM Sans',sans-serif;outline:none}
.glossary-search:focus{border-color:#1D9E75}
.glossary-filter-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin:0.5rem 0 1rem}
.gloss-tag{padding:3px 10px;border-radius:99px;font-size:0.78rem;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--color-text-primary)}
.gloss-tag.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
.gloss-entry{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:0.75rem 1rem;margin-bottom:0.5rem;transition:border-color 0.12s}
.gloss-entry:hover{border-color:var(--color-border-primary)}
.gloss-term{font-weight:600;font-size:0.92rem;font-family:'DM Mono',monospace;color:#185FA5}
.gloss-alt{font-size:0.78rem;color:var(--color-text-secondary);margin-left:0.5rem}
.gloss-cat{font-size:0.72rem;padding:1px 7px;border-radius:99px;background:#F0E8FF;color:#5B21B6;margin-left:0.5rem;white-space:nowrap}
.gloss-def{font-size:0.83rem;color:var(--color-text-primary);margin-top:0.35rem;line-height:1.55}
.gloss-ex{font-size:0.78rem;color:var(--color-text-secondary);margin-top:0.25rem;font-style:italic}
.gloss-hidden{display:none}
.no-results{font-size:0.85rem;color:var(--color-text-secondary);padding:1rem 0;text-align:center}
</style>

<div id="app">

<div id="s-lang" class="screen active">
  <div style="text-align:center;padding:2rem 0 1rem">
    <div style="font-size:0.8rem;color:var(--color-text-secondary);letter-spacing:0.06em;margin-bottom:0.5rem">MEDICAL TRANSCRIPTION TRAINING</div>
    <h1 style="font-size:1.8rem">Select your language</h1>
    <p class="subtitle">Choose the language for your training course</p>
  </div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="setLang('en')"><span class="lang-flag">🇬🇧</span>English</button>
    <button class="lang-btn" onclick="setLang('de')"><span class="lang-flag">🇩🇪</span>Deutsch</button>
    <button class="lang-btn" onclick="setLang('nl')"><span class="lang-flag">🇳🇱</span>Nederlands</button>
    <button class="lang-btn" onclick="setLang('fr')"><span class="lang-flag">🇫🇷</span>Français</button>
  </div>
</div>

<div id="s-home" class="screen">
  <div style="font-size:0.8rem;color:var(--color-text-secondary);letter-spacing:0.06em;cursor:pointer" onclick="showScreen('s-lang')">← <span id="lbl-change-lang"></span></div>
  <div style="margin:1.25rem 0 0.25rem"><h1 id="home-title"></h1></div>
  <p id="home-sub" class="subtitle"></p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="overall-progress" style="width:0%"></div></div>
  <p style="font-size:0.8rem;color:var(--color-text-secondary)" id="progress-label"></p>
  <div class="module-grid" id="module-grid"></div>
  <div style="margin-top:1.5rem" id="test-launch-wrap"></div>
</div>

<div id="s-lesson" class="screen">
  <span class="back-link" onclick="showScreen('s-home')">← <span id="lbl-back"></span></span>
  <div id="lesson-body" class="lesson-content"></div>
  <div class="btn-row" id="lesson-btns"></div>
</div>

<div id="s-test" class="screen">
  <span class="back-link" onclick="showScreen('s-home')">← <span id="lbl-back2"></span></span>
  <h1 id="test-title"></h1>
  <p id="test-sub" class="subtitle"></p>
  <div id="test-body"></div>
</div>

</div>

const LESSONS={
vitals:{
en:`<h1>Vitals &amp; Measurements</h1><p class="subtitle">Understanding the numbers that appear in every clinical note.</p>
<h2>Blood pressure (BP)</h2><div class="info-card"><p>Force of blood against artery walls. Written as systolic / diastolic in mmHg (e.g. 120/80 mmHg).</p></div>
<table><tr><th>Category</th><th>Systolic</th><th>Diastolic</th><th>Status</th></tr>
<tr><td>Normal</td><td>&lt;120</td><td>&lt;80</td><td><span class="badge badge-normal">Normal</span></td></tr>
<tr><td>Elevated</td><td>120–129</td><td>&lt;80</td><td><span class="badge badge-caution">Caution</span></td></tr>
<tr><td>Stage 1 hypertension</td><td>130–139</td><td>80–89</td><td><span class="badge badge-caution">Caution</span></td></tr>
<tr><td>Stage 2 hypertension</td><td>≥140</td><td>≥90</td><td><span class="badge badge-alert">Alert</span></td></tr>
<tr><td>Hypotension</td><td>&lt;90</td><td>&lt;60</td><td><span class="badge badge-alert">Alert</span></td></tr></table>
<h2>Heart rate (HR)</h2><div class="info-card"><p>Normal adult: <strong>60–100 bpm</strong>. Below 60 = bradycardia. Above 100 = tachycardia.</p></div>
<h2>Respiratory rate (RR)</h2><div class="info-card"><p>Normal adult: <strong>12–20 breaths/min</strong>. Rapid breathing (&gt;20) = tachypnoea. Slow breathing (&lt;12) = bradypnoea. In severe respiratory distress, accessory muscles are recruited — this is called <strong>orthopnoea</strong> when lying flat triggers the dyspnoea.</p></div>
<h2>Temperature</h2>
<table><tr><th>Reading</th><th>°C</th><th>°F</th><th>Interpretation</th></tr>
<tr><td>Normal</td><td>36.1–37.2</td><td>97–99</td><td><span class="badge badge-normal">Normal</span></td></tr>
<tr><td>Low-grade fever</td><td>37.3–38.0</td><td>99.1–100.4</td><td><span class="badge badge-caution">Caution</span></td></tr>
<tr><td>Fever / pyrexia</td><td>≥38.1</td><td>≥100.6</td><td><span class="badge badge-alert">Alert</span></td></tr>
<tr><td>Hypothermia</td><td>&lt;35.0</td><td>&lt;95</td><td><span class="badge badge-alert">Alert</span></td></tr></table>
<h2>Oxygen saturation (SpO₂)</h2><div class="info-card"><p>Normal: <strong>95–100%</strong>. Below 94% warrants attention. Below 90% = hypoxia requiring intervention.</p></div>
<h2>BMI</h2>
<table><tr><th>BMI</th><th>Classification</th></tr>
<tr><td>&lt;18.5</td><td>Underweight</td></tr><tr><td>18.5–24.9</td><td><span class="badge badge-normal">Healthy weight</span></td></tr>
<tr><td>25.0–29.9</td><td><span class="badge badge-caution">Overweight</span></td></tr><tr><td>≥30.0</td><td><span class="badge badge-alert">Obese</span></td></tr></table>
<h2>Glasgow Coma Scale (GCS)</h2>
<div class="info-card"><p>Neurological assessment tool: <strong>Eye opening (E)</strong> 1–4 + <strong>Verbal response (V)</strong> 1–5 + <strong>Motor response (M)</strong> 1–6. Total 3–15. GCS &le;8 = intubation threshold. Always document as E/V/M individually (e.g. GCS 9 = E3V2M4).</p></div>
<h2>Pain scale (NRS 0–10)</h2>
<div class="info-card"><p>0 = no pain &bull; 1–3 = mild &bull; 4–6 = moderate &bull; 7–10 = severe. Always transcribe the scale used and the score (e.g. &quot;pain 7/10 NRS&quot;).</p></div>
<h2>SpO&#8322; targets</h2>
<div class="info-card"><p>Normal: 95–100%. Below 90% = hypoxia — urgent intervention. <strong>COPD target: 88–92%</strong> (NHS/NICE) to avoid suppressing the hypoxic drive.</p></div>
<h2>Quick-check quiz</h2>`,
de:`<h1>Vitalwerteparameter &amp; Messungen</h1><p class="subtitle">Die Zahlen in jedem klinischen Bericht verstehen.</p>
<h2>Blutdruck (BD, RR)</h2><div class="info-card"><p>Druck des Blutes gegen die Arterienwände. Angabe: systolisch / diastolisch in mmHg (z.B. 120/80 mmHg). In Deutschland wird der Blutdruck häufig als <strong>BD</strong> oder <strong>RR</strong> (nach Riva-Rocci) abgekürzt.</p></div>
<h3>Blutdruckkategorien (DGK/ESC 2024 — Tabelle 3, Praxisblutdruck)</h3>
<table><tr><th>Kategorie</th><th>Systolisch (mmHg)</th><th>Diastolisch (mmHg)</th><th>Status</th></tr>
<tr><td>Nicht erhöhter Blutdruck</td><td>&lt; 120</td><td>&lt; 70</td><td><span class="badge badge-normal">Normal</span></td></tr>
<tr><td>Erhöhter Blutdruck</td><td>120 – &lt; 140</td><td>70 – &lt; 90</td><td><span class="badge badge-caution">Achtung</span></td></tr>
<tr><td>Hypertonie</td><td>≥ 140</td><td>≥ 90</td><td><span class="badge badge-alert">Warnung</span></td></tr></table>
<div class="info-card"><p>Die ESC/DGK 2024 verwenden nur diese drei Kategorien. Die ältere Unterteilung in Hypertonie Grad 1/2/3 (aus früheren ESH/ESC-Leitlinien) erscheint weiterhin in manchen klinischen Diktaten und Arztbriefen: Grad 1 = 140–159/90–99 · Grad 2 = 160–179/100–109 · Grad 3 = ≥ 180/≥ 110 (nach ESH 2023/NVL 2023). Beim <em>erhöhten Blutdruck</em> richtet sich die Therapieentscheidung nach kardiovaskulärem Risiko (SCORE2/SCORE2-OP), nicht allein nach dem Zahlenwert. Quelle: McEvoy JW et al., ESC 2024, Eur Heart J; DGK Pocket-Leitlinie 2024.</p></div>
<h3>Hypertonie-Stadien (ESH 2023 / NVL 2023 — nach Organschaden, nicht nach Zahlenwert)</h3>
<div class="info-card"><p>Die Stadien I–III beschreiben den Erkrankungsgrad der Hypertonie anhand von Organschäden und Begleiterkrankungen — <strong>unabhängig vom gemessenen Blutdruckwert</strong>. <strong>Grad ≠ Stadium.</strong> Ein Patient kann z.B. eine Hypertonie Grad 1 im Stadium III haben.</p></div>
<table><tr><th>Stadium</th><th>Kriterien</th><th>Status</th></tr>
<tr><td><strong>Stadium I</strong></td><td>Unkomplizierte Hypertonie — kein HMOD, keine CVD, kein Diabetes (inkl. CKD Grad 1 und 2)</td><td><span class="badge badge-caution">Achtung</span></td></tr>
<tr><td><strong>Stadium II</strong></td><td>Leichter HMOD <em>oder</em> CKD Stadium 3 <em>oder</em> Diabetes mellitus</td><td><span class="badge badge-alert">Warnung</span></td></tr>
<tr><td><strong>Stadium III</strong></td><td>Etablierte CVD (Koronare Herzkrankheit, Schlaganfall, pAVK, Herzinsuffizienz) <em>oder</em> CKD Grad 4 oder 5</td><td><span class="badge badge-high">Kritisch</span></td></tr></table>
<div class="info-card"><p><strong>HMOD</strong> = Hypertonie-bedingte Organschäden (hypertension-mediated organ damage): z.B. linksventrikuläre Hypertrophie (LVH), Mikroalbuminurie, Karotis-IMT-Verdickung, hypertensive Retinopathie. Quelle: ESH 2023; NVL Hypertonie 2023.</p></div>
<h2>Herzfrequenz (HF)</h2><div class="info-card"><p>Normal: <strong>60–100/min</strong>. Unter 60 = Bradykardie. Über 100 = Tachykardie.</p></div>
<table><tr><th>Messung</th><th>Interpretation</th><th>Zustand</th></tr>
<tr><td>60–100/min</td><td>Normal</td><td>Normale Herzfrequenz</td></tr>
<tr><td>&lt; 60/min</td><td>Langsam</td><td>Bradykardie</td></tr>
<tr><td>&gt; 100/min</td><td>Schnell</td><td>Tachykardie</td></tr></table>
<h2>Atemfrequenz (AF)</h2><div class="info-card"><p>Normal: <strong>12–20/min</strong>. Schnell (&gt; 20/min) = Tachypnoe. Langsam (&lt; 12/min) = Bradypnoe. Bei schwerer Atemnot werden Atemhilfsmuskeln eingesetzt. Orthopnoe = Atemnot im Liegen mit Besserung im Sitzen.</p></div>
<table><tr><th>Messung</th><th>Interpretation</th><th>Zustand</th></tr>
<tr><td>12–20/min</td><td>Normal</td><td>Normale Atmung</td></tr>
<tr><td>&lt; 12/min</td><td>Langsam</td><td>Bradypnoe</td></tr>
<tr><td>&gt; 20/min</td><td>Schnell</td><td>Tachypnoe</td></tr></table>
<h2>Temperatur</h2>
<table><tr><th>Wert</th><th>°C</th><th>Interpretation</th></tr>
<tr><td>Normal</td><td>36,1–37,2</td><td><span class="badge badge-normal">Normal</span></td></tr>
<tr><td>Subfebrile Temperatur</td><td>37,3–38,0</td><td><span class="badge badge-caution">Achtung</span></td></tr>
<tr><td>Fieber (Pyrexie)</td><td>≥ 38,1</td><td><span class="badge badge-alert">Warnung</span></td></tr>
<tr><td>Hypothermie</td><td>&lt; 35,0</td><td><span class="badge badge-alert">Warnung</span></td></tr></table>
<h2>Sauerstoffsättigung (SpO₂)</h2><div class="info-card"><p>Normal: <strong>95–100%</strong>. Unter 94% = Überwachung erforderlich. Unter 90% = Hypoxie — Intervention erforderlich.</p></div>
<h2>BMI</h2>
<table><tr><th>BMI</th><th>Klassifikation</th></tr>
<tr><td>&lt; 18,5</td><td>Untergewicht</td></tr><tr><td>18,5–24,9</td><td><span class="badge badge-normal">Normalgewicht</span></td></tr>
<tr><td>25,0–29,9</td><td><span class="badge badge-caution">Übergewicht</span></td></tr><tr><td>≥ 30,0</td><td><span class="badge badge-alert">Adipositas</span></td></tr></table>
<h2>Glasgow Coma Scale (GCS)</h2>
<div class="info-card"><p>Neurologisches Beurteilungsinstrument: <strong>Augenöffnen (A)</strong> 1–4 + <strong>Verbale Reaktion (V)</strong> 1–5 + <strong>Motorische Reaktion (M)</strong> 1–6. Gesamt 3–15. GCS ≤ 8 = Intubationsindikation. Immer als A/V/M einzeln dokumentieren (z.B. GCS 9 = A3V2M4).</p></div>
<h2>Schmerzskala (NRS 0–10)</h2>
<div class="info-card"><p>0 = kein Schmerz &bull; 1–3 = leicht &bull; 4–6 = mittelgradig &bull; 7–10 = stark. Immer Skala und Wert transkribieren (z.B. „Schmerz 7/10 NRS").</p></div>
<h2>SpO₂-Zielwerte</h2>
<div class="info-card"><p>Normal: 95–100 %. Unter 90 % = Hypoxie — dringend handeln. <strong>COPD-Zielwert: 88–92 %</strong> (AWMF NVL COPD) — um den hypoxischen Atemantrieb nicht zu unterdrücken.</p></div>
<h2>Kurzes Quiz</h2>`,
nl:`<h1>Vitale functies &amp; metingen</h1><p class="subtitle">De getallen begrijpen die in elke klinische notitie voorkomen.</p>
<h2>Bloeddruk (BD)</h2><div class="info-card"><p>Druk van bloed op de slagaderwanden. Notatie: systolisch / diastolisch in mmHg (bijv. BD 120/80 mmHg). In Nederlandstalige verslagen afgekort als <strong>BD</strong> of <strong>RR</strong>.</p></div>
<table><tr><th>Categorie</th><th>Systolisch</th><th>Diastolisch</th><th>Status</th></tr>
<tr><td>Normaal</td><td>&lt;120</td><td>&lt;80</td><td><span class="badge badge-normal">Normaal</span></td></tr>
<tr><td>Verhoogd</td><td>120–129</td><td>&lt;80</td><td><span class="badge badge-caution">Let op</span></td></tr>
<tr><td>Hypertensie graad 1</td><td>130–139</td><td>80–89</td><td><span class="badge badge-caution">Let op</span></td></tr>
<tr><td>Hypertensie graad 2</td><td>≥140</td><td>≥90</td><td><span class="badge badge-alert">Alarm</span></td></tr>
<tr><td>Hypotensie</td><td>&lt;90</td><td>&lt;60</td><td><span class="badge badge-alert">Alarm</span></td></tr></table>
<h2>Hartfrequentie (HF)</h2><div class="info-card"><p>Normaal: <strong>60–100 spm</strong> (slagen per minuut). Onder 60 = bradycardie. Boven 100 = tachycardie.</p></div>
<table><tr><th>Meting</th><th>Interpretatie</th><th>Toestand</th></tr>
<tr><td>60–100 spm</td><td>Normaal</td><td>Normaal sinusritme</td></tr>
<tr><td>&lt;60 spm</td><td>Langzaam</td><td>Bradycardie</td></tr>
<tr><td>&gt;100 spm</td><td>Snel</td><td>Tachycardie</td></tr></table>
<h2>Ademhalingsfrequentie (AF)</h2><div class="info-card"><p>Normaal: <strong>12–20/min</strong>. Snel (&gt;20) = tachypneu. Traag (&lt;12) = bradypneu. Bij ernstige dyspneu en orthopneu worden hulpademhalingsspieren ingezet.</p></div>
<table><tr><th>Meting</th><th>Interpretatie</th><th>Toestand</th></tr>
<tr><td>12–20/min</td><td>Normaal</td><td>Normale ademhaling</td></tr>
<tr><td>&lt;12/min</td><td>Langzaam</td><td>Bradypneu</td></tr>
<tr><td>&gt;20/min</td><td>Snel</td><td>Tachypneu</td></tr></table>
<h2>Temperatuur</h2>
<table><tr><th>Waarde</th><th>°C</th><th>Interpretatie</th></tr>
<tr><td>Normaal</td><td>36,1–37,2</td><td><span class="badge badge-normal">Normaal</span></td></tr>
<tr><td>Licht verhoogd (subfebriel)</td><td>37,3–38,0</td><td><span class="badge badge-caution">Let op</span></td></tr>
<tr><td>Koorts (pyrexie)</td><td>≥38,1</td><td><span class="badge badge-alert">Alarm</span></td></tr>
<tr><td>Hypothermie</td><td>&lt;35,0</td><td><span class="badge badge-alert">Alarm</span></td></tr></table>
<h2>Zuurstofsaturatie (SpO₂)</h2><div class="info-card"><p>Normaal: <strong>95–100%</strong>. Onder 94% = bewaking vereist. Onder 90% = hypoxie (zuurstoftekort in het bloed) — interventie vereist.</p></div>
<h2>BMI</h2>
<table><tr><th>BMI</th><th>Classificatie</th></tr>
<tr><td>&lt;18,5</td><td>Ondergewicht</td></tr><tr><td>18,5–24,9</td><td><span class="badge badge-normal">Gezond gewicht</span></td></tr>
<tr><td>25,0–29,9</td><td><span class="badge badge-caution">Overgewicht</span></td></tr><tr><td>≥30,0</td><td><span class="badge badge-alert">Obesitas</span></td></tr></table>
<h2>Glasgow Coma Scale (GCS)</h2>
<div class="info-card"><p>Neurologisch beoordelingsinstrument: <strong>Oogopening (E)</strong> 1–4 + <strong>Verbale reactie (V)</strong> 1–5 + <strong>Motorische reactie (M)</strong> 1–6. Totaal 3–15. GCS ≤8 = intubatiedrempel. Altijd als E/V/M apart documenteren (bijv. GCS 9 = E3V2M4).</p></div>
<h2>Pijnschaal (NRS 0–10)</h2>
<div class="info-card"><p>0 = geen pijn &bull; 1–3 = licht &bull; 4–6 = matig &bull; 7–10 = ernstig. Altijd schaal en score noteren (bijv. "pijn 7/10 NRS").</p></div>
<h2>SpO₂-streefwaarden</h2>
<div class="info-card"><p>Normaal: 95–100%. Onder 90% = hypoxie — direct ingrijpen. <strong>COPD-streefwaarde: 88–92%</strong> (NHG COPD-standaard) — om de hypoxische ademdrift te bewaren.</p></div>
<h2>Korte quiz</h2>`,
fr:`<h1>Constantes vitales &amp; mesures</h1><p class="subtitle">Comprendre les chiffres présents dans chaque note clinique.</p>
<h2>Pression artérielle (PA)</h2><div class="info-card"><p>Pression du sang sur les parois artérielles, en mmHg (ex : 120/80). Notée <strong>PA</strong> ou <strong>TA</strong> (tension artérielle) dans le monde francophone.</p></div>
<table><tr><th>Catégorie</th><th>Systolique</th><th>Diastolique</th><th>Statut</th></tr>
<tr><td>Normale</td><td>&lt;120</td><td>&lt;80</td><td><span class="badge badge-normal">Normale</span></td></tr>
<tr><td>Élevée</td><td>120–129</td><td>&lt;80</td><td><span class="badge badge-caution">Attention</span></td></tr>
<tr><td>HTA stade 1</td><td>130–139</td><td>80–89</td><td><span class="badge badge-caution">Attention</span></td></tr>
<tr><td>HTA stade 2</td><td>≥140</td><td>≥90</td><td><span class="badge badge-alert">Alerte</span></td></tr>
<tr><td>Hypotension</td><td>&lt;90</td><td>&lt;60</td><td><span class="badge badge-alert">Alerte</span></td></tr></table>
<h2>Fréquence cardiaque (FC)</h2><div class="info-card"><p>Normale : <strong>60–100 bpm</strong>. Sous 60 = bradycardie. Au-dessus de 100 = tachycardie.</p></div>
<table><tr><th>Mesure</th><th>Interprétation</th><th>Pathologie</th></tr>
<tr><td>60–100 bpm</td><td>Normale</td><td>Rythme sinusal normal</td></tr>
<tr><td>&lt;60 bpm</td><td>Lente</td><td>Bradycardie</td></tr>
<tr><td>&gt;100 bpm</td><td>Rapide</td><td>Tachycardie</td></tr></table>
<h2>Fréquence respiratoire (FR)</h2><div class="info-card"><p>Normale : <strong>12–20/min</strong>. Rapide (&gt;20) = tachypnée. Lente (&lt;12) = bradypnée. En cas de détresse respiratoire grave, les muscles respiratoires accessoires sont sollicités ; on parle d'orthopnée lorsque la position allongée provoque une dyspnée.</p></div>
<table><tr><th>Mesure</th><th>Interprétation</th><th>Pathologie</th></tr>
<tr><td>12–20/min</td><td>Normale</td><td>Respiration normale</td></tr>
<tr><td>&lt;12/min</td><td>Lente</td><td>Bradypnée</td></tr>
<tr><td>&gt;20/min</td><td>Rapide</td><td>Tachypnée</td></tr></table>
<h2>Température</h2>
<table><tr><th>Valeur</th><th>°C</th><th>Interprétation</th></tr>
<tr><td>Normale</td><td>36,1–37,2</td><td><span class="badge badge-normal">Normale</span></td></tr>
<tr><td>Fièvre légère (fébricule)</td><td>37,3–38,0</td><td><span class="badge badge-caution">Attention</span></td></tr>
<tr><td>Fièvre / pyrexie</td><td>≥38,1</td><td><span class="badge badge-alert">Alerte</span></td></tr>
<tr><td>Hypothermie</td><td>&lt;35,0</td><td><span class="badge badge-alert">Alerte</span></td></tr></table>
<h2>Saturation en oxygène (SpO₂)</h2><div class="info-card"><p>Normale : <strong>95–100%</strong>. Sous 94% = surveillance. Sous 90% = hypoxie — intervention requise.</p></div>
<h2>IMC</h2>
<table><tr><th>IMC</th><th>Classification</th></tr>
<tr><td>&lt;18,5</td><td>Insuffisance pondérale</td></tr><tr><td>18,5–24,9</td><td><span class="badge badge-normal">Poids normal</span></td></tr>
<tr><td>25,0–29,9</td><td><span class="badge badge-caution">Surpoids</span></td></tr><tr><td>≥30,0</td><td><span class="badge badge-alert">Obésité</span></td></tr></table>
<h2>Échelle de Glasgow (GCS)</h2>
<div class="info-card"><p>Outil d'évaluation neurologique : <strong>Ouverture des yeux (Y)</strong> 1–4 + <strong>Réponse verbale (V)</strong> 1–5 + <strong>Réponse motrice (M)</strong> 1–6. Total 3–15. GCS ≤8 = seuil d'intubation. Toujours noter Y/V/M séparément (ex. GCS 9 = Y3V2M4).</p></div>
<h2>Échelle numérique de douleur (EN 0–10)</h2>
<div class="info-card"><p>0 = absence de douleur &bull; 1–3 = légère &bull; 4–6 = modérée &bull; 7–10 = sévère. Toujours noter l'échelle utilisée et le score (ex. « douleur 7/10 à l'EN »).</p></div>
<h2>Objectifs SpO₂</h2>
<div class="info-card"><p>Normale : 95–100 %. Sous 90 % = hypoxie — intervention urgente. <strong>Cible BPCO : 88–92 %</strong> (recommandations HAS/SPLF) — pour ne pas supprimer le stimulus hypoxique.</p></div>

meds:{
en:`<h1>Medications &amp; Dosages</h1><p class="subtitle">NHS/BNF drug classes, routes, frequencies, units and safety rules for clinical transcription in the UK.</p>
<h2>Drug classes — NHS/BNF nomenclature</h2>
<table><tr><th>Class</th><th>BNF examples</th><th>Key transcription notes</th></tr>
<tr><td>Penicillins</td><td>Amoxicillin, Co-amoxiclav (Augmentin), Flucloxacillin, Benzylpenicillin</td><td>Co-amoxiclav = amoxicillin + clavulanic acid. Always transcribe both. BNF name used in NHS prescriptions.</td></tr>
<tr><td>Other antibiotics</td><td>Clarithromycin, Doxycycline, Metronidazole, Nitrofurantoin, Trimethoprim, Cefalexin</td><td>Metronidazole also antiprotozoal. Note IV vs oral. Cefalexin = cephalosporin (1st gen).</td></tr>
<tr><td>Non-opioid analgesics (BNF 4.7.1)</td><td>Paracetamol (max 4g/24h), Ibuprofen, Naproxen, Diclofenac</td><td>NSAIDs: NICE recommends caution/avoidance in renal impairment, peptic ulcer, heart failure. Paracetamol max 1g QDS.</td></tr>
<tr><td>Opioid analgesics (BNF 4.7.2)</td><td>Codeine, Dihydrocodeine, Tramadol, Morphine sulfate, Oxycodone, Fentanyl, Buprenorphine</td><td>Controlled Drugs (Misuse of Drugs Act 1971). Transcribe doses precisely. Fentanyl patches: note mcg/h (e.g. "25 micrograms/hour").</td></tr>
<tr><td>ACE inhibitors</td><td>Ramipril, Lisinopril, Perindopril, Enalapril</td><td>Common side-effect: dry cough (not allergy — intolerance). Monitor U&amp;Es and potassium. NICE first-line in hypertension under 55 + diabetes.</td></tr>
<tr><td>ARBs</td><td>Losartan, Valsartan, Candesartan, Irbesartan</td><td>Alternative to ACEi if cough. Both contraindicated in pregnancy. NICE first-line in hypertension under 55 if ACEi not tolerated.</td></tr>
<tr><td>Calcium channel blockers</td><td>Amlodipine, Nifedipine MR, Diltiazem MR, Verapamil SR</td><td>NICE first-line in over-55s. Diltiazem/verapamil rate-limiting — do not combine with beta-blockers (AV block risk).</td></tr>
<tr><td>Beta-blockers</td><td>Bisoprolol, Metoprolol succinate, Atenolol, Carvedilol, Nebivolol</td><td>Never stop abruptly. Bisoprolol/carvedilol used in heart failure (NICE). Atenolol = no longer NICE first-line for hypertension.</td></tr>
<tr><td>Anticoagulants</td><td>Warfarin, Rivaroxaban (Xarelto), Apixaban (Eliquis), Dabigatran (Pradaxa), Edoxaban (Lixiana), Enoxaparin (Clexane), Dalteparin (Fragmin), Tinzaparin (Innohep)</td><td>Warfarin monitored by INR (target range varies by indication). DOACs = direct oral anticoagulants. LMWH brands: Clexane (enoxaparin), Fragmin (dalteparin), Innohep (tinzaparin).</td></tr>
<tr><td>Antiplatelets</td><td>Aspirin 75mg, Clopidogrel, Ticagrelor (Brilique), Prasugrel (Efient)</td><td>DAPT = dual antiplatelet therapy. Note loading vs maintenance dose (e.g. "Ticagrelor 180mg loading dose, then 90mg BD").</td></tr>
<tr><td>Antidiabetics — oral/SC</td><td>Metformin, Empagliflozin (Jardiance), Dapagliflozin (Forxiga), Sitagliptin (Januvia), Gliclazide MR, Pioglitazone</td><td>SGLT2 inhibitors (empagliflozin, dapagliflozin): pause before IV contrast (DKA risk). NICE recommends for HF/CKD benefits. Note MR (modified release) formulation.</td></tr>
<tr><td>Insulin</td><td>Novorapid (aspart), Humalog (lispro), Actrapid (soluble); Lantus (glargine), Levemir (detemir), Toujeo (glargine 300), Tresiba (degludec)</td><td>Always write "units" in full — never "U" or "IU" alone (NPSA alert, risk of 10-fold overdose). Note: Toujeo is NOT interchangeable with Lantus dose-for-dose.</td></tr>
<tr><td>Statins</td><td>Atorvastatin 20–80mg, Rosuvastatin 5–40mg, Simvastatin 10–40mg, Pravastatin</td><td>NICE recommends atorvastatin 20mg for primary prevention, 80mg for secondary. Simvastatin 80mg: restricted by MHRA (myopathy risk). Take at night (simvastatin, pravastatin).</td></tr>
<tr><td>PPIs (BNF 1.3)</td><td>Omeprazole, Lansoprazole, Pantoprazole, Esomeprazole (Nexium)</td><td>30 min before breakfast. IV available (omeprazole, pantoprazole). NICE: prescribe at lowest effective dose.</td></tr>
<tr><td>Inhalers (BNF 3)</td><td>Salbutamol (SABA), Salmeterol/Formoterol (LABA), Tiotropium/Umeclidinium (LAMA), Beclometasone/Budesonide/Fluticasone (ICS)</td><td>Note device: MDI, DPI (Turbohaler, Accuhaler, Ellipta, Handihaler), spacer, nebuliser. NICE: ICS always with LABA, never alone in COPD.</td></tr>
<tr><td>Diuretics</td><td>Furosemide (loop), Spironolactone (K-sparing), Eplerenone, Bendroflumethiazide, Indapamide</td><td>Furosemide 20–500mg range. Bendroflumethiazide 2.5mg OD = NICE hypertension. Spironolactone: monitor potassium — avoid with ACEi/ARB without monitoring.</td></tr>
<tr><td>Immunosuppressants</td><td>Prednisolone, Methotrexate, Azathioprine, Ciclosporin, Mycophenolate mofetil, Tacrolimus</td><td>Prednisolone: always transcribe taper schedule precisely (e.g. "reducing by 5mg each week"). Methotrexate: once weekly ONLY — fatal errors from daily dosing.</td></tr>
<tr><td>Antiemetics</td><td>Ondansetron, Metoclopramide, Cyclizine, Domperidone, Prochlorperazine (Stemetil)</td><td>Metoclopramide: MHRA max 5 days, max dose 30mg/24h (extrapyramidal risk). Domperidone: cardiac risk — lowest dose, shortest duration.</td></tr></table>
<h2>Administration routes (NHS notation)</h2>
<table><tr><th>Abbr.</th><th>Route</th><th>Notes</th></tr>
<tr><td><strong>PO</strong></td><td>By mouth (oral)</td><td>Also enteral via NGT (nasogastric tube) or PEG (percutaneous endoscopic gastrostomy)</td></tr>
<tr><td><strong>IV</strong></td><td>Intravenous</td><td>Bolus vs infusion — specify rate (mL/h). Peripheral vs central line.</td></tr>
<tr><td><strong>IM</strong></td><td>Intramuscular</td><td>Not for anticoagulated patients. Note site: deltoid, gluteus.</td></tr>
<tr><td><strong>SC</strong></td><td>Subcutaneous</td><td>Insulin, LMWH, biologics (e.g. adalimumab)</td></tr>
<tr><td><strong>SL</strong></td><td>Sublingual</td><td>GTN (glyceryl trinitrate), buprenorphine</td></tr>
<tr><td><strong>PR</strong></td><td>Per rectum</td><td>Suppositories, enemas</td></tr>
<tr><td><strong>INH</strong></td><td>Inhaled</td><td>MDI, DPI, spacer, nebuliser — always note device</td></tr>
<tr><td><strong>TD</strong></td><td>Transdermal patch</td><td>Fentanyl patches: note mcg/h. GTN patches: mg/24h.</td></tr>
<tr><td><strong>TOP</strong></td><td>Topical</td><td>Skin, eye, ear, nasal spray</td></tr></table>
<h2>Dosage frequency (BNF / NHS)</h2>
<table><tr><th>Abbr.</th><th>Latin</th><th>Meaning</th><th>Approximate timing</th></tr>
<tr><td><strong>OD</strong></td><td>omni die</td><td>Once daily</td><td>Same time each day</td></tr>
<tr><td><strong>BD</strong></td><td>bis die</td><td>Twice daily</td><td>Every 12h</td></tr>
<tr><td><strong>TDS</strong></td><td>ter die sumendus</td><td>Three times daily</td><td>Every 8h</td></tr>
<tr><td><strong>QDS</strong></td><td>quater die sumendus</td><td>Four times daily</td><td>Every 6h</td></tr>
<tr><td><strong>PRN</strong></td><td>pro re nata</td><td>As required</td><td>Always state maximum frequency and interval</td></tr>
<tr><td><strong>STAT</strong></td><td>statim</td><td>Immediately, once only</td><td>Single dose</td></tr>
<tr><td><strong>AC</strong></td><td>ante cibum</td><td>Before food</td><td>30 min before eating</td></tr>
<tr><td><strong>PC</strong></td><td>post cibum</td><td>After food</td><td>With or after food</td></tr>
<tr><td><strong>ON / nocte</strong></td><td>omni nocte</td><td>At night</td><td>Simvastatin, sedatives</td></tr>
<tr><td><strong>alternate days</strong></td><td>alternis diebus</td><td>Every other day</td><td>Some steroids, methotrexate</td></tr></table>
<h2>Dose units (NHS)</h2>
<div class="pill-row"><span class="pill">mg — milligrams</span><span class="pill">g — grams</span><span class="pill">micrograms (spell out in full on NHS prescriptions)</span><span class="pill">mL — millilitres</span><span class="pill">units (write in full — NPSA alert)</span><span class="pill">Ch / Fr — Charri&egrave;re (catheter/tube size, 1Ch=0.33mm)</span><span class="pill">mg/kg — weight-based dosing</span></div>
<div class="alert-box"><strong>NPSA Patient Safety Alert:</strong> Never abbreviate micrograms as "µg" on handwritten prescriptions — write "micrograms" in full. Never write "U" or "IU" alone for units of insulin or heparin — always write "units". These are among the most common fatal prescribing errors in the NHS.<br><br><strong>LASA drugs (Look-Alike Sound-Alike):</strong> Hydroxyzine/Hydralazine, Metformin/Metronidazole, Prednisolone/Prednisone, Cyclophosphamide/Cyclosporine. Flag uncertainty — never guess.</div>
<h2>Controlled Drugs (UK — Misuse of Drugs Act 1971)</h2>
<div class="info-card"><p>CDs are classified as Schedule 2 (e.g. morphine, oxycodone, fentanyl, pethidine) or Schedule 3 (e.g. buprenorphine, tramadol, temazepam). Transcription must include: full drug name, total quantity (in words and figures), strength, form, dose, and frequency. Any discrepancy must be flagged immediately.</p></div>

de:`<h1>Medikamente &amp; Dosierungen</h1><p class="subtitle">Arzneimittelnomenklatur nach Roter Liste (Deutschland) und Austria Codex, Dosierungsschemata und Sicherheitsregeln.</p>
<h2>Wirkstoffklassen — Rote Liste / Austria Codex</h2>
<table><tr><th>Klasse</th><th>Beispiele (D/A)</th><th>Transkriptionshinweise</th></tr>
<tr><td>Penicilline</td><td>Amoxicillin, Amoxicillin/Clavulansäure (Augmentin, Amoxiclav HEXAL), Flucloxacillin, Ampicillin</td><td>Amoxicillin/Clavulansäure: beide Komponenten immer transkribieren. Österreich: Augmentin häufigster Handelsname.</td></tr>
<tr><td>Weitere Antibiotika</td><td>Clarithromycin, Azithromycin, Doxycyclin, Metronidazol (Flagyl), Nitrofurantoin (Furadantin), Cotrimoxazol (Bactrim)</td><td>Metronidazol auch antiprotozoal und antianaerob. i.v. vs. p.o. stets angeben.</td></tr>
<tr><td>Nicht-opioid Analgetika</td><td>Paracetamol (ben-u-ron, Mexalen [A]), Ibuprofen (Nurofen, Brufen), Naproxen, Diclofenac (Voltaren)</td><td>Max. 4 g/Tag Paracetamol (500 mg–1 g bis 4× tägl.). NSAR bei Niereninsuffizienz, Magenulkus, Herzinsuffizienz kontraindiziert (DGIM-Leitlinie).</td></tr>
<tr><td>Opioid-Analgetika</td><td>Codein, Tramadol (Tramal), Tilidin/Naloxon (Valoron N), Morphin (MST Continus, Sevredol), Oxycodon (Oxygesic), Fentanyl (Durogesic), Buprenorphin (Temgesic, Transtec)</td><td>Betäubungsmittel (BtMG): Morphin, Oxycodon, Fentanyl. Tilidin/Naloxon = nicht BtM-pflichtig. Pflasterstärke in µg/h (z.B. "Durogesic 25 µg/h"). Österreich: Suchtmittelgesetz (SMG).</td></tr>
<tr><td>ACE-Hemmer</td><td>Ramipril (Delix, Tritace [A]), Lisinopril (Acerbon), Enalapril (Xanef, Renitec [A]), Perindopril, Captopril</td><td>NW: Reizhusten (nicht allergisch — Unverträglichkeit). Nierenwerte und Kalium überwachen. Erstlinientherapie Hypertonie + Diabetes (ESC/DHL-Leitlinie).</td></tr>
<tr><td>AT1-Antagonisten (Sartane)</td><td>Losartan (Lorzaar), Valsartan (Diovan, Provas), Candesartan (Atacand, Blopress), Irbesartan (Aprovel), Olmesartan (Olmetec)</td><td>Alternative bei ACE-Hemmer-Husten. In SS kontraindiziert (Teratogenität). Kombination ACEi + Sartan = kontraindiziert.</td></tr>
<tr><td>Kalziumantagonisten</td><td>Amlodipin (Norvasc), Nifedipin retard (Adalat), Diltiazem (Dilzem), Verapamil (Isoptin)</td><td>Diltiazem/Verapamil: frequenzsenkend (Nicht-DHP) — niemals mit Betablockern kombinieren (AV-Block-Gefahr). Amlodipin/Nifedipin: Dihydropyridine (DHP) = vasoselectiv.</td></tr>
<tr><td>Betablocker</td><td>Bisoprolol (Concor, Bisoprolol-ratiopharm), Metoprolol (Beloc, Lopressor [A]), Carvedilol (Dilatrend), Atenolol, Nebivolol (Nebilet)</td><td>Nicht abrupt absetzen (Rebound-Hypertonie, -Angina). Bisoprolol/Carvedilol bei Herzinsuffizienz (ESC-Leitlinie).</td></tr>
<tr><td>Antikoagulanzien</td><td>Phenprocoumon (Marcumar [D], Phenpro [A]), Rivaroxaban (Xarelto), Apixaban (Eliquis), Dabigatran (Pradaxa), Edoxaban (Lixiana), Enoxaparin (Clexane), Certoparin (Mono-Embolex [D])</td><td><strong>In D/A: Phenprocoumon (Marcumar) ist der Standard-VKA — NICHT Warfarin.</strong> NOAK = Neue Orale Antikoagulanzien (= DOAC). INR-Zielbereich je nach Indikation. LMWH: Clexane (Enoxaparin), Mono-Embolex (Certoparin) in D.</td></tr>
<tr><td>Thrombozytenaggregationshemmer</td><td>ASS 100 mg (Aspirin Protect, Thrombo ASS [A]), Clopidogrel (Plavix, Iscover), Ticagrelor (Brilique), Prasugrel (Efient)</td><td>DAPT = duale Plättchenhemmung. Ladedosis vs. Erhaltungsdosis immer angeben (z.B. "Ticagrelor 180 mg Ladedosis, dann 2× 90 mg tägl.").</td></tr>
<tr><td>Antidiabetika</td><td>Metformin (Glucophage, Diabesin [A]), Empagliflozin (Jardiance), Dapagliflozin (Forxiga), Sitagliptin (Januvia), Glimepirid (Amaryl), Glibenclamid (Euglucon)</td><td>SGLT2-Hemmer: vor KM-Gabe pausieren (DKA-Risiko). ESC/EASD-Leitlinie empfiehlt bei KHK/CKD. MR-Formulierungen beachten (z.B. Metformin 1000 mg retard).</td></tr>
<tr><td>Insulin</td><td>NovoRapid (Aspart), Humalog (Lispro), Actrapid (Normal-Insulin); Lantus (Glargin), Levemir (Detemir), Toujeo (Glargin 300 E/ml), Tresiba (Degludec)</td><td>Einheiten IMMER ausschreiben — nie "E" allein (Verwechslung mit Null führt zu 10-facher Überdosierung). Toujeo und Lantus sind NICHT 1:1 austauschbar.</td></tr>
<tr><td>Statine</td><td>Atorvastatin (Sortis, Atorvastatin-ratiopharm), Rosuvastatin (Crestor), Simvastatin (Zocor), Pravastatin (Mevalotin [A])</td><td>ESC/EAS-Ziel: LDL je nach Risikoklasse. Simvastatin 80 mg: MHRA-Warnung (Myopathierisiko) — gilt auch in D/A. Abendliche Einnahme: Simvastatin, Pravastatin.</td></tr>
<tr><td>Protonenpumpenhemmer</td><td>Omeprazol (Antra MUPS, Nexium [Esomeprazol]), Pantoprazol (Pantozol), Lansoprazol (Agopton), Esomeprazol (Nexium)</td><td>30 min vor dem Frühstück einnehmen. i.v.-Form: Pantoprazol (häufigste i.v.-Gabe in D/A).</td></tr>
<tr><td>Atemwegsmittel</td><td>Salbutamol (Sultanol, Ventolin [A] — SABA), Formoterol/Salmeterol (LABA), Tiotropium (Spiriva — LAMA), Budesonid (Pulmicort), Fluticason (Flutide), Beclometason (Qvar)</td><td>Inhalatortyp dokumentieren: MDI (Dosieraerosol), DPI (Turbohaler, Accuhaler, Ellipta, HandiHaler), Spacer, Vernebler. NVL COPD/Asthma: ICS nie allein bei COPD.</td></tr>
<tr><td>Diuretika</td><td>Furosemid (Lasix, Furo-ratiopharm), Torasemid (Unat, Torem [A]), Spironolacton (Aldactone), Eplerenon (Inspra), Hydrochlorothiazid (HCT, Esidrix)</td><td>Furosemid: Dosisrange 20–500 mg. i.v. wirkt schneller als p.o. Spironolacton: Kalium überwachen — kontraindiziert bei Hyperkaliämie; Kombination mit ACEi/Sartan nur mit engem Monitoring (ESC HF-Leitlinie).</td></tr>
<tr><td>Immunsuppressiva</td><td>Prednisolon (Decortin H, Solu-Decortin), Methylprednisolon (Urbason), Methotrexat (MTX — Methofar, Lantarel), Azathioprin (Imurek), Ciclosporin (Sandimmun), Mycophenolatmofetil (CellCept)</td><td>Methotrexat: NUR 1× WÖCHENTLICH — tägl. Gabe war Ursache von Todesfällen. Ausschleichschemata für Kortison immer vollständig transkribieren.</td></tr>
<tr><td>Antiemetika</td><td>Ondansetron (Zofran), Metoclopramid (Paspertin, Gastrosil [A]), Dimenhydrinat (Vomex A), Domperidon (Motilium)</td><td>Metoclopramid: max. 5 Tage, max. 0,5 mg/kg/Tag (EMA-Empfehlung, extrapyramidales Risiko). Domperidon: kardiales Risiko (QT-Verlängerung) — niedrigste Dosis, kürzeste Dauer.</td></tr></table>
<h2>Applikationswege (D/A-Standard)</h2>
<table><tr><th>Abk.</th><th>Weg</th><th>Hinweise</th></tr>
<tr><td><strong>p.o.</strong></td><td>per os (oral)</td><td>Auch enteral via Magensonde (NGS) oder PEG</td></tr>
<tr><td><strong>i.v.</strong></td><td>intravenös</td><td>Bolus vs. Infusion — Laufrate in ml/h angeben. ZVK vs. perivenös.</td></tr>
<tr><td><strong>i.m.</strong></td><td>intramuskulär</td><td>Nicht bei Antikoagulation. Lokalisation: Deltoid, M. glutaeus medius.</td></tr>
<tr><td><strong>s.c.</strong></td><td>subkutan</td><td>Insulin, NMH, Biologika (z.B. Adalimumab)</td></tr>
<tr><td><strong>s.l.</strong></td><td>sublingual</td><td>Nitrate (Nitrolingual), Buprenorphin (Temgesic)</td></tr>
<tr><td><strong>rektal</strong></td><td>per rectum</td><td>Zäpfchen (Suppositorien), Klistier</td></tr>
<tr><td><strong>inhal.</strong></td><td>inhalativ</td><td>Dosieraerosol (DAE/MDI), Pulverinhalator (DPI), Vernebler, Spacer</td></tr>
<tr><td><strong>transdermal</strong></td><td>Pflaster</td><td>Fentanyl (Durogesic): µg/h. Nitroglycerin (Nitroderm): mg/24h.</td></tr>
<tr><td><strong>top.</strong></td><td>topisch</td><td>Haut, Auge, Ohr, Nasal</td></tr></table>
<h2>Dosierungshäufigkeit (D/A)</h2>
<table><tr><th>Abk.</th><th>Bedeutung</th><th>Ungefähres Timing</th></tr>
<tr><td><strong>1×tgl.</strong></td><td>Einmal täglich</td><td>Gleiche Zeit täglich</td></tr>
<tr><td><strong>2×tgl.</strong></td><td>Zweimal täglich</td><td>Ca. alle 12 h</td></tr>
<tr><td><strong>3×tgl.</strong></td><td>Dreimal täglich</td><td>Ca. alle 8 h</td></tr>
<tr><td><strong>4×tgl.</strong></td><td>Viermal täglich</td><td>Ca. alle 6 h</td></tr>
<tr><td><strong>b.B. / PRN</strong></td><td>Bei Bedarf</td><td>Maximale Häufigkeit und Intervall immer angeben</td></tr>
<tr><td><strong>sofort / STAT</strong></td><td>Sofort, einmalig</td><td>Einmalgabe</td></tr>
<tr><td><strong>nü.</strong></td><td>Nüchtern (vor Mahlzeiten)</td><td>30 min vor dem Frühstück</td></tr>
<tr><td><strong>z.N.</strong></td><td>Zur Nacht</td><td>Simvastatin, Pravastatin, Sedativa</td></tr>
<tr><td><strong>jeden 2. Tag</strong></td><td>Jeden zweiten Tag</td><td>Methotrexat (Cave: 1× wöchentlich!)</td></tr></table>
<div class="alert-box"><strong>Sicherheitskritische Abkürzungen:</strong> Insulineinheiten NIE als "E" allein — Verwechslung mit 0 führt zu 10-facher Überdosierung. Immer "Einheiten" ausschreiben. Methotrexat: <em>einmal wöchentlich</em> — tägliche Gabe ist lebensbedrohlich. LASA-Paare (D): Metformin/Metronidazol, Hydroxyzin/Hydralazin, Prednisolon/Prednison.</div>
<h2>Betäubungsmittel (BtMG — Deutschland / SMG — Österreich)</h2>
<div class="info-card"><p>Betäubungsmittelpflichtige Substanzen (BtM-Anlage III: Morphin, Oxycodon, Fentanyl, Hydromorphone, Buprenorphin). Rezeptpflichtig auf BtM-Rezept (3-faches Durchschreibeformular in D; Suchtgiftrezept in A). Transkription muss enthalten: vollständiger Wirkstoffname, Stärke, Darreichungsform, Dosis, Häufigkeit, Gesamtmenge (in Ziffern und Buchstaben). Jede Unklarheit rückfragen — niemals ergänzen oder interpretieren.</p></div>

nl:`<h1>Medicijnen &amp; doseringen</h1><p class="subtitle">Geneesmiddelennomenclatuur conform G-Standaard/KNMP, NHG-standaarden en CBG-MEB-richtlijnen.</p>
<h2>Geneesmiddelklassen — G-Standaard/KNMP</h2>
<table><tr><th>Klasse</th><th>G-Standaard/KNMP voorbeelden</th><th>Transcriptienoten</th></tr>
<tr><td>Penicillines</td><td>Amoxicilline, Co-amoxiclav (Augmentin), Flucloxacilline, Benzylpenicilline (Penicilline G)</td><td>Co-amoxiclav = amoxicilline + clavulaanzuur. Beide componenten altijd vermelden. G-Standaard naam gebruiken.</td></tr>
<tr><td>Overige antibiotica</td><td>Claritromycine, Azitromycine (Zithromax), Doxycycline, Metronidazol (Flagyl), Nitrofurantoïne (Furadantine MC), Trimethoprim, Cefalexine</td><td>Metronidazol ook antiprotozoaal. i.v. vs p.o. benoemen.</td></tr>
<tr><td>Niet-opioïde analgetica</td><td>Paracetamol (Panadol, Tylenol — max 4 g/dag), Ibuprofen (Brufen, Advil), Naproxen (Aleve), Diclofenac (Voltaren)</td><td>NSAID's: NHG-richtlijn: voorzichtigheid bij nierinsufficiëntie, maagzweer, hartfalen. Max paracetamol 1 g à 4× daags = 4 g/dag.</td></tr>
<tr><td>Opioïde analgetica</td><td>Codeïne, Tramadol (Tramal), Morfine (MS Contin, Sevredol), Oxycodon (OxyContin, OxyNorm), Fentanyl (Durogesic), Buprenorfine (Temgesic, BuTrans-pleister)</td><td>UR-geneesmiddelen (Uitsluitend op Recept). Morfine, oxycodon, fentanyl: Opiumwet lijst I. Pleisters: mcg/h vermelden (bijv. "Durogesic 25 mcg/h").</td></tr>
<tr><td>ACE-remmers</td><td>Ramipril (Tritace), Lisinopril (Zestril), Enalapril (Renitec), Perindopril (Coversyl), Captopril</td><td>Bijwerking: droge hoest (niet-allergisch — intolerantie). Nier- en kaliumcontrole. NHG-richtlijn hypertensie: eerstekes bij diabeet.</td></tr>
<tr><td>ARB's (sartanen)</td><td>Losartan (Cozaar), Valsartan (Diovan), Candesartan (Atacand), Irbesartan (Aprovel), Olmesartan (Olmetec)</td><td>Alternatief bij ACE-remmer-hoest. Gecontra-indiceerd in zwangerschap. Combinatie ACEi + ARB = gecontra-indiceerd.</td></tr>
<tr><td>Calciumantagonisten</td><td>Amlodipine (Norvasc), Nifedipine MGA (Adalat), Diltiazem (Tildiem), Verapamil (Isoptin)</td><td>Diltiazem/verapamil: frequentiedalend (niet-DHP) — nooit combineren met bètablokkers (AV-blokrisico). Amlodipine/nifedipine: DHP = vaatselec tief.</td></tr>
<tr><td>Bètablokkers</td><td>Bisoprolol (Emcor, Bisoprolol CF), Metoprolol (Seloken, Lopresor), Carvedilol (Eucardic), Atenolol, Nebivolol (Nebilet)</td><td>Nooit abrupt staken (rebound hypertensie/angina). Bisoprolol/carvedilol bij hartfalen (ESC-richtlijn).</td></tr>
<tr><td>Anticoagulantia (remming bloedstolling)</td><td>Acenocoumarol (Sintrom), Fenprocoumon (Marcoumar), Rivaroxaban (Xarelto), Apixaban (Eliquis), Dabigatran (Pradaxa), Edoxaban (Lixiana), Nadroparine (Fraxiparine), Enoxaparine (Clexane), Dalteparine (Fragmin), Tinzaparine (Innohep)</td><td><strong>In Nederland: acenocoumarol (Sintrom) is de standaard-VKA — NIET warfarine.</strong> Trombosedienst bewaakt INR (streefwaarden variëren per indicatie). LMWH: nadroparine (Fraxiparine) meest gebruikt in NL. DOAC = directe orale anticoagulantia.</td></tr>
<tr><td>Trombocytenaggregatieremmers</td><td>Acetylsalicylzuur 80–100 mg (Aspirine Cardio, Ascal), Clopidogrel (Plavix), Ticagrelor (Brilique), Prasugrel (Efient)</td><td>DAPT = duale trombocytenaggregatietherapie. Laaddosis vs onderhoudsdosis vermelden (bijv. "ticagrelor 180 mg laaddosis, dan 2× 90 mg daags").</td></tr>
<tr><td>Antidiabetica</td><td>Metformine (Glucophage), Empagliflozine (Jardiance), Dapagliflozine (Forxiga), Sitagliptine (Januvia), Glimepiride (Amaryl), Gliclazide MR (Diamicron)</td><td>SGLT2-remmers: pauzeren voor contrast-CT (DKA-risico). NHG-richtlijn Diabetes type 2: empagliflozine/dapagliflozine bij HF/CKD. MGA/MR-formulering benoemen.</td></tr>
<tr><td>Insuline</td><td>NovoRapid (aspart), Humalog (lispro), Humuline Regular; Lantus (glargine), Levemir (detemir), Toujeo (glargine 300 E/ml), Tresiba (degludec)</td><td>Altijd "eenheden" uitschrijven — NOOIT "E" alleen (verwarring met nul leidt tot 10× overdosering). Toujeo en Lantus zijn NIET 1:1 uitwisselbaar.</td></tr>
<tr><td>Statines</td><td>Atorvastatine (Lipitor, Sortis), Rosuvastatine (Crestor), Simvastatine (Zocor), Pravastatine (Pravachol)</td><td>ESC/EAS-streefwaarde LDL per risicoklasse. Simvastatine 80 mg: MHRA/CBG-waarschuwing (myopathierisico). Simvastatine/'s avonds innemen.</td></tr>
<tr><td>PPI's</td><td>Omeprazol (Losec, Omeprazol CF), Pantoprazol (Pantozol), Lansoprazol, Esomeprazol (Nexium)</td><td>30 min voor ontbijt innemen. i.v.: omeprazol of pantoprazol.</td></tr>
<tr><td>Luchtwegmedicatie</td><td>Salbutamol (Ventolin — SABA), Formoterol/Salmeterol (LABA), Tiotropium (Spiriva — LAMA), Budesonide (Pulmicort), Fluticason (Flixotide), Beclometason (Qvar)</td><td>Inhalatortype altijd vermelden: MDI (dosisaerosol), DPI (Turbohaler, Accuhaler, Ellipta, HandiHaler), spacer, vernevelaar. NHG COPD: ICS nooit alleen bij COPD.</td></tr>
<tr><td>Diuretica</td><td>Furosemide (Lasix), Torasemide (Torem), Spironolacton (Aldactone), Eplerenon (Inspra), Hydrochloorthiazide (Esidrex)</td><td>Furosemide: 20–500 mg bereik. i.v. sneller. Spironolacton: kalium bewaken. NHG HF-richtlijn: spironolacton/eplerenon bij EF &lt;35%.</td></tr>
<tr><td>Immunosuppressiva</td><td>Prednisolon (Prednisolon CF), Methylprednisolon (Medrol, Solu-Medrol), Methotrexaat (Metoject, Emthexate), Azathioprine (Imuran), Ciclosporine (Sandimmun), Mycofenolaatmofetil (CellCept)</td><td>Methotrexaat: UITSLUITEND 1× PER WEEK — dagelijkse toediening is dodelijk. Afbouwschema prednisolon altijd volledig transcriberen.</td></tr>
<tr><td>Anti-emetica</td><td>Ondansetron (Zofran), Metoclopramide (Primperan), Cyclizine, Domperidon (Motilium)</td><td>Metoclopramide: max 5 dagen, max 30 mg/24u (EMA; extrapyramidaal risico). Domperidon: cardiaal risico (QT-verlenging).</td></tr></table>
<h2>Toedieningswegen (NL-standaard)</h2>
<table><tr><th>Afk.</th><th>Weg</th><th>Toelichting</th></tr>
<tr><td><strong>p.o.</strong></td><td>Per os (oraal)</td><td>Ook enteraal via maagsonde (NGS) of PEG</td></tr>
<tr><td><strong>i.v.</strong></td><td>Intraveneus</td><td>Bolus vs. infusie — loopsnelheid in ml/h. Perifeer vs. centraal veneus.</td></tr>
<tr><td><strong>i.m.</strong></td><td>Intramusculair</td><td>Niet bij anticoagulatie. Locatie: deltoid, m. glutaeus medius.</td></tr>
<tr><td><strong>s.c.</strong></td><td>Subcutaan</td><td>Insuline, LMWH, biologicals (bijv. adalimumab)</td></tr>
<tr><td><strong>s.l.</strong></td><td>Sublinguaal</td><td>Nitraten (Nitrolingual), buprenorfine (Temgesic)</td></tr>
<tr><td><strong>rect.</strong></td><td>Rectaal</td><td>Zetpillen, klysma's</td></tr>
<tr><td><strong>inh.</strong></td><td>Inhalatoir</td><td>Dosisaerosol (MDI), poederinhalator (DPI), vernevelaar, spacer</td></tr>
<tr><td><strong>transdermaal</strong></td><td>Pleister</td><td>Fentanyl (Durogesic): mcg/h. Nitroglycerinetransdermaal: mg/24u.</td></tr>
<tr><td><strong>top.</strong></td><td>Topisch</td><td>Huid, oog, oor, neusspray</td></tr></table>
<h2>Doseringfrequentie (NL)</h2>
<table><tr><th>Afk.</th><th>Betekenis</th><th>Timing</th></tr>
<tr><td><strong>1× daags</strong></td><td>Eenmaal per dag</td><td>Zelfde tijd dagelijks</td></tr>
<tr><td><strong>2× daags</strong></td><td>Tweemaal per dag</td><td>Ca. elke 12 u</td></tr>
<tr><td><strong>3× daags</strong></td><td>Driemaal per dag</td><td>Ca. elke 8 u</td></tr>
<tr><td><strong>4× daags</strong></td><td>Viermaal per dag</td><td>Ca. elke 6 u</td></tr>
<tr><td><strong>z.n. / PRN</strong></td><td>Zo nodig</td><td>Max. frequentie en interval altijd vermelden</td></tr>
<tr><td><strong>STAT</strong></td><td>Onmiddellijk, eenmalig</td><td>Eenmalige toediening</td></tr>
<tr><td><strong>nuchter / a.c.</strong></td><td>Voor de maaltijd</td><td>30 min voor ontbijt</td></tr>
<tr><td><strong>'s nachts</strong></td><td>Voor het slapengaan</td><td>Simvastatine, sedativa</td></tr></table>
<div class="alert-box"><strong>Veiligheidsalert:</strong> Insuline-eenheden NOOIT als "E" alleen — verwarring met nul leidt tot 10× overdosering. Schrijf altijd "eenheden" uit. Methotrexaat: <em>uitsluitend 1× per week</em> — dagelijkse toediening is dodelijk. LASA: Metformine/Metronidazol, Prednisolon/Prednison.</div>
<h2>Opiumwet (Nederland)</h2>
<div class="info-card"><p>Morfine, oxycodon, fentanyl, hydromorphone, buprenorfine: Opiumwet lijst I. Tramadol, temazepam: lijst II. UR-recept vereist. Transcriptie moet bevatten: volledige stofnaam, sterkte, toedieningsvorm, dosering, frequentie, totale hoeveelheid (in cijfers en letters). Elke onduidelijkheid terugvragen — nooit aanvullen of interpreteren.</p></div>

fr:`<h1>Médicaments &amp; dosages</h1><p class="subtitle">Nomenclature conforme au Vidal, aux recommandations HAS et à la réglementation ANSM.</p>
<h2>Classes médicamenteuses — Vidal / HAS</h2>
<table><tr><th>Classe</th><th>Exemples Vidal (France)</th><th>Notes de transcription</th></tr>
<tr><td>Pénicillines</td><td>Amoxicilline (Clamoxyl), Amoxicilline/acide clavulanique (Augmentin, Amoxicilline/acide clavulanique Biogaran), Flucloxacilline (Flopen), Ampicilline</td><td>Toujours transcrire les deux composants de l'association. En France, utiliser la DCI (dénomination commune internationale) en priorité (obligation légale depuis 2015).</td></tr>
<tr><td>Autres antibiotiques</td><td>Clarithromycine (Zeclar, Naxy), Azithromycine (Zithromax), Doxycycline (Vibramycine), Métronidazole (Flagyl), Nitrofurantoïne (Furadantine), Cotrimoxazole (Bactrim)</td><td>Métronidazole aussi antiprotozoaire. Préciser IV vs oral.</td></tr>
<tr><td>Analgésiques non-opioïdes</td><td>Paracétamol (Doliprane, Dafalgan, Efferalgan — max 4 g/j), Ibuprofène (Advil, Nurofen), Naproxène (Apranax, Naprosyne), Diclofénac (Voltarène, Diclofénac Biogaran)</td><td>AINS: HAS contre-indique en insuffisance rénale, ulcère, IC. Max paracétamol : 3 g/j chez le sujet âgé (>70 ans, poids <50 kg) selon recommandations HAS.</td></tr>
<tr><td>Opioïdes</td><td>Codéine (souvent en association: Dafalgan codéiné, Efferalgan codéiné), Tramadol (Topalgic, Contramal), Morphine (Skenan LP, Sevredol, Actiskenan), Oxycodone (Oxycontin LP, OxyNorm), Fentanyl (Durogésic), Buprénorphine (Temgésic, Norspan — patch)</td><td>Stupéfiants (liste I): morphine, oxycodone, fentanyl, hydromorphone, buprénorphine (usage antalgique). Ordonnance sécurisée obligatoire. Patchs: noter mcg/h (ex. "Durogésic 25 mcg/h"). Tramadol = liste II.</td></tr>
<tr><td>IEC</td><td>Ramipril (Triatec), Lisinopril (Zestril, Prinivil), Énalapril (Renitec), Périndopril (Coversyl), Captopril</td><td>EI fréquent: toux sèche (non allergique — intolérance). Surveiller créatinine et kaliémie. HAS: 1re intention HTA + diabète.</td></tr>
<tr><td>ARA II (sartans)</td><td>Losartan (Cozaar), Valsartan (Nisis, Tareg), Candésartan (Atacand, Kenzen), Irbésartan (Aprovel), Olmésartan (Alteis, Olimetec)</td><td>Alternative aux IEC si toux. Contre-indiqués en grossesse (tératogènes). Association IEC + ARA II = contre-indiquée.</td></tr>
<tr><td>Inhibiteurs calciques</td><td>Amlodipine (Amlor, Amlodipine Biogaran), Nifédipine LP (Adalate LP), Diltiazem LP (Tildiem LP, Mono Tildiem), Vérapamil LP (Isoptine LP)</td><td>Diltiazem/vérapamil: bradycardisants (non-DHP) — ne jamais associer aux bêta-bloquants (risque BAV). Amlodipine/nifédipine: DHP = vasosélectifs.</td></tr>
<tr><td>Bêta-bloquants</td><td>Bisoprolol (Cardensiel, Détensiel), Métoprolol (Seloken LP), Carvédilol (Kredex), Aténolol (Ténormine), Nébivolol (Temerit, Nébilet)</td><td>Ne jamais arrêter brutalement (rebond HTA, angor). Bisoprolol/carvédilol dans l'IC (recommandations HAS/ESC).</td></tr>
<tr><td>Anticoagulants</td><td>Warfarine (Coumadine), Acénocoumarol (Sintrom), Rivaroxaban (Xarelto), Apixaban (Eliquis), Dabigatran (Pradaxa), Edoxaban (Lixiana), Énoxaparine (Lovenox), Nadroparine (Fraxiparine), Tinzaparine (Innohep), Fondaparinux (Arixtra)</td><td><strong>En France: warfarine (Coumadine) et acénocoumarol (Sintrom) sont tous deux utilisés.</strong> INR surveillé par le réseau de coagulation. AOD = anticoagulants oraux directs. HBPM: Lovenox (énoxaparine) le plus prescrit en France.</td></tr>
<tr><td>Antiagrégants plaquettaires</td><td>Aspirine 75–100 mg (Kardégic, Aspégic), Clopidogrel (Plavix, Clopidogrel Biogaran), Ticagrélor (Brilique), Prasugrel (Efient)</td><td>DAPT = double antiagrégation plaquettaire. Dose de charge vs entretien (ex. "Brilique 180 mg dose de charge, puis 2× 90 mg/j").</td></tr>
<tr><td>Antidiabétiques</td><td>Metformine (Glucophage, Stagid), Empagliflozine (Jardiance), Dapagliflozine (Forxiga), Sitagliptine (Januvia), Gliclazide LP (Diamicron LP), Glibenclamide (Daonil)</td><td>Inhibiteurs SGLT2: suspendre avant injection de PDC (risque d'ACG). HAS recommande en cas d'IC/néphropathie. Préciser LP/forme retard.</td></tr>
<tr><td>Insuline</td><td>NovoRapid (asparte), Humalog (lispro), Actrapid (insuline humaine soluble); Lantus (glargine), Lévémir (détémir), Toujeo (glargine 300 U/ml), Tresiba (dégludec)</td><td>Toujours écrire "unités" en toutes lettres — JAMAIS "U" seul (confusion avec zéro = surdosage ×10). Toujeo et Lantus ne sont PAS interchangeables dose pour dose.</td></tr>
<tr><td>Statines</td><td>Atorvastatine (Tahor, Atorvastatine Biogaran), Rosuvastatine (Crestor), Simvastatine (Zocor, Lodales), Pravastatine (Elisor, Vasten)</td><td>Objectifs LDL HAS/ESC selon risque cardiovasculaire. Simvastatine 80 mg: avertissement ANSM (myopathie). Simvastatine/pravastatine: prise le soir.</td></tr>
<tr><td>IPP</td><td>Oméprazole (Mopral, Oméprazole Biogaran), Pantoprazole (Eupantol, Inipomp), Lansoprazole (Ogast, Lanzor), Ésoméprazole (Inexium)</td><td>30 min avant le petit-déjeuner. IV: pantoprazole (le plus utilisé en France en IV).</td></tr>
<tr><td>Médicaments respiratoires</td><td>Salbutamol (Ventoline — BACA), Formotérol/Salmétérol (BALA), Tiotropium (Spiriva — LAMA), Budésonide (Pulmicort), Fluticasone (Flixotide), Béclométasone (Qvar, Becotide)</td><td>Toujours noter le dispositif: MDI (aérosol doseur), DPI (Turbuhaler, Accuhaler, Ellipta, HandiHaler), chambre d'inhalation, nébuliseur. HAS BPCO: CSI jamais seul dans la BPCO.</td></tr>
<tr><td>Diurétiques</td><td>Furosémide (Lasilix, Furosémide Biogaran), Torémide (Torem), Spironolactone (Aldactone), Éplérénone (Inspra), Hydrochlorothiazide (Esidrex)</td><td>Furosémide: 20–500 mg. IV plus rapide. Spironolactone: surveiller kaliémie. HAS IC: spironolactone/éplérénone si FEVG &lt;35%.</td></tr>
<tr><td>Immunosuppresseurs</td><td>Prednisolone (Solupred), Méthylprednisolone (Médrol, Solu-Médrol), Méthotrexate (Novatrex, Imeth, Métoject injectable), Azathioprine (Imurel), Ciclosporine (Sandimmun, Néoral), Mycophénolate mofétil (CellCept)</td><td>Méthotrexate: <em>UNIQUEMENT 1 FOIS PAR SEMAINE</em> — administration quotidienne est mortelle. Schémas de dégression des corticoïdes: transcrire intégralement.</td></tr>
<tr><td>Antiémétiques</td><td>Ondansétron (Zophren), Métoclopramide (Primpéran), Métopimazine (Vogalène), Dompéridone (Motilium)</td><td>Métoclopramide: max 5 jours, max 30 mg/24h (EMA; risque extrapyramidal). Dompéridone: risque cardiaque (QT long) — dose minimale, durée courte.</td></tr></table>
<h2>Voies d'administration (France)</h2>
<table><tr><th>Abr.</th><th>Voie</th><th>Remarques</th></tr>
<tr><td><strong>PO</strong></td><td>Per os (orale)</td><td>Aussi entéral via SNG (sonde nasogastrique) ou GPE (gastrostomie percutanée endoscopique)</td></tr>
<tr><td><strong>IV</strong></td><td>Intraveineux</td><td>Bolus vs perfusion — débit en mL/h. Voie périphérique vs centrale.</td></tr>
<tr><td><strong>IM</strong></td><td>Intramusculaire</td><td>Contre-indiqué sous anticoagulants. Site: deltoïde, grand fessier.</td></tr>
<tr><td><strong>SC</strong></td><td>Sous-cutané</td><td>Insuline, HBPM, biologiques (ex. adalimumab)</td></tr>
<tr><td><strong>SL</strong></td><td>Sublingual</td><td>Dérivés nitrés (Natispray), buprénorphine (Temgésic)</td></tr>
<tr><td><strong>PR</strong></td><td>Voie rectale</td><td>Suppositoires, lavements</td></tr>
<tr><td><strong>INH</strong></td><td>Inhalé</td><td>Aérosol doseur (MDI), dispositif à poudre (DPI), chambre d'inhalation, nébuliseur</td></tr>
<tr><td><strong>TD / patch</strong></td><td>Transdermique</td><td>Fentanyl (Durogésic): mcg/h. Nitroglycérine transdermique: mg/24h.</td></tr>
<tr><td><strong>TOP</strong></td><td>Topique</td><td>Peau, oeil, oreille, spray nasal</td></tr></table>
<h2>Fréquence de prise (France)</h2>
<table><tr><th>Abr.</th><th>Signification</th><th>Timing</th></tr>
<tr><td><strong>1×/j</strong></td><td>Une fois par jour</td><td>Même heure chaque jour</td></tr>
<tr><td><strong>2×/j</strong></td><td>Deux fois par jour</td><td>Toutes les 12 h</td></tr>
<tr><td><strong>3×/j</strong></td><td>Trois fois par jour</td><td>Toutes les 8 h</td></tr>
<tr><td><strong>4×/j</strong></td><td>Quatre fois par jour</td><td>Toutes les 6 h</td></tr>
<tr><td><strong>PRN / si besoin</strong></td><td>Au besoin</td><td>Préciser la fréquence maximale et l'intervalle</td></tr>
<tr><td><strong>STAT</strong></td><td>Immédiatement, dose unique</td><td>Administration unique</td></tr>
<tr><td><strong>à jeun / AC</strong></td><td>Avant les repas</td><td>30 min avant le petit-déjeuner</td></tr>
<tr><td><strong>au coucher / HS</strong></td><td>Au coucher</td><td>Simvastatine, pravastatine, sédatifs</td></tr></table>
<div class="alert-box"><strong>Alerte sécurité:</strong> Ne jamais écrire "U" seul pour les unités d'insuline — confusion avec zéro = surdosage ×10. Écrire "unités" en toutes lettres. Méthotrexate: <em>une seule fois par semaine</em> — administration quotidienne est mortelle. Médicaments LASA: Metformine/Métronidazole, Prednisolone/Prednisone.</div>
<h2>Stupéfiants (France — Code de la Santé Publique)</h2>
<div class="info-card"><p>Morphine, oxycodone, fentanyl, hydromorphone, méthadone: liste des stupéfiants (CSP Art. L.5132-1). Ordonnance sécurisée obligatoire (durée max 28 jours). La transcription doit inclure: DCI complète, dosage, forme galénique, posologie, fréquence, quantité totale (en chiffres et en lettres). Toute ambiguïté doit être signalée immédiatement au prescripteur.</p></div>
