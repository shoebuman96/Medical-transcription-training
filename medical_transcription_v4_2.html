tests:{
en:`<h1>Tests &amp; Diagnostics</h1><p class="subtitle">Laboratory values, imaging modalities, and cardiac/respiratory tests encountered in clinical transcription.</p>
<h2>Full blood count (FBC) — key values</h2>
<table><tr><th>Test</th><th>Normal (adult)</th><th>Low</th><th>High</th></tr>
<tr><td>Haemoglobin (Hb) — ♀</td><td>120–160 g/L</td><td>Anaemia</td><td>Polycythaemia</td></tr>
<tr><td>Haemoglobin (Hb) — ♂</td><td>130–175 g/L</td><td>Anaemia</td><td>Polycythaemia</td></tr>
<tr><td>WBC (leukocytes)</td><td>4–11 × 10⁹/L</td><td>Leukopenia</td><td>Leukocytosis (infection/inflammation)</td></tr>
<tr><td>Platelets (Plt)</td><td>150–400 × 10⁹/L</td><td>Thrombocytopenia</td><td>Thrombocytosis</td></tr></table>
<h2>Biochemistry</h2>
<table><tr><th>Test</th><th>Normal</th><th>Clinical significance</th></tr>
<tr><td>Glucose (fasting)</td><td>3.9–5.6 mmol/L</td><td>↑ Diabetes; ↓ Hypoglycaemia</td></tr>
<tr><td>HbA1c</td><td>&lt;42 mmol/mol</td><td>≥48 = Diabetes mellitus</td></tr>
<tr><td>Creatinine</td><td>60–110 µmol/L</td><td>↑ Renal impairment</td></tr>
<tr><td>TSH</td><td>0.4–4.0 mIU/L</td><td>↓ Hyperthyroidism; ↑ Hypothyroidism</td></tr>
<tr><td>GGT / ALT / AST</td><td>Variable</td><td>Liver enzymes — ↑ in hepatic disease</td></tr>
<tr><td>Troponin</td><td>Near zero</td><td>↑ Myocardial damage (ACS/MI)</td></tr></table>
<div class="info-card"><p><strong>Liver enzymes:</strong> <strong>GGT</strong> — gamma-glutamyl transferase. <strong>ALT</strong> (alanine transaminase, also called glutamate pyruvate transaminase / GPT). <strong>AST</strong> — aspartate aminotransferase (also called glutamate oxaloacetate transaminase / GOT). In UK labs, ALT, AST and GGT are the standard abbreviations.</p></div>
<h2>Imaging modalities</h2>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🩻</span><span class="ic-title">X-ray (plain radiograph)</span><span class="ic-badge"><span class="badge badge-caution">Radiation</span></span></div><div class="imaging-card-body">Quick, widely available. Used for: chest (CXR), fractures, bowel obstruction. <strong>Low-dose CT (LDCT)</strong> — a reduced-radiation CT, used for lung cancer screening.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🧲</span><span class="ic-title">MRI (MRT in German / IRM in French)</span><span class="ic-badge"><span class="badge badge-normal">No radiation</span></span></div><div class="imaging-card-body">Preferred modality for brain, spinal cord, soft tissue and joints. Key terms: <strong>T1</strong> (shows fat, anatomy), <strong>T2</strong> (shows fluid/oedema — T2 hyperintensities in white matter). <strong>T2 hyperintensities</strong> in the brain are graded using the <strong>Fazekas scale</strong> (Fazekas 0–3 = degree of white matter lesion burden).</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">📡</span><span class="ic-title">Ultrasound</span><span class="ic-badge"><span class="badge badge-normal">No radiation</span></span></div><div class="imaging-card-body">Real-time imaging of soft tissue, vessels, organs. <strong>Colour Doppler ultrasound</strong> — used for vessel and blood flow assessment. <strong>Echocardiogram</strong> — cardiac ultrasound measuring ejection fraction, valve function.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">💻</span><span class="ic-title">CT scan (CT / CCT)</span><span class="ic-badge"><span class="badge badge-alert">High radiation</span></span></div><div class="imaging-card-body">Rapid, detailed cross-sectional imaging. Best for trauma, chest, abdomen. <strong>CCT</strong> = cranial CT. Note contrast agent use: always specify oral or IV contrast.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">☢</span><span class="ic-title">Nuclear medicine / PET-CT</span><span class="ic-badge"><span class="badge badge-alert">Radiation</span></span></div><div class="imaging-card-body">Uses radiotracers. <strong>FDG (fluorodeoxyglucose)</strong> accumulation on PET scans indicates metabolically active tissue — seen in tumours and active inflammation.</div></div>
<h2>Cardiac tests</h2>
<div class="info-card"><p><strong>ECG / EKG</strong> — records heart's electrical activity. 12-lead ECG is standard. Key terms in transcription: sinus rhythm, ST elevation/depression, QRS complex, PR interval, T-wave inversion, left bundle branch block (LBBB). <strong>Holter monitor</strong> — continuous ECG recording (24–48 h) used to detect arrhythmias.</p></div>
<h2>Respiratory tests</h2>
<div class="info-card"><p><strong>Spirometry</strong> — measures lung volumes (FVC, FEV1, FEV1/FVC ratio). Reduced ratio = obstructive pattern (asthma, COPD). Reduced FVC with normal ratio = restrictive pattern. <strong>Atelectase / atelectasis</strong> — collapse of lung tissue, visible on imaging as streaks (atelectasestreng = atelectatic band).</p></div>
<h2>Quick-check quiz</h2>`,
de:`<h1>Tests &amp; Diagnostik</h1><p class="subtitle">Laborwerte, Bildgebungsverfahren und kardiologische/pulmologische Tests.</p>
<h2>Großes Blutbild — Normwerte</h2>
<table><tr><th>Parameter</th><th>Normal (Erwachsene)</th><th>Erniedrigt</th><th>Erhöht</th></tr>
<tr><td>Hämoglobin (Hb) — ♀</td><td>120–160 g/l</td><td>Anämie</td><td>Polyzythämie</td></tr>
<tr><td>Hämoglobin (Hb) — ♂</td><td>130–175 g/l</td><td>Anämie</td><td>Polyzythämie</td></tr>
<tr><td>Leukozyten (WBC)</td><td>4–11 × 10⁹/l</td><td>Leukopenie</td><td>Leukozytose (Infektion/Entzündung)</td></tr>
<tr><td>Thrombozyten (PLT)</td><td>150–400 × 10⁹/l</td><td>Thrombozytopenie</td><td>Thrombozytose</td></tr></table>
<h2>Klinische Chemie</h2>
<table><tr><th>Parameter</th><th>Normwert</th><th>Klinische Bedeutung</th></tr>
<tr><td>Nüchternglukose</td><td>3,9–5,6 mmol/l</td><td>↑ Diabetes; ↓ Hypoglykämie</td></tr>
<tr><td>HbA1c</td><td>&lt; 42 mmol/mol</td><td>≥ 48 = Diabetes mellitus</td></tr>
<tr><td>Kreatinin</td><td>60–110 µmol/l</td><td>↑ Niereninsuffizienz</td></tr>
<tr><td>TSH</td><td>0,4–4,0 mIU/l</td><td>↓ Hyperthyreose; ↑ Hypothyreose</td></tr>
<tr><td>GGT / GPT / GOT</td><td>Variabel</td><td>Leberwerte — ↑ bei Lebererkrankungen</td></tr>
<tr><td>Troponin</td><td>Nahezu 0</td><td>↑ Myokardschaden (ACS/MI)</td></tr></table>
<div class="info-card"><p><strong>Leberwerte im Diktat:</strong> <strong>GGT</strong> (Gamma-Glutamyltransferase), <strong>GPT</strong> (= ALT, Glutamat-Pyruvat-Transaminase) und <strong>GOT</strong> (= AST, Glutamat-Oxalacetat-Transaminase). Im deutschen Sprachraum werden GPT/GOT bevorzugt, jedoch ist auch ALT/AST gebräuchlich (GPT/GOT gelten zunehmend als veraltete Termini). Immer so transkribieren, wie diktiert.</p></div>
<h2>Bildgebungsverfahren</h2>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🩻</span><span class="ic-title">Röntgen</span><span class="ic-badge"><span class="badge badge-caution">Strahlung</span></span></div><div class="imaging-card-body">Schnell, breit verfügbar. Einsatz: Thorax (<strong>X-Thorax</strong>), Wirbelsäule (<strong>X-TWK</strong> = thorakale Wirbelsäule, <strong>X-LWK</strong> = lumbale Wirbelsäule), Frakturen. <strong>Low-dose CT (LDCT)</strong> — dosisreduziertes CT, z.B. zur Lungenkrebsvorsorge. <strong>Mamma-C</strong> — Mammografie (C = Compression View).</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🧲</span><span class="ic-title">MRT (Magnetresonanztomografie)</span><span class="ic-badge"><span class="badge badge-normal">Keine Strahlung</span></span></div><div class="imaging-card-body">Goldstandard für Gehirn, Rückenmark, Weichteile, Gelenke. Schlüsselbegriffe: <strong>T1</strong> (anatomische Darstellung, Fett hell), <strong>T2</strong> (Flüssigkeit/Ödem hell — z.B. T2-Signalveränderungen). <strong>Weiße-Substanz-Läsionen</strong> werden nach der <strong>Fazekas-Skala</strong> (0–3) eingeteilt. Hinweis: <em>Magnetresonanztomografie</em> = die Untersuchung; <em>Magnetresonanzgramm</em> = das entstandene Bild.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">📡</span><span class="ic-title">Sonografie / Ultraschall</span><span class="ic-badge"><span class="badge badge-normal">Keine Strahlung</span></span></div><div class="imaging-card-body"><strong>FKDS</strong> (farbkodierte Dopplersonografie) — Farbdoppler-Ultraschall zur Gefäßbeurteilung. <strong>Echokardiografie</strong> — kardiale Sonografie zur Messung von Ejektionsfraktion und Klappenfunktion. Hinweis: <em>Sonografie</em> = die Untersuchung; <em>Sonogramm</em> = das entstandene Bild.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">💻</span><span class="ic-title">CT / CCT (Computertomografie)</span><span class="ic-badge"><span class="badge badge-alert">Hohe Strahlendosis</span></span></div><div class="imaging-card-body">Detailreiche Schnittbildgebung. <strong>CCT</strong> = kraniale CT. Wichtige Begriffe: Kontrastmittel, KM-gestützt, Nativ-CT. Hinweis: <em>Computertomografie</em> = die Untersuchung; <em>Computertomogramm</em> = das entstandene Bild.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">☢</span><span class="ic-title">Nuklearmedizin / PET-CT</span><span class="ic-badge"><span class="badge badge-alert">Strahlung</span></span></div><div class="imaging-card-body">Einsatz von radioaktiven Tracern (Radiopharmaka). <strong>FDG-Anreicherung</strong> im PET = erhöhter Glukosestoffwechsel (Tumor, Entzündung). <strong>Szintigrafie</strong>, <strong>SPECT</strong> ebenfalls in Diktaten möglich.</div></div>
<h2>Kardiologische Tests</h2>
<div class="info-card"><p><strong>EKG (Elektrokardiogramm)</strong> — Ableitung der elektrischen Herzaktivität. 12-Kanal-EKG Standard. Wichtige Begriffe: Sinusrhythmus, ST-Hebung/-Senkung, Linksschenkelblock (LSB), QRS-Komplex, PQ-Zeit. <strong>Holter-Monitor</strong> — Langzeit-EKG (24–48 Std.) zur Erfassung von Rhythmusstörungen.</p></div>
<h2>Pulmologische Tests</h2>
<div class="info-card"><p><strong>Spirometrie</strong> — Messung von Lungenvolumina (FVC, FEV1, Tiffeneau-Index). Erniedrigter Quotient = obstruktives Muster (Asthma, COPD). Erniedrigte FVC bei normalem Quotienten = restriktives Muster. <strong>Atelektase</strong> — Kollaps von Lungengewebe, im Röntgenbild als Streifen sichtbar (Atelektasestrang).</p></div>
<h2>Kurzes Quiz</h2>`,
nl:`<h1>Tests &amp; diagnostiek</h1><p class="subtitle">Laboratoriumwaarden, beeldvormingstechnieken en cardiale/pulmonale onderzoeken.</p>
<h2>Volledig bloedbeeld — normaalwaarden</h2>
<table><tr><th>Parameter</th><th>Normaal (volwassene)</th><th>Verlaagd</th><th>Verhoogd</th></tr>
<tr><td>Hemoglobine (Hb) — ♀</td><td>7,5–10,0 mmol/L</td><td>Anemie</td><td>Polyglobulie</td></tr>
<tr><td>Hemoglobine (Hb) — ♂</td><td>8,5–11,0 mmol/L</td><td>Anemie</td><td>Polyglobulie</td></tr>
<tr><td>Leukocyten (WBC)</td><td>4–11 × 10⁹/L</td><td>Leukopenie</td><td>Leukocytose (infectie/ontsteking)</td></tr>
<tr><td>Trombocyten (Plt)</td><td>150–400 × 10⁹/L</td><td>Trombocytopenie</td><td>Trombocytose</td></tr></table>
<h2>Biochemie</h2>
<table><tr><th>Parameter</th><th>Normaal</th><th>Klinische betekenis</th></tr>
<tr><td>Nuchtere glucose</td><td>3,9–5,6 mmol/L</td><td>↑ Diabetes; ↓ Hypoglykemie</td></tr>
<tr><td>HbA1c</td><td>&lt;42 mmol/mol</td><td>≥48 = Diabetes mellitus</td></tr>
<tr><td>Creatinine</td><td>60–110 µmol/L</td><td>↑ Nierinsufficiëntie</td></tr>
<tr><td>TSH</td><td>0,4–4,0 mIU/L</td><td>↓ Hyperthyreoïdie; ↑ Hypothyreoïdie</td></tr>
<tr><td>Leverenzymen (ALAT/ASAT/GGT)</td><td>Variabel</td><td>↑ bij leveraandoeningen</td></tr>
<tr><td>Troponine</td><td>Vrijwel 0</td><td>↑ Myocardbeschadiging (ACS/MI)</td></tr></table>
<h2>Beeldvormingstechnieken</h2>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🩻</span><span class="ic-title">Röntgenopname</span><span class="ic-badge"><span class="badge badge-caution">Straling</span></span></div><div class="imaging-card-body">Snel en breed beschikbaar. Gebruik: thorax (<strong>X-thorax</strong>), wervelkolom (<strong>X-CWK</strong> = cervicale wervelkolom, <strong>X-TWK</strong> = thoracale wervelkolom, <strong>X-LWK</strong> = lumbale wervelkolom), fracturen, ileus. <strong>Mamma-C</strong> — mammografie met compressiestand. <strong>Lichtversterkte zones</strong> — heldere gebieden op röntgenfoto. <strong>Streperig</strong> — streping op thoraxfoto, bijv. bij atelectase.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🧲</span><span class="ic-title">MRI (Magnetic Resonance Imaging)</span><span class="ic-badge"><span class="badge badge-normal">Geen straling</span></span></div><div class="imaging-card-body">Een MRI werkt met een sterke magneet en radiogolven. Hiermee worden signalen in het lichaam opgewekt en via de computer worden beelden gemaakt. Er wordt geen röntgenstraling gebruikt. Voorkeursmethode voor hersenen, ruggenmerg, weke delen en spieren. Soms wordt een MRI met contrastmiddel uitgevoerd om organen of bloedvaten beter zichtbaar te maken. <strong>T1</strong> (anatomie, vet wit), <strong>T2</strong> (vocht/oedeem wit — T2-hyperintensiteiten). <strong>Wittestofafwijkingen</strong> — MRI-veranderingen in de witte stof, ingedeeld via de <strong>Fazekas-schaal</strong> (0–3).</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">📡</span><span class="ic-title">Echografie / Ultrageluid</span><span class="ic-badge"><span class="badge badge-normal">Geen straling</span></span></div><div class="imaging-card-body"><strong>FKDS</strong> (kleurencodeerde Doppler-sonografie) — voor vaatbeoordeling. <strong>Echocardiografie</strong> — hartecho voor ejectiefractie en klepfunctie.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">💻</span><span class="ic-title">CT-scan</span><span class="ic-badge"><span class="badge badge-alert">Hoge stralingsdosis</span></span></div><div class="imaging-card-body">Gedetailleerde snede-beeldvorming. Let op: een CT-scan kan met of zonder contrastmiddel worden uitgevoerd. Contrast wordt gebruikt om vaten, tumoren, organen en ontstekingen beter zichtbaar te maken. Contrastmiddel via de ader (intraveneus, i.v.) maakt bloedvaten, organen en tumoren zichtbaar. Oraal contrast (via drankje) maakt het maag-darmkanaal zichtbaar. <strong>Natiefopname</strong> = zonder contrast; <strong>contrastopname</strong> = met contrast. <strong>Low-dose CT (LDCT)</strong> — dosisverlaagde CT voor o.a. longkankerschreening.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">☢</span><span class="ic-title">Nucleaire geneeskunde / PET-CT</span><span class="ic-badge"><span class="badge badge-alert">Straling</span></span></div><div class="imaging-card-body">Bij de nucleaire geneeskunde worden radioactieve stoffen gebruikt om diagnoses te stellen en behandelingen uit te voeren. Met behulp van gamma- of PET-camera's kunnen organen in beeld worden gebracht en afwijkingen in weefsels worden gezien. <strong>FDG-stapeling</strong> — ophoping van fluorodeoxyglucose in PET-scan, duidt op metabolisch actief weefsel (tumor, ontsteking). <strong>Nier-achtergrond-ratio</strong> — verhouding nier/achtergrond bij scintigrafie.</div></div>
<h2>Cardiologische tests</h2>
<div class="info-card"><p><strong>ECG</strong> (ook wel <em>hartfilmpje</em> genoemd) — registreert elektrische hartactiviteit. Begrippen: sinusritme, ST-elevatie/-depressie, LBTB (linker bundeltakblok), QRS-complex, PR-interval, T-topinversie. <strong>Holter-monitor</strong> — langdurige ECG-registratie (24–48 uur) om ritmestoornissen op te sporen.</p></div>
<h2>Pulmonologische tests</h2>
<div class="info-card"><p>Longfunctieonderzoek kan bestaan uit een longvolumemeting of een <strong>spirometrie</strong> — meting van longvolumes (FVC, FEV1, Tiffeneau-index). Verlaagde ratio = obstructief patroon (astma, COPD). Verlaagde FVC bij normale ratio = restrictief patroon. <strong>Atelectasestreng</strong> — bandvormige atelectase zichtbaar op röntgenfoto of CT.</p></div>
<h2>Korte quiz</h2>`,
fr:`<h1>Tests &amp; diagnostics</h1><p class="subtitle">Valeurs biologiques, modalités d'imagerie et tests cardiaques/respiratoires.</p>
<h2>Numération formule sanguine (NFS) — valeurs normales</h2>
<table><tr><th>Paramètre</th><th>Normale (adulte)</th><th>Bas</th><th>Élevé</th></tr>
<tr><td>Hémoglobine (Hb) — ♀</td><td>120–160 g/L</td><td>Anémie</td><td>Polyglobulie</td></tr>
<tr><td>Hémoglobine (Hb) — ♂</td><td>130–175 g/L</td><td>Anémie</td><td>Polyglobulie</td></tr>
<tr><td>GB (leucocytes)</td><td>4–11 × 10⁹/L</td><td>Leucopénie</td><td>Hyperleucocytose (infection/inflammation)</td></tr>
<tr><td>Plaquettes (Plt)</td><td>150–400 × 10⁹/L</td><td>Thrombopénie</td><td>Thrombocytose</td></tr></table>
<h2>Biochimie</h2>
<table><tr><th>Paramètre</th><th>Normale</th><th>Signification clinique</th></tr>
<tr><td>Glycémie à jeun</td><td>3,9–5,6 mmol/L</td><td>↑ Diabète ; ↓ Hypoglycémie</td></tr>
<tr><td>HbA1c</td><td>&lt;42 mmol/mol</td><td>≥48 = Diabète mellitus</td></tr>
<tr><td>Créatinine</td><td>60–110 µmol/L</td><td>↑ Insuffisance rénale</td></tr>
<tr><td>TSH</td><td>0,4–4,0 mIU/L</td><td>↓ Hyperthyroïdie ; ↑ Hypothyroïdie</td></tr>
<tr><td>GGT / ALAT / ASAT</td><td>Variable</td><td>Enzymes hépatiques — ↑ si atteinte hépatique</td></tr>
<tr><td>Troponine</td><td>Quasi zéro</td><td>↑ Lésion myocardique (SCA/IDM)</td></tr></table>
<h2>Modalités d'imagerie</h2>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🩻</span><span class="ic-title">Radiographie standard</span><span class="ic-badge"><span class="badge badge-caution">Rayonnements</span></span></div><div class="imaging-card-body">Rapide et accessible. Utilisations : thorax (radio thorax / <em>X-thorax</em>), rachis, fractures. <strong>Scanner faible dose (LDCT)</strong> — dépistage du cancer du poumon. <strong>Mammographie</strong> — incidence de compression (C). Termes associés : zones de densité accrue, images en verre dépoli.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">🧲</span><span class="ic-title">IRM (Imagerie par résonance magnétique)</span><span class="ic-badge"><span class="badge badge-normal">Sans rayonnements</span></span></div><div class="imaging-card-body">Référence pour cerveau, moelle épinière, tissus mous. <strong>T1</strong> (anatomie, graisse en blanc), <strong>T2</strong> (liquide/œdème en blanc — hypersignal T2). <strong>Lésions de la substance blanche</strong> — classées selon l'échelle de <strong>Fazekas</strong> (0–3).</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">📡</span><span class="ic-title">Échographie / Doppler</span><span class="ic-badge"><span class="badge badge-normal">Sans rayonnements</span></span></div><div class="imaging-card-body"><strong>Doppler couleur</strong> (écho-Doppler) — bilan vasculaire. <strong>Échocardiographie</strong> — mesure de la fraction d'éjection, étude des valves.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">💻</span><span class="ic-title">Scanner TDM</span><span class="ic-badge"><span class="badge badge-alert">Dose élevée</span></span></div><div class="imaging-card-body">Imagerie en coupe rapide et détaillée. <strong>TDM cérébral (CCT)</strong>. Attention : injection de produit de contraste (PDC), acquisition native ou avec injection.</div></div>
<div class="imaging-card"><div class="imaging-card-header"><span class="ic-icon">☢</span><span class="ic-title">Médecine nucléaire / TEP-TDM</span><span class="ic-badge"><span class="badge badge-alert">Rayonnements</span></span></div><div class="imaging-card-body">La médecine nucléaire utilise des traceurs radioactifs pour établir des diagnostics et réaliser des traitements. Les caméras gamma et les TEP permettent de visualiser les organes et de détecter des anomalies dans les tissus. <strong>Hyperfixation du FDG</strong> — captation accrue du fluorodésoxyglucose au TEP, évocatrice de tissu métaboliquement actif (tumeur, inflammation). <strong>Scintigraphie</strong>, <strong>SPECT</strong> également rencontrés en dictée.</div></div>
<h2>Tests cardiaques</h2>
<div class="info-card"><p><strong>ECG</strong> — enregistrement de l'activité électrique cardiaque. 12 dérivations. Termes : rythme sinusal, sus-décalage ST, bloc de branche gauche (BBG), complexe QRS, intervalle PR, inversion de l'onde T. <strong>Holter</strong> — enregistrement ECG continu (24–48 h) pour détecter les troubles du rythme.</p></div>
<h2>Tests respiratoires</h2>
<div class="info-card"><p><strong>Spirométrie</strong> — mesure des volumes pulmonaires (CVF, VEMS, indice de Tiffeneau). Ratio abaissé = trouble obstructif (asthme, BPCO). CVF abaissée avec ratio normal = trouble restrictif. <strong>Atélectasie</strong> — collapsus du tissu pulmonaire, visible en bande sur la radiographie ou le scanner.</p></div>
<h2>Quiz rapide</h2>`

symptoms:{
en:`<h1>Symptoms &amp; Conditions</h1><p class="subtitle">Respiratory, cardiovascular, neurological, GI, urological, musculoskeletal and psychiatric clinical terminology — comprehensive for transcriptionists.</p>
<h2>Respiratory symptoms</h2>
<table><tr><th>Term</th><th>Meaning</th><th>Clinical notes</th></tr>
<tr><td><strong>Dyspnoea</strong></td><td>Difficulty breathing / breathlessness</td><td>Grade by MRC scale 1–5. Note at rest vs on exertion.</td></tr>
<tr><td><strong>Orthopnoea</strong></td><td>Dyspnoea when lying flat</td><td>Relieved by sitting upright. Number of pillows = proxy severity. Sign of heart failure.</td></tr>
<tr><td><strong>PND</strong></td><td>Paroxysmal nocturnal dyspnoea</td><td>Wakes patient from sleep. Heart failure sign.</td></tr>
<tr><td><strong>Tachypnoea</strong></td><td>Respiratory rate &gt;20/min</td><td>Note accessory muscle use, nasal flaring, intercostal recession.</td></tr>
<tr><td><strong>Bradypnoea</strong></td><td>Respiratory rate &lt;12/min</td><td>Opioids, sedation, metabolic causes.</td></tr>
<tr><td><strong>Apnoea</strong></td><td>Cessation of breathing</td><td>Note duration. OSA = obstructive sleep apnoea.</td></tr>
<tr><td><strong>Haemoptysis</strong></td><td>Coughing up blood</td><td>Distinguish from haematemesis (vomited blood). Note volume and appearance.</td></tr>
<tr><td><strong>Stridor</strong></td><td>High-pitched inspiratory noise</td><td>Upper airway obstruction — always urgent.</td></tr>
<tr><td><strong>Wheeze</strong></td><td>High-pitched expiratory noise</td><td>Asthma, COPD, bronchospasm.</td></tr>
<tr><td><strong>Crepitations / crackles</strong></td><td>Crackling lung sounds on auscultation</td><td>Fine (pulmonary oedema, fibrosis) vs coarse (pneumonia, bronchiectasis).</td></tr>
<tr><td><strong>Dysphonia</strong></td><td>Impaired voice production</td><td>Laryngitis, recurrent laryngeal nerve palsy, vocal cord pathology.</td></tr>
<tr><td><strong>Aphonia</strong></td><td>Absent voice production</td><td>Extreme form of dysphonia.</td></tr>
<tr><td><strong>Epistaxis</strong></td><td>Nosebleed</td><td>Anterior (Little's area, common) vs posterior (severe, may need packing).</td></tr></table>
<h2>Cardiovascular symptoms</h2>
<table><tr><th>Term</th><th>Meaning</th><th>Notes</th></tr>
<tr><td><strong>Angina pectoris</strong></td><td>Chest pain/tightness on exertion, relieved by rest or GTN</td><td>Stable vs unstable. CCS grading I–IV. Note radiation pattern (arm, jaw, back).</td></tr>
<tr><td><strong>Palpitations</strong></td><td>Awareness of heartbeat</td><td>Describe: fast/slow, regular/irregular, onset/offset pattern.</td></tr>
<tr><td><strong>Syncope</strong></td><td>Transient loss of consciousness (TLOC)</td><td>Vasovagal, cardiac, orthostatic, neurological. Note prodrome and recovery.</td></tr>
<tr><td><strong>Pre-syncope</strong></td><td>Near-fainting without LOC</td><td>Lightheadedness, dizziness, near-blackout.</td></tr>
<tr><td><strong>Claudication</strong></td><td>Calf/thigh pain on walking, relieved by rest</td><td>Peripheral arterial disease. Document walking distance at onset.</td></tr>
<tr><td><strong>Oedema</strong></td><td>Fluid accumulation in tissues</td><td>Pitting vs non-pitting. Bilateral vs unilateral. Grade 1–4. Note extent (ankle/knee/thigh/sacral).</td></tr>
<tr><td><strong>DVT</strong></td><td>Deep vein thrombosis</td><td>Calf warmth, swelling, pain. Use Wells score. Risk: immobility, malignancy, recent surgery.</td></tr>
<tr><td><strong>Swirl sign</strong></td><td>CT finding: hyperdense swirling in haematoma</td><td>Active arterial bleeding. Predicts haematoma expansion. Important in TBI.</td></tr></table>
<h2>Neurological symptoms</h2>
<table><tr><th>Term</th><th>Meaning</th></tr>
<tr><td><strong>Headache types</strong></td><td><strong>Tension:</strong> bilateral band-like pressure. <strong>Migraine :</strong> unilateral, throbbing, photophobia, nausea, with or without aura. <strong>Cluster:</strong> periorbital, autonomic (lacrimation, rhinorrhoea). <strong>Thunderclap:</strong> sudden severe — SAH until proven otherwise (red flag).</td></tr>
<tr><td><strong>Vertigo</strong></td><td>Illusion of movement. Peripheral (BPPV, labyrinthitis) = positional, with nausea. Central (posterior fossa, stroke) = gait instability, neurological signs.</td></tr>
<tr><td><strong>Diplopia</strong></td><td>Double vision. Binocular (oculomotor nerve/muscle) vs monocular (lens, cornea).</td></tr>
<tr><td><strong>Ataxia</strong></td><td>Loss of coordination. Cerebellar (wide-based gait, past-pointing, intention tremor) vs sensory (worsens with eyes closed).</td></tr>
<tr><td><strong>Dysarthria</strong></td><td>Slurred/indistinct speech from motor deficit — distinct from aphasia (language disorder).</td></tr>
<tr><td><strong>Aphasia / dysphasia</strong></td><td>Language disorder: expressive (Broca's — speaks poorly, comprehends), receptive (Wernicke's — fluent nonsense), global (both impaired).</td></tr>
<tr><td><strong>Dysphagia</strong></td><td>Difficulty swallowing. Progressive = malignancy until proven otherwise. Distinct from odynophagia (painful swallowing).</td></tr>
<tr><td><strong>Paraesthesia</strong></td><td>Tingling / pins and needles. Note dermatomal (nerve root), peripheral (neuropathy), or stocking-glove (polyneuropathy) distribution.</td></tr>
<tr><td><strong>Paresis / plegia</strong></td><td>Weakness / complete paralysis. Mono- (one limb), hemi- (same side), para- (lower limbs), quadri/tetra- (all four). UMN vs LMN signs.</td></tr>
<tr><td><strong>Tremor</strong></td><td>Resting (Parkinson's — pill-rolling), intention (cerebellar — worsens pointing), postural (essential, thyrotoxicosis, benign).</td></tr>
<tr><td><strong>Seizure</strong></td><td>Generalised tonic-clonic, absence, myoclonic, focal. Note aura, duration, post-ictal state, incontinence.</td></tr>
<tr><td><strong>Delirium / confusion</strong></td><td>Acute change in cognition — hyperactive, hypoactive, or mixed. Use CAM score. Always seek cause (infection, metabolic, drugs).</td></tr></table>
<h2>Parkinson's disease — full sign list (TRAP)</h2>
<div class="info-card"><p><strong>Four cardinal features — TRAP:</strong> Tremor (resting, pill-rolling), Rigidity (cogwheel or lead-pipe), Akinesia/bradykinesia, Postural instability.</p></div>
<table><tr><th>Sign</th><th>Description</th></tr>
<tr><td>Akinesia / hypokinesia</td><td>Absence/reduction of spontaneous movement. Shuffling gait, reduced arm swing, decreased facial expression.</td></tr>
<tr><td>Bradykinesia</td><td>Slowing of all voluntary movements — dressing, walking, writing.</td></tr>
<tr><td>Bradyphrenia</td><td>Slowing of cognitive processing and thought.</td></tr>
<tr><td>Cogwheel rigidity</td><td>Ratchet-like resistance on passive limb movement.</td></tr>
<tr><td>Lead-pipe rigidity</td><td>Constant uniform resistance throughout range of movement.</td></tr>
<tr><td>Start hesitation / freezing</td><td>Sudden inability to initiate movement — "feet stuck to floor".</td></tr>
<tr><td>Hypomimia</td><td>Reduced facial expression (mask face), decreased blink rate, hypophonia (soft voice).</td></tr>
<tr><td>Micrographia</td><td>Progressively smaller handwriting — classic Parkinson's feature.</td></tr>
<tr><td>On-Off phenomenon</td><td>Fluctuating response to levodopa: hyperkinesia (on) alternating with akinesia (off).</td></tr>
<tr><td>Dyskinesia</td><td>Involuntary writhing movements — levodopa peak-dose side effect.</td></tr>
<tr><td>Akinetic crisis</td><td>Complete akinesia. Patient cannot eat or drink. Risk of dehydration and aspiration. Medical emergency.</td></tr>
<tr><td>Pro-/retro-/lateropulsion</td><td>Impaired postural reflexes — tendency to fall forward/backward/sideways.</td></tr>
<tr><td>Pillow sign</td><td>Head floats above pillow when suddenly released — due to neck rigidity.</td></tr>
<tr><td>Sialorrhoea</td><td>Drooling due to dysphagia / reduced spontaneous swallowing frequency.</td></tr>
<tr><td>Seborrhoea</td><td>Excessive sebum production — autonomic feature.</td></tr></table>
<h2>Gastrointestinal symptoms</h2>
<table><tr><th>Term</th><th>Meaning</th></tr>
<tr><td><strong>Haematemesis</strong></td><td>Vomiting blood. Coffee-ground vomiting = digested blood (upper GI bleed).</td></tr>
<tr><td><strong>Melaena</strong></td><td>Black tarry stools — digested blood — upper GI bleed source.</td></tr>
<tr><td><strong>Haematochezia</strong></td><td>Fresh red blood per rectum — lower GI bleed or massive upper GI bleed.</td></tr>
<tr><td><strong>Tenesmus</strong></td><td>Feeling of incomplete rectal emptying — rectal cancer, IBD, proctitis.</td></tr>
<tr><td><strong>Ileus</strong></td><td>Bowel obstruction. Mechanical (adhesions, hernia, tumour) or paralytic (post-op, metabolic). Life-threatening. Subileus = incomplete obstruction.</td></tr>
<tr><td><strong>Jaundice / icterus</strong></td><td>Yellow discolouration of skin and sclera. Pre-hepatic (haemolysis), hepatic (liver disease), post-hepatic (biliary obstruction).</td></tr>
<tr><td><strong>Ascites</strong></td><td>Fluid accumulation in peritoneal cavity — cirrhosis, malignancy, right heart failure.</td></tr>
<tr><td><strong>Odynophagia</strong></td><td>Painful swallowing — oesophagitis, candidiasis, ulcer.</td></tr></table>
<h2>Urological symptoms</h2>
<table><tr><th>Term</th><th>Meaning</th></tr>
<tr><td><strong>Dysuria</strong></td><td>Painful/burning urination — UTI, urethritis, cystitis.</td></tr>
<tr><td><strong>Polyuria</strong></td><td>Excessive urine production (&gt;3 L/day) — diabetes mellitus/insipidus, diuretics.</td></tr>
<tr><td><strong>Oliguria</strong></td><td>&lt;400 mL/day — renal impairment, dehydration, obstruction.</td></tr>
<tr><td><strong>Anuria</strong></td><td>&lt;100 mL/day — acute kidney injury, complete obstruction.</td></tr>
<tr><td><strong>Haematuria</strong></td><td>Blood in urine. Macroscopic (visible) vs microscopic (dipstick/microscopy only).</td></tr>
<tr><td><strong>Incontinence</strong></td><td>Urge (overactive bladder), stress (cough/sneeze), overflow (retention), functional.</td></tr></table>
<h2>Musculoskeletal &amp; dermatological</h2>
<table><tr><th>Term</th><th>Meaning</th></tr>
<tr><td><strong>Arthralgia</strong></td><td>Joint pain without objective signs of inflammation.</td></tr>
<tr><td><strong>Arthritis</strong></td><td>Joint inflammation — warmth, swelling, redness, pain, restricted movement.</td></tr>
<tr><td><strong>Myalgia</strong></td><td>Muscle pain — note statin use (myopathy/rhabdomyolysis risk: check CK).</td></tr>
<tr><td><strong>Pruritus</strong></td><td>Itching. Generalised (cholestasis, uraemia, lymphoma, polycythaemia) vs localised.</td></tr>
<tr><td><strong>Urticaria</strong></td><td>Raised itchy wheals. Allergic or idiopathic. Can be part of anaphylaxis.</td></tr>
<tr><td><strong>Petechiae</strong></td><td>Pinpoint non-blanching bleeds — thrombocytopenia, vasculitis, meningococcaemia.</td></tr>
<tr><td><strong>Purpura</strong></td><td>Larger non-blanching lesions — haematological or vasculitic cause.</td></tr></table>
<h2>Eye examination terms</h2>
<table><tr><th>Term</th><th>Meaning</th></tr>
<tr><td><strong>PERLA</strong></td><td>Pupils Equal and Reactive to Light and Accommodation.</td></tr>
<tr><td><strong>Anisocoria</strong></td><td>Unequal pupil sizes — physiological or pathological (CN III palsy, Horner's syndrome).</td></tr>
<tr><td><strong>Convergence reaction</strong></td><td>Reflex convergence of both eyes + accommodation + miosis on near fixation.</td></tr>
<tr><td><strong>Nystagmus</strong></td><td>Involuntary rhythmic eye movement — note direction (horizontal/vertical/rotatory).</td></tr>
<tr><td><strong>Papilloedema</strong></td><td>Optic disc swelling from raised intracranial pressure — emergency.</td></tr>
<tr><td><strong>Synechiae</strong></td><td>Iris adhesions. Posterior (iris to lens) or anterior (iris to cornea).</td></tr></table>
<h2>Psychiatric &amp; cognitive</h2>
<table><tr><th>Term</th><th>Meaning</th></tr>
<tr><td><strong>Hallucination</strong></td><td>Perception without stimulus — auditory (schizophrenia), visual (delirium, DLB, substance).</td></tr>
<tr><td><strong>Delusion</strong></td><td>Fixed false belief not amenable to reason — persecutory, grandiose, somatic.</td></tr>
<tr><td><strong>Anhedonia</strong></td><td>Loss of pleasure in previously enjoyable activities — core depression symptom.</td></tr>
<tr><td><strong>Somnolence / obtundation</strong></td><td>Abnormal drowsiness requiring stimulation to rouse.</td></tr>
<tr><td><strong>Coma</strong></td><td>Unresponsive to all stimulation. GCS &lt;8. Always document E/V/M separately.</td></tr></table>
<h2>Quick-check quiz</h2>`,
de:`<h1>Symptome &amp; Erkrankungen</h1><p class="subtitle">Atemwege, Herz-Kreislauf, Neurologie, Magen-Darm, Urologie, Bewegungsapparat und Psychiatrie — umfassend für Transkriptionisten.</p>
<h2>Atemwegssymptome</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th><th>Klinische Hinweise</th></tr>
<tr><td><strong>Dyspnoe</strong></td><td>Atemnot</td><td>MRC-Skala 1–5. In Ruhe vs. unter Belastung.</td></tr>
<tr><td><strong>Orthopnoe</strong></td><td>Atemnot im Liegen</td><td>Besserung im Sitzen. Kopfkissenanzahl als Schweregradmaß. Herzinsuffizienzzeichen.</td></tr>
<tr><td><strong>PND</strong></td><td>Paroxysmale nächtliche Dyspnoe</td><td>Aus dem Schlaf aufwachend. Herzinsuffizienz.</td></tr>
<tr><td><strong>Tachypnoe</strong></td><td>AF &gt; 20/min</td><td>Atemhilfsmuskeln, Nasenflügeln, Einziehungen dokumentieren.</td></tr>
<tr><td><strong>Bradypnoe</strong></td><td>AF &lt; 12/min</td><td>Opioide, Sedierung, metabolisch.</td></tr>
<tr><td><strong>Apnoe</strong></td><td>Atemstillstand</td><td>Dauer dokumentieren. OSA = obstruktive Schlafapnoe.</td></tr>
<tr><td><strong>Hämoptyse</strong></td><td>Bluthusten</td><td>Von Hämatemesis (Bluterbrechen) abgrenzen.</td></tr>
<tr><td><strong>Stridor</strong></td><td>Hochfrequentes inspiratorisches Geräusch</td><td>Obere Atemwegsobstruktion — immer dringlich.</td></tr>
<tr><td><strong>Giemen (Wheeze)</strong></td><td>Hochfrequentes exspiratorisches Geräusch</td><td>Asthma, COPD, Bronchospasmus.</td></tr>
<tr><td><strong>Rasselgeräusche</strong></td><td>Knisternde Lungengeräusche</td><td>Fein (Lungenödem, Fibrose) vs. grob (Pneumonie).</td></tr>
<tr><td><strong>Dysphonie</strong></td><td>Beeinträchtigte Stimmbildung</td><td>Laryngitis, RLN-Parese, Stimmlippen.</td></tr>
<tr><td><strong>Aphonie</strong></td><td>Fehlende Stimmbildung</td><td>Maximalform der Dysphonie.</td></tr>
<tr><td><strong>Epistaxis</strong></td><td>Nasenbluten</td><td>Anterior (Locus Kiesselbachii, häufig) vs. posterior (schwer).</td></tr></table>
<h2>Kardiovaskuläre Symptome</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th><th>Hinweise</th></tr>
<tr><td><strong>Angina pectoris</strong></td><td>Belastungsabhängiger Brustschmerz/-enge, Besserung in Ruhe oder unter Nitrat</td><td>Stabil vs. instabil. CCS I–IV. Ausstrahlungsmuster (Arm, Kiefer, Rücken).</td></tr>
<tr><td><strong>Palpitationen</strong></td><td>Bewusste Wahrnehmung des Herzschlags</td><td>Schnell/langsam, regelmäßig/unregelmäßig, Beginn/Ende.</td></tr>
<tr><td><strong>Synkope</strong></td><td>Kurzer, selbstlimitierender Bewusstseinsverlust</td><td>Vasovagal, kardial, orthostatisch, neurologisch.</td></tr>
<tr><td><strong>Präsynkope</strong></td><td>Beinahe-Ohnmacht ohne Bewusstseinsverlust</td><td>Schwindel, Schwarzwerden vor Augen.</td></tr>
<tr><td><strong>Claudicatio intermittens</strong></td><td>Beinschmerzen beim Gehen, Besserung in Ruhe</td><td>pAVK. Gehstrecke bis Einsetzen dokumentieren.</td></tr>
<tr><td><strong>Ödem</strong></td><td>Flüssigkeitsansammlung im Gewebe</td><td>Eindrückbar vs. nicht eindrückbar. Beidseits vs. einseitig. Ausdehnung (Knöchel/Knie/Oberschenkel/Sakral).</td></tr>
<tr><td><strong>TVT</strong></td><td>Tiefe Venenthrombose</td><td>Überwärmung, Schwellung, Schmerz. Wells-Score.</td></tr>
<tr><td><strong>Swirl Sign</strong></td><td>CT-Befund: hyperdenses Wirbelmuster im Hämatom</td><td>Aktive arterielle Blutung. Wichtig beim SHT.</td></tr></table>
<h2>Neurologische Symptome</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th></tr>
<tr><td><strong>Kopfschmerzen — Typen</strong></td><td><strong>Spannungskopfschmerz:</strong> bilateral, bandförmig. <strong>Migräne:</strong> halbseitig, pochend, Photophobie, Übelkeit, mit/ohne Aura. <strong>Clusterkopfschmerz:</strong> periorbital, autonom. <strong>Vernichtungskopfschmerz:</strong> plötzlich, schwerst — SAB ausschließen (Red Flag).</td></tr>
<tr><td><strong>Schwindel / Vertigo</strong></td><td>Dreh-/Schwankschwindel. Peripher (BPPV, Neuritis): lageabhängig, Übelkeit. Zentral (Kleinhirn, Infarkt): Gangstörung, neurologische Zeichen.</td></tr>
<tr><td><strong>Diplopie</strong></td><td>Doppelbilder. Binokular (Augenmotilität) vs. monokular (Linse, Hornhaut).</td></tr>
<tr><td><strong>Ataxie</strong></td><td>Koordinationsstörung. Zerebellär (Breitspurgang, Intentionstremor) vs. sensibel (verschlimmert bei Augenschluss).</td></tr>
<tr><td><strong>Dysarthrie</strong></td><td>Verwaschene Sprache durch motorisches Defizit — abgrenzen von Aphasie (Sprachstörung).</td></tr>
<tr><td><strong>Aphasie / Dysphasie</strong></td><td>Sprachstörung: expressiv (Broca — spricht schlecht, versteht), rezeptiv (Wernicke — flüssiger Unsinn), global.</td></tr>
<tr><td><strong>Dysphagie</strong></td><td>Schluckstörung. Progredient = Malignom ausschließen. Abgrenzen von Odynophagie.</td></tr>
<tr><td><strong>Parästhesie</strong></td><td>Kribbeln / Taubheit. Dermatom-, periphere oder strumpfartige Verteilung.</td></tr>
<tr><td><strong>Parese / Plegie</strong></td><td>Lähmung. Mono-, Hemi-, Para-, Tetraparese. ZNS- vs. PNS-Zeichen.</td></tr>
<tr><td><strong>Tremor</strong></td><td>Ruhetremor (Parkinson), Intentionstremor (Kleinhirn), Haltetremor (essentiell).</td></tr>
<tr><td><strong>Krampfanfall</strong></td><td>Generalisiert (tonisch-klonisch, Absenz) vs. fokal. Aura, Dauer, postiktaler Zustand, Inkontinenz.</td></tr>
<tr><td><strong>Delir / Verwirrtheit</strong></td><td>Akute Kognitionsstörung — hyperaktiv, hypoaktiv, gemischt. CAM-Score. Ursache suchen.</td></tr></table>
<h2>Morbus Parkinson — vollständige Zeichenliste (TRAP)</h2>
<div class="info-card"><p><strong>Vier Kardinalsymptome — TRAP:</strong> Tremor (Ruhe, Pillendreher), Rigor (Zahnrad-/Bleiröhre), Akinese/Bradykinese, Posturale Instabilität.</p></div>
<table><tr><th>Zeichen</th><th>Beschreibung</th></tr>
<tr><td>Akinese / Hypokinese</td><td>Fehlende/verminderte Spontanbewegungen. Kleinschrittiger, schlurfender Gang. Fehlende Mitbewegung der Arme.</td></tr>
<tr><td>Bradykinese</td><td>Verlangsamung aller Willkürbewegungen — Ankleiden, Gehen, Schreiben.</td></tr>
<tr><td>Bradyphrenie</td><td>Verlangsamte kognitive Verarbeitung und Denkabläufe.</td></tr>
<tr><td>Zahnradrigor</td><td>Ruckartige Widerstände bei passiver Gliedmaßenbewegung.</td></tr>
<tr><td>Bleiröhrenrigor</td><td>Gleichmäßiger Widerstand über den gesamten Bewegungsbereich.</td></tr>
<tr><td>Starthemmung / Freezing</td><td>Plötzlich eingefrorene Motorik — „Füße kleben am Boden".</td></tr>
<tr><td>Hypomimie</td><td>Ausdrucksarmes Maskengesicht, verminderter Lidschlag, Hypophonie.</td></tr>
<tr><td>Mikrographie</td><td>Kleiner werdende Handschrift — klassisches Parkinson-Merkmal.</td></tr>
<tr><td>On-Off-Phänomen</td><td>Wechsel zwischen Hyperkinese (On) und Akinese (Off) unter L-Dopa.</td></tr>
<tr><td>Dyskinesie</td><td>Unwillkürliche choreatiforme Bewegungen — L-Dopa-NW (Peak-dose).</td></tr>
<tr><td>Akinetische Krise</td><td>Vollständige Akinese. Patient isst/trinkt nicht mehr. Dehydratation, Aspirationsgefahr. Notfall.</td></tr>
<tr><td>Pro-/Retro-/Lateropulsion</td><td>Gestörter Haltungsreflex. Fallneigung nach vorn/hinten/seitwärts.</td></tr>
<tr><td>Kopfkissenphänomen</td><td>Kopf schwebt beim Loslassen über dem Kissen durch Nackenrigor.</td></tr>
<tr><td>Sialorrhö</td><td>Speichelfluss durch Dysphagie / verminderte Schluckfrequenz.</td></tr>
<tr><td>Seborrhö</td><td>Übermäßige Talgproduktion — autonomes Symptom.</td></tr></table>
<h2>Gastrointestinale Symptome</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th></tr>
<tr><td><strong>Hämatemesis</strong></td><td>Bluterbrechen. Kaffeesatzartiges Erbrechen = verdautes Blut (obere GI-Blutung).</td></tr>
<tr><td><strong>Meläna</strong></td><td>Schwarzer Teerstuhl — verdautes Blut — obere GI-Blutungsquelle.</td></tr>
<tr><td><strong>Hämatochezie</strong></td><td>Frisches rotes Blut ab ano — untere GI-Blutung.</td></tr>
<tr><td><strong>Tenesmus</strong></td><td>Gefühl unvollständiger Entleerung — Rektumkarzinom, CED, Proktitis.</td></tr>
<tr><td><strong>Ileus</strong></td><td>Darmverschluss. Mechanisch (Adhäsionen, Hernie, Tumor) oder paralytisch (postoperativ, metabolisch). Lebensbedrohlich. Subileus = unvollständig.</td></tr>
<tr><td><strong>Ikterus</strong></td><td>Gelbfärbung von Haut und Skleren. Prähepatisch (Hämolyse), hepatisch (Lebererkrankung), posthepatisch (Gallenwegsobstruktion).</td></tr>
<tr><td><strong>Aszites</strong></td><td>Flüssigkeit in der Peritonealhöhle — Zirrhose, Malignom, Rechtsherzinsuffizienz.</td></tr>
<tr><td><strong>Odynophagie</strong></td><td>Schmerzhaftes Schlucken — Ösophagitis, Candidose, Ulkus.</td></tr></table>
<h2>Urologische Symptome</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th></tr>
<tr><td><strong>Dysurie</strong></td><td>Schmerzhaftes/brennendes Wasserlassen — HWI, Urethritis.</td></tr>
<tr><td><strong>Polyurie</strong></td><td>Übermäßige Urinausscheidung (&gt; 3 l/Tag) — DM, DI, Diuretika.</td></tr>
<tr><td><strong>Oligurie</strong></td><td>&lt; 400 ml/Tag — Niereninsuffizienz, Dehydratation, Obstruktion.</td></tr>
<tr><td><strong>Anurie</strong></td><td>&lt; 100 ml/Tag — akutes Nierenversagen, vollständige Obstruktion.</td></tr>
<tr><td><strong>Hämaturie</strong></td><td>Blut im Urin. Makroskopisch (sichtbar) vs. mikroskopisch (Teststreifen/Mikroskopie).</td></tr></table>
<h2>Bewegungsapparat &amp; Haut</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th></tr>
<tr><td><strong>Arthralgie</strong></td><td>Gelenkschmerz ohne objektive Entzündungszeichen.</td></tr>
<tr><td><strong>Arthritis</strong></td><td>Gelenkentzündung — Wärme, Schwellung, Rötung, Schmerz, Bewegungseinschränkung.</td></tr>
<tr><td><strong>Myalgie</strong></td><td>Muskelschmerzen — bei Statinen: CK kontrollieren (Myopathie/Rhabdomyolyse).</td></tr>
<tr><td><strong>Pruritus</strong></td><td>Juckreiz. Generalisiert (Cholestase, Urämie, Lymphom) vs. lokalisiert.</td></tr>
<tr><td><strong>Urtikaria</strong></td><td>Erhabene, juckende Quaddeln. Allergisch oder idiopathisch.</td></tr>
<tr><td><strong>Petechien</strong></td><td>Punktförmige nicht wegdrückbare Hautblutungen — Thrombozytopenie, Vaskulitis.</td></tr>
<tr><td><strong>Purpura</strong></td><td>Größere nicht wegdrückbare Läsionen — hämatologisch oder vaskulitisch.</td></tr></table>
<h2>Psychiatrie &amp; Kognition</h2>
<table><tr><th>Begriff</th><th>Bedeutung</th></tr>
<tr><td><strong>Halluzination</strong></td><td>Wahrnehmung ohne äußeren Reiz — akustisch (Schizophrenie), visuell (Delir, Lewy-Körper-Demenz, Substanzen).</td></tr>
<tr><td><strong>Wahn</strong></td><td>Unveränderliche, falsche Überzeugung — Verfolgungs-, Größen- oder Körperwahn.</td></tr>
<tr><td><strong>Anhedonie</strong></td><td>Verlust der Freude an früher genossenen Aktivitäten — Kernsymptom der Depression.</td></tr>
<tr><td><strong>Somnolenz / Sopor</strong></td><td>Pathologische Schläfrigkeit mit Reizbarkeit zur Reaktion erforderlich. Stupor = tiefere Bewusstseinstrübung.</td></tr>
<tr><td><strong>Koma</strong></td><td>Keine Reaktion auf Reize. GCS &lt;8. Immer A/V/M einzeln dokumentieren.</td></tr></table>
<h2>Augenuntersuchung</h2>
<table><tr><th>Zeichen</th><th>Bedeutung</th></tr>
<tr><td><strong>PERLA</strong></td><td>Pupils Equal and Reactive to Light and Accommodation — Pupillen isokor und prompt lichtreagibel sowie konvergenzfähig. Standardbefund der neurologischen Untersuchung.</td></tr>
<tr><td><strong>Anisokorie</strong></td><td>Ungleiche Pupillenweite — physiologisch oder pathologisch (N.-III-Parese, Horner-Syndrom).</td></tr>
<tr><td><strong>Nystagmus</strong></td><td>Unwillkürliche rhythmische Augenbewegungen — Richtung (horizontal/vertikal/rotatorisch) dokumentieren.</td></tr>
<tr><td><strong>Papillenödem</strong></td><td>Stauungspapille durch erhöhten Hirndruck — Notfall.</td></tr></table>

nl:`<h1>Symptomen &amp; aandoeningen</h1><p class="subtitle">Klachten en ziektebeelden: ademhaling, hart-vaat, neurologie, maag-darm, urologie, bewegingsapparaat en psychiatrie — uitgebreid voor transcriptionisten.</p>
<h2>Ademhalingssymptomen</h2>
<table><tr><th>Term</th><th>Betekenis</th><th>Klinische toelichting</th></tr>
<tr><td><strong>Dyspneu</strong></td><td>Kortademigheid</td><td>MRC-schaal 1–5. In rust vs. bij inspanning.</td></tr>
<tr><td><strong>Orthopneu</strong></td><td>Kortademigheid in rugligging</td><td>Verlicht door rechtop zitten. Kussenaantal = maat voor ernst. Teken van hartfalen.</td></tr>
<tr><td><strong>PND</strong></td><td>Paroxysmale nachtelijke dyspneu</td><td>Wakker worden van benauwdheid. Hartfalen.</td></tr>
<tr><td><strong>Tachypneu</strong></td><td>Ademfrequentie &gt;20/min</td><td>Hulpademhalingsspieren, neusvleugelen, intrekking vermelden.</td></tr>
<tr><td><strong>Bradypneu</strong></td><td>Ademfrequentie &lt;12/min</td><td>Opioïden, sedatie, metabool.</td></tr>
<tr><td><strong>Apneu</strong></td><td>Ademstop</td><td>Duur vermelden. OSA = obstructief slaapapneusyndroom.</td></tr>
<tr><td><strong>Hemoptysis</strong></td><td>Bloed ophoesten</td><td>Onderscheiden van haematemesis (bloed braken).</td></tr>
<tr><td><strong>Stridor</strong></td><td>Hoge toon bij inademing</td><td>Obstructie bovenste luchtwegen — altijd urgent.</td></tr>
<tr><td><strong>Piepen (wheeze)</strong></td><td>Hoge toon bij uitademing</td><td>Astma, COPD, bronchospasme.</td></tr>
<tr><td><strong>Crepitaties</strong></td><td>Knetterend longgeruis</td><td>Fijn (longoedeem, fibrose) vs. grof (pneumonie).</td></tr>
<tr><td><strong>Dysfonie</strong></td><td>Gestoorde stemvorming</td><td>Laryngitis, recurrensparese, stembanden.</td></tr>
<tr><td><strong>Afonie</strong></td><td>Afwezige stemvorming</td><td>Uiterste vorm van dysfonie.</td></tr>
<tr><td><strong>Epistaxis</strong></td><td>Bloedneus</td><td>Anterieur (Locus Kiesselbachii, veel) vs. posterieur (ernstig).</td></tr></table>
<h2>Cardiovasculaire symptomen</h2>
<table><tr><th>Term</th><th>Betekenis</th><th>Toelichting</th></tr>
<tr><td><strong>Angina pectoris</strong></td><td>Pijn/druk op borst bij inspanning, verlicht in rust of met nitraat</td><td>Stabiel vs. instabiel. CCS I–IV. Uitstralingspatroon (arm, kaak, rug).</td></tr>
<tr><td><strong>Palpitaties</strong></td><td>Bewustzijn van eigen hartslag</td><td>Snel/traag, regelmatig/onregelmatig, begin/einde patroon.</td></tr>
<tr><td><strong>Syncope</strong></td><td>Korte bewusteloosheid (TLOC)</td><td>Vasovagaal, cardiaal, orthostatisch, neurologisch.</td></tr>
<tr><td><strong>Pre-syncope</strong></td><td>Bijna-flauwvallen zonder LOC</td><td>Duizeligheid, zwart zien.</td></tr>
<tr><td><strong>Claudicatio</strong></td><td>Kuit-/dijpijn bij lopen, herstelt in rust</td><td>Perifeer arterieel vaatlijden. Loopafstand tot optreden documenteren.</td></tr>
<tr><td><strong>Oedeem</strong></td><td>Vochtophoping in weefsels</td><td>Pittend vs. niet-pittend. Bilateraal vs. unilateraal. Uitbreiding (enkel/knie/dij/sacraal).</td></tr>
<tr><td><strong>DVT</strong></td><td>Diepe veneuse trombose</td><td>Warmte, zwelling, pijn. Wells-score. Risico: immobilisatie, maligniteit, operatie.</td></tr>
<tr><td><strong>Swirl sign</strong></td><td>CT-bevinding: hyperdense werveling in hematoom</td><td>Actieve arteriële bloeding. Belangrijk bij schedelhersenletsel.</td></tr></table>
<h2>Neurologische symptomen</h2>
<table><tr><th>Term</th><th>Betekenis</th></tr>
<tr><td><strong>Hoofdpijn — typen</strong></td><td><strong>Spanningshoofdpijn:</strong> bilateraal, bandvormig. <strong>Migraine:</strong> eenzijdig, kloppend, fotofobie, misselijkheid, met/zonder aura. <strong>Clusterhoofdpijn:</strong> periorbitaal, autonoom. <strong>Donderslaghoofdpijn:</strong> plotseling, maximaal — SAB uitsluiten (red flag).</td></tr>
<tr><td><strong>Vertigo / duizeligheid</strong></td><td>Illusie van beweging. Perifeer (BPPD, labyrinthitis): lageafhankelijk, misselijkheid. Centraal (achterhersenen, beroerte): loopinstabiliteit, neurologische tekens.</td></tr>
<tr><td><strong>Diplopie</strong></td><td>Dubbelzien. Binoculair (oogmotoriek) vs. monoculair (lens/cornea).</td></tr>
<tr><td><strong>Ataxie</strong></td><td>Coördinatiestoornis. Cerebellaire (breedbasig lopen, intentietremor) vs. sensibele ataxie.</td></tr>
<tr><td><strong>Dysartrie</strong></td><td>Onduidelijke spraak door motorisch deficit — onderscheiden van afasie (taalaandoening).</td></tr>
<tr><td><strong>Afasie / dysfasie</strong></td><td>Taalaandoening: expressief (Broca — spreekt slecht, begrijpt goed), receptief (Wernicke — vloeiende onzin), globaal.</td></tr>
<tr><td><strong>Dysfagie</strong></td><td>Moeite met slikken. Progressief = maligniteit uitsluiten. Onderscheiden van odynofagie.</td></tr>
<tr><td><strong>Paresthesie</strong></td><td>Tintelingen / doof gevoel. Dermatoom-, perifere of kous-handschoen-distributie.</td></tr>
<tr><td><strong>Parese / plegie</strong></td><td>Verlamming. Mono-, hemi-, para-, tetraparese. Hogere vs. lagere motorneuronaandoening.</td></tr>
<tr><td><strong>Tremor</strong></td><td>Rusttremor (Parkinson), intentietremor (cerebellum), houdingstremor (essentieel).</td></tr>
<tr><td><strong>Convulsie / aanval</strong></td><td>Gegeneraliseerd (tonisch-klonisch, absence) vs. focaal. Aura, duur, postictale fase, incontinentie.</td></tr>
<tr><td><strong>Delier / verwardheid</strong></td><td>Acute cognitieve stoornis — hyperactief, hypoactief, gemengd. CAM-score. Altijd oorzaak zoeken.</td></tr></table>
<h2>Ziekte van Parkinson — volledig (TRAP)</h2>
<div class="info-card"><p><strong>Vier kardinale kenmerken — TRAP:</strong> Tremor (rust, pil-draaien), Rigiditeit (tandwiel/loodpijp), Akinesie/bradykinesie, Posturale instabiliteit.</p></div>
<table><tr><th>Teken</th><th>Beschrijving</th></tr>
<tr><td>Akinesie / hypokinesie</td><td>Afwezig/verminderd spontaan bewegen. Schuifelende gang, verminderde armzwaai.</td></tr>
<tr><td>Bradykinesie</td><td>Vertraging van alle willekeurige bewegingen — aankleden, lopen, schrijven.</td></tr>
<tr><td>Bradyfrenie</td><td>Vertraagde cognitieve verwerking en denken.</td></tr>
<tr><td>Tandwielrigiditeit</td><td>Schokkerige weerstand bij passieve ledematenbewging.</td></tr>
<tr><td>Loodpijprigiditeit</td><td>Constante gelijkmatige weerstand door het volledige bewegingsbereik.</td></tr>
<tr><td>Starthemming / freezing</td><td>Plotseling vastlopen van motoriek — "voeten plakken aan de grond".</td></tr>
<tr><td>Hypomimie</td><td>Uitdrukkingloos maskergelaat, verminderd knipperen, hypofonie.</td></tr>
<tr><td>Micrografie</td><td>Steeds kleiner wordend handschrift — klassiek Parkinson-kenmerk.</td></tr>
<tr><td>On-Off-fenomeen</td><td>Wisseling hyperkinesie (on) en akinesie (off) onder levodopa.</td></tr>
<tr><td>Dyskinesie</td><td>Onwillekeurige bewegingen — levodopa-bijwerking (peak-dose).</td></tr>
<tr><td>Akinetische crisis</td><td>Volledige akinesie. Eet/drinkt niet meer. Dehydratie, aspiratierisico. Levensgevaarlijk.</td></tr>
<tr><td>Pro-/retro-/lateropulsie</td><td>Gestoorde houdingsreflexen. Valtendens voor/achter/zijwaarts.</td></tr>
<tr><td>Hoofdkussenfenomeen</td><td>Hoofd zweeft boven kussen door nekrigiditeit bij plotseling loslaten.</td></tr>
<tr><td>Sialorrhee</td><td>Kwijlen door dysfagie / verminderde slikfrequentie.</td></tr>
<tr><td>Seborroe</td><td>Overmatige talgproductie — autonoom symptoom.</td></tr></table>
<h2>Maag-darmsymptomen</h2>
<table><tr><th>Term</th><th>Betekenis</th></tr>
<tr><td><strong>Haematemesis</strong></td><td>Bloed braken. Koffiedikachtig = verteerd bloed (bovenste maag-darmbloeding).</td></tr>
<tr><td><strong>Melaena</strong></td><td>Zwarte teerachtige ontlasting — verteerd bloed — bovenste maag-darmbloeding.</td></tr>
<tr><td><strong>Haematochezia</strong></td><td>Vers rood bloed per anum — onderste maag-darmbloeding.</td></tr>
<tr><td><strong>Tenesmus</strong></td><td>Gevoel van onvolledige lediging — rectumcarcinoom, IBD, proctitis.</td></tr>
<tr><td><strong>Ileus</strong></td><td>Darmobstructie. Mechanisch (adhesies, hernia, tumor) of paralytisch. Levensgevaarlijk. Subileus = incompleet.</td></tr>
<tr><td><strong>Icterus / geelzucht</strong></td><td>Gele verkleuring huid/sclerae. Pre-hepatisch (hemolyse), hepatisch (leverziekte), post-hepatisch (galwegobstructie).</td></tr>
<tr><td><strong>Ascites</strong></td><td>Vocht in buikholte — cirrose, maligniteit, rechterhartfalen.</td></tr>
<tr><td><strong>Odynofagie</strong></td><td>Pijn bij slikken — oesofagitis, candidiasis, ulcus.</td></tr></table>
<h2>Urologische symptomen</h2>
<table><tr><th>Term</th><th>Betekenis</th></tr>
<tr><td><strong>Dysurie</strong></td><td>Pijnlijk/brandend urineren — UTI, urethritis, cystitis.</td></tr>
<tr><td><strong>Polyurie</strong></td><td>Overmatige urineproductie (&gt;3 L/dag) — DM, DI, diuretica.</td></tr>
<tr><td><strong>Oligurie</strong></td><td>&lt;400 mL/dag — nierinsufficiëntie, dehydratie, obstructie.</td></tr>
<tr><td><strong>Anurie</strong></td><td>&lt;100 mL/dag — acuut nierletsel, volledige obstructie.</td></tr>
<tr><td><strong>Hematurie</strong></td><td>Bloed in urine. Macroscopisch (zichtbaar) vs. microscopisch (dipstick/microscopie).</td></tr></table>
<h2>Bewegingsapparaat &amp; huid</h2>
<table><tr><th>Term</th><th>Betekenis</th></tr>
<tr><td><strong>Arthralgie</strong></td><td>Gewrichtspijn zonder objectieve ontstekingstekens.</td></tr>
<tr><td><strong>Artritis</strong></td><td>Gewrichtsontsteking — warmte, zwelling, roodheid, pijn, bewegingsbeperking.</td></tr>
<tr><td><strong>Myalgie</strong></td><td>Spierpijn — bij statines: CK controleren (myopathie/rabdomyolyse).</td></tr>
<tr><td><strong>Pruritus</strong></td><td>Jeuk. Gegeneraliseerd (cholestase, uremie, lymfoom) vs. gelokaliseerd.</td></tr>
<tr><td><strong>Urticaria</strong></td><td>Verheven bultjes met jeuk. Allergisch of idiopathisch.</td></tr>
<tr><td><strong>Petechiën</strong></td><td>Puntbloedinkjes die niet wegdrukken — trombocytopenie, vasculitis.</td></tr>
<tr><td><strong>Purpura</strong></td><td>Grotere niet-wegdrukbare laesies — hematologische of vasculitische oorzaak.</td></tr></table>
<h2>Psychiatrische &amp; cognitieve symptomen</h2>
<table><tr><th>Term</th><th>Betekenis</th></tr>
<tr><td><strong>Hallucinatie</strong></td><td>Waarneming zonder stimulus — auditief (schizofrenie), visueel (delier, DLB, middelen).</td></tr>
<tr><td><strong>Waan</strong></td><td>Vaste onjuiste overtuiging — paranoïde, grootheidswaan, somatisch.</td></tr>
<tr><td><strong>Anhedonie</strong></td><td>Verlies van plezier in vroeger genoten activiteiten — kernsymptoom depressie.</td></tr>
<tr><td><strong>Somnolentie / sufheid</strong></td><td>Abnormale slaperigheid waarvoor stimulatie nodig is om te reageren.</td></tr>
<tr><td><strong>Coma</strong></td><td>Geen reactie op stimuli. GCS &lt;8. Altijd E/V/M apart documenteren.</td></tr></table>
<h2>Oogonderzoek</h2>
<table><tr><th>Term</th><th>Betekenis</th></tr>
<tr><td><strong>PERLA</strong></td><td>Pupils Equal and Reactive to Light and Accommodation — pupillen gelijk en reagerend op licht en accommodatie. Standaard bevinding bij neurologisch onderzoek.</td></tr>
<tr><td><strong>Anisocorie</strong></td><td>Ongelijke pupilgrootte — fysiologisch of pathologisch (n. III-parese, syndroom van Horner).</td></tr>
<tr><td><strong>Nystagmus</strong></td><td>Onwillekeurige ritmische oogbewegingen — richting (horizontaal/verticaal/rotatoir) vermelden.</td></tr>
<tr><td><strong>Papiloedeem</strong></td><td>Zwelling van de oogzenuwpapil door verhoogde hersendruk — spoedindicatie.</td></tr></table>
<h2>Korte quiz</h2>`,
fr:`<h1>Symptômes &amp; pathologies</h1><p class="subtitle">Respiratoire, cardiovasculaire, neurologique, digestif, urologique, ostéo-articulaire et psychiatrique — complet pour les transcripteurs.</p>
<h2>Symptômes respiratoires</h2>
<table><tr><th>Terme</th><th>Signification</th><th>Notes cliniques</th></tr>
<tr><td><strong>Dyspnée</strong></td><td>Difficulté à respirer</td><td>Échelle MRC 1–5. Repos vs effort.</td></tr>
<tr><td><strong>Orthopnée</strong></td><td>Dyspnée en décubitus</td><td>Soulagée assis. Nombre d'oreillers = proxy de sévérité. Signe d'insuffisance cardiaque.</td></tr>
<tr><td><strong>DPN</strong></td><td>Dyspnée paroxystique nocturne</td><td>Réveil nocturne par dyspnée. Insuffisance cardiaque.</td></tr>
<tr><td><strong>Tachypnée</strong></td><td>FR &gt;20/min</td><td>Noter le recours aux muscles accessoires, battement des ailes du nez, tirage.</td></tr>
<tr><td><strong>Bradypnée</strong></td><td>FR &lt;12/min</td><td>Opioïdes, sédation, cause métabolique.</td></tr>
<tr><td><strong>Apnée</strong></td><td>Arrêt respiratoire</td><td>Préciser la durée. SAS = syndrome d'apnées obstructives du sommeil.</td></tr>
<tr><td><strong>Hémoptysie</strong></td><td>Crachats de sang</td><td>Distinguer de l'hématémèse (vomissements de sang).</td></tr>
<tr><td><strong>Stridor</strong></td><td>Son aigu inspiratoire</td><td>Obstruction des VAS — toujours urgent.</td></tr>
<tr><td><strong>Sibilances</strong></td><td>Son aigu expiratoire</td><td>Asthme, BPCO, bronchospasme.</td></tr>
<tr><td><strong>Crépitants</strong></td><td>Bruits crépitants à l'auscultation</td><td>Fins (OAP, fibrose) vs grossiers (pneumonie).</td></tr>
<tr><td><strong>Dysphonie</strong></td><td>Altération de la voix</td><td>Laryngite, paralysie récurrentielle, cordes vocales.</td></tr>
<tr><td><strong>Aphonie</strong></td><td>Extinction de voix</td><td>Forme maximale de dysphonie.</td></tr>
<tr><td><strong>Épistaxis</strong></td><td>Saignement de nez</td><td>Antérieur (tâche vasculaire de Kiesselbach, fréquent) vs postérieur (sévère).</td></tr></table>
<h2>Symptômes cardiovasculaires</h2>
<table><tr><th>Terme</th><th>Signification</th><th>Remarques</th></tr>
<tr><td><strong>Angor / angine de poitrine</strong></td><td>Douleur/oppression thoracique à l'effort, soulagée au repos ou par la trinitrine</td><td>Stable vs instable. Classification CCS I–IV. Irradiation (bras, mâchoire, dos).</td></tr>
<tr><td><strong>Palpitations</strong></td><td>Perception des battements cardiaques</td><td>Rapide/lent, régulier/irrégulier, début/fin brutal.</td></tr>
<tr><td><strong>Syncope</strong></td><td>Perte de connaissance transitoire (PCT)</td><td>Vasovagale, cardiaque, orthostatique, neurologique.</td></tr>
<tr><td><strong>Pré-syncope</strong></td><td>Quasi-syncope sans PCT</td><td>Étourdissements, vision floue, impression de tomber.</td></tr>
<tr><td><strong>Claudication</strong></td><td>Douleur du mollet/cuisse à la marche, disparaît au repos</td><td>AOMI. Documenter la distance de marche à l'apparition.</td></tr>
<tr><td><strong>Œdème</strong></td><td>Accumulation de liquide</td><td>Prenant/non prenant le godet. Bilatéral vs unilatéral. Extension (cheville/genou/cuisse/sacré).</td></tr>
<tr><td><strong>TVP</strong></td><td>Thrombose veineuse profonde</td><td>Chaleur, gonflement, douleur. Score de Wells.</td></tr>
<tr><td><strong>Signe du tourbillon</strong></td><td>Signe TDM : tourbillon hyperdense dans hématome</td><td>Saignement artériel actif. Important dans le TCE.</td></tr></table>
<h2>Symptômes neurologiques</h2>
<table><tr><th>Terme</th><th>Signification</th></tr>
<tr><td><strong>Céphalées — types</strong></td><td><strong>De tension :</strong> bilatérale en casque. <strong>Migraine:</strong> unilatérale, pulsatile, photophobie, nausées, avec/sans aura. <strong>Algie vasculaire :</strong> périorbitaire, autonomique. <strong>En coup de tonnerre :</strong> brutale, maximale d'emblée — HSA à exclure (signe d'alerte).</td></tr>
<tr><td><strong>Vertiges</strong></td><td>Illusion de mouvement. Périphérique (VPPB, labyrinthite) : positionnel, nausées. Central (fosse postérieure, AVC) : instabilité à la marche, signes neurologiques.</td></tr>
<tr><td><strong>Diplopie</strong></td><td>Vision double. Binoculaire (oculomotricité) vs monoculaire (cristallin, cornée).</td></tr>
<tr><td><strong>Ataxie</strong></td><td>Trouble de la coordination. Cérébelleuse (démarche élargie, tremblement d'intention) vs sensitive.</td></tr>
<tr><td><strong>Dysarthrie</strong></td><td>Parole mal articulée par déficit moteur — distinguer de l'aphasie (trouble du langage).</td></tr>
<tr><td><strong>Aphasie / dysphasie</strong></td><td>Trouble du langage : expressif (Broca — parle mal, comprend), réceptif (Wernicke — jargon fluent), global.</td></tr>
<tr><td><strong>Dysphagie</strong></td><td>Trouble de la déglutition. Progressive = éliminer un néoplasme. Distinguer de l'odynophagie.</td></tr>
<tr><td><strong>Paresthésies</strong></td><td>Fourmillements / engourdissements. Distribution en dermatome, périphérique ou en chaussette.</td></tr>
<tr><td><strong>Parésie / plégie</strong></td><td>Déficit/paralysie. Mono-, hémi-, para-, tétraplégie. Signes pyramidaux vs périphériques.</td></tr>
<tr><td><strong>Tremblement</strong></td><td>De repos (Parkinson), d'intention (cérébelleux), postural (essentiel).</td></tr>
<tr><td><strong>Crise convulsive</strong></td><td>Généralisée (tonico-clonique, absence) vs focale. Aura, durée, phase postcritique, incontinence.</td></tr>
<tr><td><strong>Confusion / delirium</strong></td><td>Modification aiguë de la cognition — hyperactif, hypoactif, mixte. Score CAM. Toujours chercher la cause.</td></tr></table>
<h2>Maladie de Parkinson — liste complète (TRAP)</h2>
<div class="info-card"><p><strong>Quatre signes cardinaux — TRAP :</strong> Tremblement (repos, émiettement), Rigidité (roue dentée / tuyau de plomb), Akinésie/bradykinésie, Posture instable.</p></div>
<table><tr><th>Signe</th><th>Description</th></tr>
<tr><td>Akinésie / hypokinésie</td><td>Absence/réduction mouvements spontanés. Marche à petits pas traînants. Réduction du ballant des bras.</td></tr>
<tr><td>Bradykinésie</td><td>Ralentissement de tous les mouvements volontaires — habillage, marche, écriture.</td></tr>
<tr><td>Bradyphrénie</td><td>Ralentissement du traitement cognitif et de la pensée.</td></tr>
<tr><td>Rigidité en roue dentée</td><td>Résistance par à-coups à la mobilisation passive des membres.</td></tr>
<tr><td>Rigidité en tuyau de plomb</td><td>Résistance uniforme constante sur toute l'amplitude de mouvement.</td></tr>
<tr><td>Festination / freezing</td><td>Enrayage de la marche — "pieds collés au sol".</td></tr>
<tr><td>Hypomimie</td><td>Visage masqué, réduction du clignement, hypophonie.</td></tr>
<tr><td>Micrographie</td><td>Écriture progressivement plus petite — signe parkinsonien classique.</td></tr>
<tr><td>Phénomène on-off</td><td>Alternance hyperkinésie (on) et akinésie (off) sous lévodopa.</td></tr>
<tr><td>Dyskinésies</td><td>Mouvements involontaires — effet indésirable du pic de lévodopa.</td></tr>
<tr><td>Crise akinétique</td><td>Akinésie complète. Le patient ne s'alimente plus. Déshydratation, inhalation. Urgence.</td></tr>
<tr><td>Pro-/rétro-/latéropulsion</td><td>Réflexes posturaux altérés. Chutes vers l'avant/arrière/côté.</td></tr>
<tr><td>Signe de l'oreiller</td><td>La tête flotte au-dessus de l'oreiller par rigidité cervicale lors d'un lâcher brusque.</td></tr>
<tr><td>Sialorrhée</td><td>Hypersalivation par dysphagie / réduction de la fréquence de déglutition.</td></tr>
<tr><td>Séborrhée</td><td>Production excessive de sébum — signe autonomique.</td></tr></table>
<h2>Symptômes digestifs</h2>
<table><tr><th>Terme</th><th>Signification</th></tr>
<tr><td><strong>Hématémèse</strong></td><td>Vomissements de sang. Aspect marc de café = sang digéré (hémorragie digestive haute).</td></tr>
<tr><td><strong>Méléna</strong></td><td>Selles noires goudronneuses — sang digéré — saignement digestif haut.</td></tr>
<tr><td><strong>Rectorragies / hématochézie</strong></td><td>Sang rouge vif par voie rectale — saignement digestif bas.</td></tr>
<tr><td><strong>Ténesme</strong></td><td>Faux besoins — cancer rectal, MICI, proctite.</td></tr>
<tr><td><strong>Iléus</strong></td><td>Occlusion intestinale. Mécanique (bride, hernie, tumeur) ou paralytique. Urgence vitale. Sous-occlusion = incomplète.</td></tr>
<tr><td><strong>Ictère / jaunisse</strong></td><td>Teinte jaune de la peau/sclérotiques. Pré-hépatique (hémolyse), hépatique (maladie du foie), post-hépatique (obstruction biliaire).</td></tr>
<tr><td><strong>Ascite</strong></td><td>Épanchement liquidien dans la cavité péritonéale — cirrhose, cancer, insuffisance cardiaque droite.</td></tr>
<tr><td><strong>Odynophagie</strong></td><td>Déglutition douloureuse — œsophagite, candidose, ulcère.</td></tr></table>
<h2>Symptômes urologiques</h2>
<table><tr><th>Terme</th><th>Signification</th></tr>
<tr><td><strong>Dysurie</strong></td><td>Miction douloureuse/brûlante — IU, urétrite, cystite.</td></tr>
<tr><td><strong>Polyurie</strong></td><td>Production excessive d'urine (&gt;3 L/jour) — DM, DI, diurétiques.</td></tr>
<tr><td><strong>Oligurie</strong></td><td>&lt;400 mL/jour — insuffisance rénale, déshydratation, obstruction.</td></tr>
<tr><td><strong>Anurie</strong></td><td>&lt;100 mL/jour — insuffisance rénale aiguë, obstruction complète.</td></tr>
<tr><td><strong>Hématurie</strong></td><td>Sang dans les urines. Macroscopique (visible) vs microscopique (bandelette/microscopie).</td></tr></table>
<h2>Symptômes ostéo-articulaires &amp; cutanés</h2>
<table><tr><th>Terme</th><th>Signification</th></tr>
<tr><td><strong>Arthralgie</strong></td><td>Douleur articulaire sans signes objectifs d'inflammation.</td></tr>
<tr><td><strong>Arthrite</strong></td><td>Inflammation articulaire — chaleur, gonflement, rougeur, douleur, limitation.</td></tr>
<tr><td><strong>Myalgie</strong></td><td>Douleurs musculaires — sous statines : contrôler les CPK (myopathie/rhabdomyolyse).</td></tr>
<tr><td><strong>Prurit</strong></td><td>Démangeaison. Généralisée (cholestase, urémie, lymphome) vs localisée.</td></tr>
<tr><td><strong>Urticaire</strong></td><td>Papules urticariennes surélevées. Allergique ou idiopathique.</td></tr>
<tr><td><strong>Pétéchies</strong></td><td>Petites hémorragies cutanées non effaçables à la pression — thrombocytopénie, vascularite.</td></tr>
<tr><td><strong>Purpura</strong></td><td>Lésions plus larges non effaçables — cause hématologique ou vascularitique.</td></tr></table>
<h2>Symptômes psychiatriques &amp; cognitifs</h2>
<table><tr><th>Terme</th><th>Signification</th></tr>
<tr><td><strong>Hallucination</strong></td><td>Perception sans stimulus — auditive (schizophrénie), visuelle (delirium, démence à corps de Lewy, substances).</td></tr>
<tr><td><strong>Délire</strong></td><td>Croyance fixe et fausse non accessible à la raison — persécution, grandiosité, somatique.</td></tr>
<tr><td><strong>Anhédonie</strong></td><td>Perte du plaisir pour les activités autrefois appréciées — symptôme central de la dépression.</td></tr>
<tr><td><strong>Somnolence / obnubilation</strong></td><td>Somnolence anormale nécessitant une stimulation pour se réveiller.</td></tr>
<tr><td><strong>Coma</strong></td><td>Absence de réponse à toute stimulation. GCS &lt;8. Toujours noter Y/V/M séparément.</td></tr></table>
<h2>Examen ophtalmologique</h2>
<table><tr><th>Terme</th><th>Signification</th></tr>
<tr><td><strong>PERLA</strong></td><td>Pupils Equal and Reactive to Light and Accommodation — pupilles isocores et réactives à la lumière et à l'accommodation. Constat standard de l'examen neurologique.</td></tr>
<tr><td><strong>Anisocorie</strong></td><td>Inégalité des pupilles — physiologique ou pathologique (paralysie du III, syndrome de Horner).</td></tr>
<tr><td><strong>Nystagmus</strong></td><td>Mouvements oculaires rythmiques involontaires — préciser la direction (horizontal/vertical/rotatoire).</td></tr>
<tr><td><strong>Œdème papillaire</strong></td><td>Gonflement de la papille optique par hypertension intracrânienne — urgence.</td></tr></table>
<h2>Quiz rapide</h2>`

allergies:{
en:`<h1>Allergies</h1><p class="subtitle">Accurate allergy documentation is a patient safety imperative — errors can be life-threatening. NHS Yellow Card scheme records ADRs (adverse drug reactions) nationally.</p>
<h2>NHS allergy abbreviations</h2>
<table><tr><th>Abbr.</th><th>Full meaning</th></tr>
<tr><td><strong>NKDA</strong></td><td>No Known Drug Allergies</td></tr>
<tr><td><strong>NKFA</strong></td><td>No Known Food Allergies</td></tr>
<tr><td><strong>NKA</strong></td><td>No Known Allergies</td></tr>
<tr><td><strong>ADR</strong></td><td>Adverse Drug Reaction</td></tr>
<tr><td><strong>SJS</strong></td><td>Stevens-Johnson Syndrome</td></tr>
<tr><td><strong>DRESS</strong></td><td>Drug Reaction with Eosinophilia and Systemic Symptoms</td></tr>
<tr><td><strong>TEN</strong></td><td>Toxic Epidermal Necrolysis</td></tr>
<tr><td><strong>Yellow Card</strong></td><td>MHRA national ADR reporting scheme</td></tr></table>
<h2>Allergy vs intolerance vs adverse drug reaction</h2>
<table><tr><th>Type</th><th>Mechanism</th><th>Example</th><th>Document as</th></tr>
<tr><td><strong>True allergy (IgE-mediated)</strong></td><td>Immune — IgE antibody</td><td>Anaphylaxis after penicillin</td><td>ALLERGY — specify exact reaction</td></tr>
<tr><td><strong>Non-IgE immune reaction</strong></td><td>T-cell / immune complex</td><td>SJS, DRESS, serum sickness</td><td>ALLERGY — specify exact reaction</td></tr>
<tr><td><strong>Intolerance</strong></td><td>Pharmacological, non-immune</td><td>Dry cough from ACE inhibitor, nausea from codeine</td><td>INTOLERANCE or SIDE EFFECT</td></tr>
<tr><td><strong>Pseudoallergy</strong></td><td>Non-immune mast cell activation</td><td>Aspirin-induced urticaria</td><td>HYPERSENSITIVITY (non-allergic)</td></tr></table>
<div class="alert-box"><strong>Never reclassify:</strong> Transcribe exactly what is dictated. In NHS settings, all ADRs should be reported via the Yellow Card scheme (MHRA). The distinction between allergy and intolerance determines whether alternative drugs can be prescribed.</div>
<h2>Reaction severity (UK — MHRA / BNF grading)</h2>
<table><tr><th>Grade</th><th>Manifestation</th><th>Clinical features</th></tr>
<tr><td><strong>1 — Mild</strong></td><td>Localised</td><td>Localised urticaria, pruritus, rhinitis</td></tr>
<tr><td><strong>2 — Moderate</strong></td><td>Generalised, non-life-threatening</td><td>Generalised urticaria, vomiting, mild bronchospasm</td></tr>
<tr><td><strong>3 — Severe</strong></td><td>Life-threatening</td><td>Severe bronchospasm, angioedema, hypotension</td></tr>
<tr><td><strong>4 — Anaphylaxis</strong></td><td>Multi-system</td><td>Collapse, stridor, profound hypotension, cardiac arrest</td></tr></table>
<h2>Anaphylaxis — NICE/Resuscitation Council UK guidance</h2>
<div class="info-card"><p><strong>Clinical triad:</strong> (1) Airway — stridor, angioedema; (2) Breathing — wheeze, SpO&#8322; drop; (3) Circulation — hypotension, tachycardia, collapse. <strong>First-line treatment (Resus Council UK):</strong> Adrenaline IM (intramuscular) 0.5 mg (500 micrograms) into outer mid-thigh (anterolateral). Repeat after 5 min if no response. Call 999. High-flow oxygen. IV (intravenous) fluid bolus 500–1000 mL 0.9% NaCl. Chlorphenamine + hydrocortisone as adjuncts.</p></div>
<h2>High-risk allergens and cross-reactivity</h2>
<table><tr><th>Allergen group</th><th>UK examples (BNF names)</th><th>Cross-reactivity</th></tr>
<tr><td>Beta-lactam antibiotics</td><td>Penicillin V, Amoxicillin, Co-amoxiclav, Cefalexin, Cefuroxime, Meropenem</td><td>~1–2% cross-reactivity penicillins ↔ cephalosporins. Note specific drug — "penicillin allergy" is not always a class effect.</td></tr>
<tr><td>NSAIDs</td><td>Aspirin, Ibuprofen, Diclofenac, Naproxen, Celecoxib</td><td>Cross-reactivity common (COX-1 pathway). Celecoxib (COX-2 selective) may be tolerated — specialist decision.</td></tr>
<tr><td>Sulfonamides</td><td>Co-trimoxazole (Septrin), Furosemide (partial)</td><td>Antibiotic sulfonamides ≠ non-antibiotic sulfonamides in allergy terms.</td></tr>
<tr><td>Contrast media</td><td>Iodinated IV contrast, gadolinium (MRI)</td><td>Pre-medication with chlorphenamine + hydrocortisone per local radiology protocol.</td></tr>
<tr><td>Latex</td><td>Surgical gloves, catheters, IV ports</td><td>Latex-fruit syndrome: banana, avocado, kiwi.</td></tr>
<tr><td>Foods</td><td>Peanuts, tree nuts, shellfish, fish, milk, egg, wheat, soy, sesame</td><td>14 allergens must be declared in UK food labelling (Food Information Regulations 2014). Always specify exact nut type.</td></tr>
<tr><td>ACE inhibitors</td><td>Ramipril, Lisinopril, Enalapril, Perindopril</td><td>Bradykinin-mediated angioedema (non-IgE). Can occur months/years after starting. Higher risk in Afro-Caribbean patients.</td></tr>
<tr><td>Neuromuscular blocking agents</td><td>Suxamethonium, Rocuronium, Atracurium, Vecuronium, Cisatracurium</td><td>High anaphylaxis risk in theatre (AAGBI guidance). Always note on anaesthetic record.</td></tr></table>
<h2>Cutaneous drug reactions — types and time course</h2>
<table><tr><th>Reaction</th><th>Description</th><th>Time course</th></tr>
<tr><td><strong>Urticaria</strong></td><td>Raised wheals — pale centre, red flare</td><td>Minutes to hours</td></tr>
<tr><td><strong>Angioedema</strong></td><td>Deep tissue swelling — face, lips, tongue, larynx</td><td>Minutes to hours</td></tr>
<tr><td><strong>Maculopapular exanthem</strong></td><td>Most common drug rash — widespread flat-raised rash</td><td>Days 1–2 after starting</td></tr>
<tr><td><strong>Fixed drug eruption</strong></td><td>Recurs at same site with each re-exposure</td><td>30 min–8h after dose</td></tr>
<tr><td><strong>SJS</strong></td><td>Mucosal erosions + skin blistering &lt;10% BSA (body surface area)</td><td>Days 1–3 after starting</td></tr>
<tr><td><strong>TEN</strong></td><td>Mucosal erosions + skin detachment &gt;30% BSA — emergency</td><td>Days 1–3 after starting</td></tr>
<tr><td><strong>DRESS</strong></td><td>Fever, lymphadenopathy, rash, eosinophilia, multi-organ</td><td>2–8 weeks after starting</td></tr>
<tr><td><strong>Contact dermatitis</strong></td><td>Localised eczema at contact site</td><td>24–72h (delayed type IV)</td></tr></table>
<div class="tip-box"><strong>NHS documentation standard:</strong> Record: (1) drug/substance name (BNF preferred); (2) exact type of reaction; (3) severity; (4) date of reaction if known; (5) confirmed (e.g. RAST, skin prick test) or suspected. Example: "Penicillin — anaphylaxis 2019, confirmed by allergy clinic."</div>
