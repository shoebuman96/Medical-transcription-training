{term:"BD / RR (Bloeddruk)",alt:"Riva-Rocci / BD systolisch/diastolisch",cat:"Vitale functies",def:"Druk van bloed op slagaderwanden, in mmHg. Normaalwaarde: <120/80. Hypertensie graad 2: >=140/90. Hypertensieve crisis: >180/120. NL-afkorting: BD of RR (Riva-Rocci). Cave: RR = Atemfrequenz in DE.",ex:"\'BD 162/98 mmHg — hypertensie graad 2, amlodipine gestart.\'"},
{term:"HF (Hartfrequentie)",alt:"Pols / spm / bpm",cat:"Vitale functies",def:"Hartslagen per minuut. Normaal volwassene: 60-100 spm. Onder 60 = bradycardie. Boven 100 = tachycardie.",ex:"\'HF 118 spm — sinustachycardie op ECG.\'"},
{term:"SpO2 (Zuurstofsaturatie)",alt:"Perifere O2-saturatie",cat:"Vitale functies",def:"Perifere zuurstofsaturatie (pulsoximetrie, niet-invasief). Normaal: 95-100%. COPD-streefwaarde: 88-92% (NHG-standaard COPD). Onder 90% = hypoxie.",ex:"\'SpO2 86% bij kamerlucht — 2 L/min O2 via neusbril gestart.\'"},
{term:"GCS (Glasgow Coma Scale)",alt:"Glasgowse bewustzijnsschaal",cat:"Vitale functies / Neurologie",def:"Neurologisch beoordelingsinstrument: Oogopening (E 1-4) + Verbale reactie (V 1-5) + Motorische reactie (M 1-6). Totaal 3-15. GCS <=8 = intubatiedrempel. Altijd als E/V/M apart documenteren.",ex:"\'GCS 9 (E3V2M4) — neurochirurgisch consult gevraagd.\'"},
{term:"NRS (Numerieke Rating Schaal)",alt:"Pijnschaal 0-10",cat:"Vitale functies",def:"Pijnmeting 0-10. 0=geen pijn, 1-3=licht, 4-6=matig, 7-10=ernstig. Altijd schaal en score vermelden.",ex:"\'Pijn 8/10 NRS in rust, 9/10 bij beweging.\'"},
{term:"BMI (Body Mass Index)",alt:"",cat:"Vitale functies",def:"Gewicht (kg)/lengte (m)². Classificatie (WHO): <18,5=ondergewicht, 18,5-24,9=gezond, 25-29,9=overgewicht, 30-34,9=obesitas klasse I, 35-39,9=klasse II, >=40=klasse III (morbide).",ex:"\'BMI 32,4 — obesitas klasse I, verwezen naar obesitasprogramma.\'"},
{term:"z.n. / PRN",alt:"zo nodig / pro re nata",cat:"Medicijnen",def:"Zo nodig = als de situatie dat vereist. Maximale frequentie en interval altijd vermelden.",ex:"\'Paracetamol 1 g p.o. z.n. tot 4× daags (max. 4 g/24 u).\'"},
{term:"STAT / onmiddellijk",alt:"statim / eenmalig",cat:"Medicijnen",def:"Onmiddellijk, eenmalige toediening.",ex:"\'Ondansetron 4 mg i.v. STAT bij postoperatieve misselijkheid.\'"},
{term:"DOAC (Directe Orale Anticoagulantia)",alt:"Nieuwe orale anticoagulantia",cat:"Medicijnen / Cardiologie",def:"Directe orale anticoagulantia. Omvat: rivaroxaban (Xarelto), apixaban (Eliquis), dabigatran (Pradaxa), edoxaban (Lixiana). Geen INR-monitoring. Antidota: idarucizumab (dabigatran), andexanet alfa (Xa-remmers).",ex:"\'Rivaroxaban 20 mg 1× daags bij maaltijd gestart voor atriumfibrilleren.\'"},
{term:"LMWH / Laagmoleculairgewichtheparine",alt:"Nadroparine / Enoxaparine / Dalteparine / Fraxiparine / Clexane",cat:"Medicijnen",def:"Laagmoleculairgewichtheparine. NL: Fraxiparine (nadroparine) meest gebruikt. Ook: Clexane (enoxaparine). Subcutane injectie. Voor DVT-profylaxe en -behandeling.",ex:"\'Fraxiparine 0,4 ml s.c. 1× daags voor tromboseprofylaxe postoperatief.\'"},
{term:"INR (International Normalised Ratio)",alt:"",cat:"Medicijnen / Hematologie",def:"Bewakingsparameter voor acenocoumarol (Sintrom) in Nederland, bewaakt door de trombosedienst. Streefwaarden per indicatie: atriumfibrilleren=2,0-3,0, mechanische hartklep=2,5-3,5.",ex:"\'INR 5,2 — acenocoumarol gestopt, vitamine K 5 mg p.o. toegediend.\'"},
{term:"DAPT (Duale Trombocytenaggregatietherapie)",alt:"Dual Antiplatelet Therapy",cat:"Medicijnen / Cardiologie",def:"Combinatie van aspirine + P2Y12-remmer (clopidogrel, ticagrelor of prasugrel). Standaard na ACS of coronaire stentplaatsing.",ex:"\'DAPT: aspirine 80 mg 1× daags + ticagrelor 90 mg 2× daags voor 12 maanden na NSTEMI.\'"},
{term:"SGLT2-remmer",alt:"Gliflozinen / Empagliflozine / Dapagliflozine",cat:"Medicijnen / Endocrinologie",def:"Natriumglucose cotransporter-2-remmers — orale antidiabetica met cardio- en renaal beschermend effect (ESC/NHG). Voor contrast-CT pauzeren (DKA-risico). Voorbeelden: Jardiance (empagliflozine), Forxiga (dapagliflozine).",ex:"\'Empagliflozine 48 u preoperatief gestopt conform protocol.\'"},
{term:"Charrière (Ch)",alt:"French gauge / Fg",cat:"Medicijnen / Materiaal",def:"Maat voor de buitendiameter van katheters, sondes en tubes. 1 Ch = 0,33 mm. Gebruik: blaaskatheters, maagsonden, thoraxdrains.",ex:"\'16 Ch blaaskatheter ingebracht, 380 ml urine afgetapt.\'"},
{term:"Opiumwet lijst I (NL)",alt:"Verdovende middelen / UR-geneesmiddelen",cat:"Medicijnen / Juridisch",def:"Nederlandse Opiumwet lijst I: morfine, oxycodon, fentanyl, hydromorphone, methadon. Uitsluitend op recept (UR). Transcriptie: volledige stofnaam, sterkte, toedieningsvorm, dosering, frequentie, totale hoeveelheid.",ex:"\'Oxycodon MGA 10 mg 2× daags — UR-recept uitgeschreven.\'"},
{term:"VBB (Volledig Bloedbeeld)",alt:"FBC / differentieel bloedbeeld",cat:"Tests",def:"Volledig bloedbeeld. Bevat: Hb, leukocyten, trombocyten, hematocriet + differentieel. Normaalwaarden Hb: vrouwen 7,5-10,0 mmol/L, mannen 8,5-11,0 mmol/L. Let op: NL rapporteert Hb in mmol/L.",ex:"\'VBB: Hb 6,1 mmol/L, leukocyten 14,2 × 10⁹/L, trombo 312 — ijzergebrekanemie.\'"},
{term:"Arterieel BGA (Bloedgasanalyse)",alt:"ABG / ABS",cat:"Tests",def:"Arteriële bloedgasanalyse: pH, PaO2, PaCO2, bicarbonaat, lactaat. Essentieel bij respiratoire insufficiëntie, zuur-base-stoornissen, shock.",ex:"\'BGA op 2 L/min O2: pH 7,28, PaO2 8,1 kPa, PaCO2 7,9 kPa — ventiloire insufficiëntie type II.\'"},
{term:"HbA1c",alt:"Geglyceerd hemoglobine",cat:"Tests / Endocrinologie",def:"Langetermijn bloedglucosecontrole (2-3 maanden gemiddelde). Diabetesdiagnose: >=48 mmol/mol bij 2 metingen (NHG-standaard Diabetes type 2). Prediabetes: 42-47 mmol/mol.",ex:"\'HbA1c 71 mmol/mol — diabetes slecht ingesteld, metformine getitreerd.\'"},
{term:"CRP (C-reactief proteïne)",alt:"Ontstekingsmarker",cat:"Tests",def:"Ontstekingsmarker. Normaal: <5 mg/L. Verhoogd bij infectie, ontsteking, maligniteit. Seriële meting voor behandelingsmonitoring.",ex:"\'CRP 156 mg/L — breedspectrumantibiotica gestart.\'"},
{term:"Dyspneu",alt:"Kortademigheid / Dyspnoea (EN) / Dyspnoe (DE) / Dyspnée (FR)",cat:"Symptomen",def:"Kortademigheid. MRC-schaal 1-5. In rust vs. bij inspanning. Onderscheiden: tachypneu (snelle frequentie) en apneu (ademstop).",ex:"\'MRC-graad 3 dyspneu — kortademig op vlakke grond.\'"},
{term:"Orthopneu",alt:"Orthopnoea (EN) / Orthopnoe (DE) / Orthopnée (FR)",cat:"Symptomen",def:"Kortademigheid in rugligging, verlicht door rechtop zitten. Teken van hartfalen (longstuwing). Kussenaantal = maat voor ernst.",ex:"\'3-kussens orthopneu — furosemide gestart, BNP 3400.\'"},
{term:"Syncope",alt:"Korte bewusteloosheid / TLOC",cat:"Symptomen",def:"Voorbijgaande bewusteloosheid door cerebrale hypoperfusie, met spontaan herstel. Typen: vasovagaal, cardiaal, orthostatisch, neurologisch.",ex:"\'Getuigde syncope met 30 s bewusteloosheid — 24-uurs-Holter aangevraagd.\'"},
{term:"Melaena",alt:"Zwarte teerachtige ontlasting",cat:"Symptomen / Maag-darm",def:"Zwarte teerachtige ontlasting van verteerd bloed = bovenste maag-darmbloeding. Onderscheiden van haematochezia (vers rood bloed = onderste maag-darmbloeding).",ex:"\'3 dagen melaena, Hb-daling 1,3 mmol/L — dringende gastroscopie.\'"},
{term:"Anafylaxie",alt:"Anaphylaxis (EN) / Anaphylaxie (DE/FR)",cat:"Allergieën",def:"Ernstige levensbedreigende multisysteemallergische reactie. Triade: luchtwegscompromittering, bronchospasme, circulatoire collaps. Behandeling: adrenaline i.m. 0,5 mg anterolateraal bovenbeen (ERC/NVvA).",ex:"\'Anafylaxie na penicilline — adrenaline i.m. toegediend, 112 gebeld.\'"},
{term:"ADR / bijwerking",alt:"Ongewenste geneesmiddelreactie",cat:"Allergieën / Veiligheid",def:"Ongewenste bijwerking van een geneesmiddel. Omvat alle reactietypes: allergie, intolerantie, pseudo-allergie. In NL te melden bij Lareb.",ex:"\'ADR: angio-oedeem onder ramipril — ACE-remmer gestopt, omgezet op sartan.\'"},
{term:"Lareb",alt:"Netherlands Pharmacovigilance Centre",cat:"Allergieën / Veiligheid",def:"Nederlands bijwerkingencentrum — centraal meldpunt voor bijwerkingen van geneesmiddelen en vaccins in Nederland. Equivalent: BfArM (D), AGES (A), ANSM/CRPV (FR), MHRA Yellow Card (UK).",ex:"\'Ernstige bijwerking gemeld bij Lareb.\'"},
{term:"St.n. (Status na)",alt:"Zustand nach (DE) / ATCD de (FR) / PMHx (EN)",cat:"Afkortingen / NL",def:"Status na — beschrijft een doorgemaakte aandoening of ingreep in de voorgeschiedenis. Standaard in ontslagbrieven en poliklinische correspondentie.",ex:"\'St.n. heup-THP links 2021, St.n. NSTEMI 2019.\'"},
{term:"Verd. op (Verdenking op)",alt:"V.a. Verdacht auf (DE) / Sd (FR) / query (EN)",cat:"Afkortingen / NL",def:"Verdenking op — geeft een verdachte diagnose aan die nog niet bevestigd is.",ex:"\'Verd. op diepe veneuse trombose rechts — duplexecho aangevraagd.\'"},
{term:"NHG (Nederlands Huisartsen Genootschap)",alt:"",cat:"Afkortingen / NL",def:"Wetenschappelijke vereniging van huisartsen in Nederland, die NHG-standaarden uitgeeft — de richtlijnen voor eerstelijnszorg.",ex:"\'Conform NHG-standaard Diabetes type 2 gestart met metformine.\'"},
{term:"ALAT / ASAT",alt:"Alanineaminotransferase / Aspartaataminotransferase (NL en FR) = ALT/AST",cat:"Afkortingen / NL",def:"Leverenzymen. NL en FR: ALAT (=ALT) en ASAT (=AST). DE: GPT en GOT. UK: ALT en AST. Altijd de gebruikte afkorting transcriberen.",ex:"\'ALAT 156 U/L, ASAT 98 U/L, GGT 210 U/L — alcoholische leverziekte.\'"}],
fr:[
{term:"pDMS",alt:"Statut neurovasculaire périphérique",cat:"Orthopédie",def:"Évaluation de la perfusion périphérique, de la motricité et de la sensibilité aux membres. Examen systématique après traumatisme ou chirurgie des membres.",ex:"'pDMS des deux jambes intact.'"},
{term:"Signe du tourbillon (swirl sign)",alt:"",cat:"Neuroradiologie",def:"Signe scanographique/IRM : tourbillon hyperdense dans un hématome, indiquant un saignement artériel actif et prédicteur d'expansion hématique.",ex:"'Scanner : signe du tourbillon dans l'hématome temporal gauche.'"},
{term:"Échelle de Fazekas",alt:"Fazekas 0–3",cat:"Neuroradiologie",def:"Système de gradation des lésions de la substance blanche (leucoaraïose) à l'IRM. Grade 0 = absentes ; Grade 1 = ponctuées ; Grade 2 = début de confluence ; Grade 3 = larges zones confluentes.",ex:"'IRM cérébrale : hypersignaux de la substance blanche Fazekas 1.'"},
{term:"Lésions de la substance blanche",alt:"Leucoaraïose / hypersignaux T2",cat:"Neuroradiologie",def:"Anomalies de signal T2 dans la substance blanche cérébrale, témoignant d'une maladie des petits vaisseaux ou d'une démyélinisation. Classées selon l'échelle de Fazekas.",ex:"'Leucoaraïose modérée, Fazekas 2.'"},
{term:"Hypersignal T2",alt:"T2-hypersignal",cat:"Radiologie / IRM",def:"En séquence T2, les liquides et l'œdème apparaissent en hypersignal (brillants). Les anomalies de signal T2 indiquent inflammation, infarctus ou démyélinisation.",ex:"'Hypersignal T2 dans le lobe temporal droit.'"},
{term:"Gamma Knife",alt:"Radiochirurgie stéréotaxique",cat:"Neurochirurgie / Radiologie",def:"Appareil de radiochirurgie stéréotaxique utilisant un faisceau focalisé de rayonnement gamma — pas un scalpel chirurgical. Traitement des tumeurs cérébrales, MAV et neurinomes de l'acoustique.",ex:"'Patient programmé pour traitement Gamma Knife d'un neurinome acoustique gauche.'"},
{term:"Antérolisthésis",alt:"Spondylolisthésis antérieur",cat:"Neurologie / Rachis",def:"Glissement antérieur d'une vertèbre sur celle du dessous. Gradé I–IV. Entraîne un rétrécissement du canal rachidien et une compression radiculaire.",ex:"'Antérolisthésis L4 sur L5, grade I.'"},
{term:"Méningiome parasagittal",alt:"Méningiome parafalcin",cat:"Neurologie / Neuroradiologie",def:"Méningiome adjacent à la faux du cerveau. Peut entraîner un déficit moteur ou sensitif controlatéral.",ex:"'IRM confirmant un méningiome parasagittal de 2 cm à droite.'"},
{term:"Région insulaire",alt:"Insula / cortex insulaire",cat:"Neurologie / Anatomie",def:"Le cortex insulaire, situé en profondeur dans le sillon latéral de Sylvius. Impliqué dans le goût, la douleur et la régulation autonome. Les infarctus peuvent provoquer dysarthrie et troubles du rythme cardiaque.",ex:"'Restriction de diffusion dans la région insulaire gauche, évocatrice d'AVC ischémique aigu.'"},
{term:"Articulation CMC-1",alt:"Articulation trapézo-métacarpienne",cat:"Chirurgie de la main / Orthopédie",def:"Première articulation carpo-métacarpienne à la base du pouce. Site de la rhizarthrose (arthrose trapézo-métacarpienne). Tests cliniques : test de Watson, test de Durkan.",ex:"'Arthroplastie CMC-1 réalisée au pouce droit.'"},
{term:"TAVI",alt:"Remplacement valvulaire aortique par voie transcathéter (TAVR)",cat:"Cardiologie / Chirurgie cardiaque",def:"Implantation minimalement invasive d'une valve aortique artificielle par cathéter. Alternative à la chirurgie à cœur ouvert chez les patients à haut risque.",ex:"'TAVI transfémoral réalisé avec succès.'"},
{term:"Valve tricuspide",alt:"",cat:"Cardiologie",def:"Valve cardiaque à trois feuillets entre l'oreillette droite et le ventricule droit. Prévient le reflux systolique. Pathologies : insuffisance tricuspidienne, sténose tricuspidienne.",ex:"'Légère insuffisance tricuspidienne à l'échocardiographie.'"},
{term:"Tendinopathie",alt:"Tendinose / Tendinite",cat:"Orthopédie / Rhumatologie",def:"Atteinte pathologique d'un tendon. Comprend la tendinite (inflammation aiguë) et la tendinose (dégénérescence chronique).",ex:"'Tendinopathie du sus-épineux avec rupture partielle.'"},
{term:"Lésion interne du genou",alt:"Dérangement interne du genou",cat:"Orthopédie",def:"Terme collectif pour les lésions intra-articulaires du genou affectant ligaments croisés, ménisques, cartilage ou autres structures internes.",ex:"'IRM confirmant une déchirure du ménisque médial dans le cadre d'un dérangement interne.'"},
{term:"Test varus/valgus",alt:"Stress test en varus/valgus",cat:"Orthopédie",def:"Test clinique d'intégrité des ligaments collatéraux. Le stress en valgus ouvre l'interligne médial ; le stress en varus ouvre l'interligne latéral.",ex:"'Genou stable en varus et valgus à 0°, 30° et 90°.'"},
{term:"Entorse du pouce du skieur",alt:"Rupture du LCU du pouce",cat:"Chirurgie de la main",def:"Rupture du ligament collatéral ulnaire de l'articulation MCP du pouce. Fréquente en ski et sports collectifs. Rupture complète nécessitant une réparation chirurgicale.",ex:"'Rupture complète du LCU du pouce droit confirmée.'"},
{term:"Poulie A1",alt:"",cat:"Chirurgie de la main",def:"Première poulie annulaire de la gaine des fléchisseurs, au niveau de l'articulation MCP. Site du doigt à ressaut (ténosynovite sténosante). Traitement : section percutanée ou à ciel ouvert.",ex:"'Section de la poulie A1 pour doigt à ressaut de l'index gauche.'"},
{term:"Kyste de Baker",alt:"Kyste poplité",cat:"Orthopédie / Rhumatologie",def:"Kyste synovial de la fosse poplitée, souvent associé à une lésion méniscale ou une gonarthrose. La rupture peut imiter une TVP.",ex:"'Échographie confirmant un kyste de Baker en poplité droit.'"},
{term:"Syndrome du canal carpien",alt:"SCC",cat:"Chirurgie de la main / Neurologie",def:"Compression du nerf médian dans le canal carpien. Symptômes : paresthésies nocturnes des 3 premiers doigts. Confirmé par électromyogramme ou test de Durkan.",ex:"'Syndrome du canal carpien bilatéral confirmé à l'EMG.'"},
{term:"Écho-Doppler couleur",alt:"FKDS (terme allemand)",cat:"Radiologie / Vasculaire",def:"Doppler couleur combinant l'échographie mode B avec la cartographie des flux sanguins. Utilisé pour l'évaluation artérielle et veineuse.",ex:"'Écho-Doppler : sténose de l'artère fémorale superficielle droite.'"},
{term:"Prothèse aorto-bifémor ale",alt:"Prothèse en Y / aortobifurcation",cat:"Chirurgie vasculaire",def:"Prothèse vasculaire en Y remplaçant la bifurcation aortique et les deux artères iliaques. Utilisée pour la maladie occlusive aorto-iliaque ou l'anévrisme.",ex:"'Contrôle de prothèse aorto-bifémor ale mise en place.'"},
{term:"Artère fémorale superficielle (AFS)",alt:"",cat:"Chirurgie vasculaire",def:"Continuation de l'artère fémorale commune dans la cuisse. Siège le plus fréquent de l'artériopathie oblitérante périphérique. Traitement : stenting, endartériectomie.",ex:"'Occlusion de l'AFS droite avec reperméabilisation par collatérales.'"},
{term:"Rapport rein/bruit de fond",alt:"Nier-achtergrond-ratio (NL)",cat:"Médecine nucléaire",def:"Rapport de l'activité rénale sur l'activité de fond en scintigraphie rénale (MAG3, DMSA). Évalue la fonction rénale et l'obstruction.",ex:"'Rapport rein/bruit de fond dans les limites de la normale.'"},
{term:"Hyperfixation du FDG",alt:"Captation FDG / FDG-stapeling (NL)",cat:"Médecine nucléaire / Oncologie",def:"Captation accrue du fluorodésoxyglucose au TEP. Témoigne d'un tissu métaboliquement actif : tumeur maligne, infection active, inflammation.",ex:"'TEP-TDM : hyperfixation du FDG dans les adénopathies médiastinales.'"},
{term:"Lésions non cibles",alt:"Non-target lesions (EN)",cat:"Oncologie",def:"Selon les critères RECIST : lésions non sélectionnées comme cibles. Évaluation qualitative (présent/absent, progression non équivoque).",ex:"'Lésions non cibles stables. Pas de nouvelles lésions.'"},
{term:"Atélectasie en bande",alt:"Atélectasie linéaire / diskale",cat:"Pneumologie / Radiologie",def:"Atélectasie linéaire ou en bande — collapsus d'un petit segment pulmonaire, visible sous forme de strie sur la radiographie ou le scanner. Fréquente en post-opératoire.",ex:"'Atélectasies en bandes aux deux bases pulmonaires sur la radio thorax.'"},
{term:"Hypersignal T2 substance blanche",alt:"Lésions périventriculaires",cat:"Neuroradiologie",def:"Anomalies de signal T2 dans la substance blanche, liées à une leucoaraïose, une démyélinisation ou une encéphalopathie. Classées selon l'échelle de Fazekas.",ex:"'Hypersignaux T2 périventriculaires bilatéraux, Fazekas 2.'"},
{term:"Ileus",alt:"Occlusion intestinale",cat:"Gastro-entérologie / Chirurgie",def:"Occlusion du grêle ou du côlon entraînant l'arrêt du transit. Mécanique (bride, tumeur) ou paralytique (post-opératoire, métabolique). Urgence vitale.",ex:"'ASP : pas d'image d'iléus.'"}
,
{term:"PA / TA (Pression artérielle)",alt:"Tension artérielle / BP (EN) / RR Riva-Rocci (DE)",cat:"Constantes vitales",def:"Pression du sang sur les parois artérielles, en mmHg. Normale : <120/80. HTA stade 2 : >=140/90. Urgence hypertensive : >180/120. Notation en France : PA ou TA (tension artérielle).",ex:"\'PA 162/98 mmHg — HTA stade 2, amlodipine débutée.\'"},
{term:"FC (Fréquence cardiaque)",alt:"Pouls / bpm / HR (EN)",cat:"Constantes vitales",def:"Battements cardiaques par minute. Normale adulte : 60-100 bpm. Sous 60 = bradycardie. Au-dessus de 100 = tachycardie.",ex:"\'FC 118 bpm — tachycardie sinusale à l\'ECG.\'"},
{term:"SpO2 (Saturation pulsée en oxygène)",alt:"Saturation / oxymétrie de pouls",cat:"Constantes vitales",def:"Saturation périphérique en O2 (oxymétrie de pouls, non invasive). Normale : 95-100%. Cible BPCO : 88-92% (recommandations HAS/SPLF). Sous 90% = hypoxie.",ex:"\'SpO2 86% en air ambiant — 2 L/min O2 par lunettes débuté.\'"},
{term:"GCS (Échelle de Glasgow)",alt:"Glasgow Coma Scale",cat:"Constantes vitales / Neurologie",def:"Outil d\'évaluation neurologique : Ouverture des yeux (Y 1-4) + Réponse verbale (V 1-5) + Réponse motrice (M 1-6). Total 3-15. GCS <=8 = seuil d\'intubation. Toujours noter Y/V/M séparément.",ex:"\'GCS 9 (Y3V2M4) — avis neurochirurgie demandé.\'"},
{term:"EN / EVA (Échelle de douleur)",alt:"Échelle numérique / Échelle visuelle analogique",cat:"Constantes vitales",def:"Évaluation de la douleur 0-10. 0=absence, 1-3=légère, 4-6=modérée, 7-10=sévère. Toujours noter l\'échelle utilisée et le score.",ex:"\'Douleur 8/10 à l\'EN au repos, 9/10 à la mobilisation.\'"},
{term:"IMC (Indice de masse corporelle)",alt:"BMI / Body Mass Index",cat:"Constantes vitales",def:"Poids (kg)/taille (m)². Classification (OMS/HAS) : <18,5=insuffisance pondérale, 18,5-24,9=normale, 25-29,9=surpoids, 30-34,9=obésité classe I, 35-39,9=classe II, >=40=classe III (morbide).",ex:"\'IMC 32,4 — obésité classe I, orientation vers programme de gestion du poids.\'"},
{term:"PRN / si besoin",alt:"pro re nata / z.n. (NL) / b.B. (DE) / as required (EN)",cat:"Médicaments",def:"Latin : pro re nata = si besoin. Toujours préciser la fréquence maximale autorisée et l\'intervalle.",ex:"\'Paracétamol 1 g PO si besoin jusqu\'à 4×/j (max. 4 g/24 h).\'"},
{term:"STAT / immédiatement",alt:"statim / dose unique",cat:"Médicaments",def:"Latin : statim = immédiatement, dose unique.",ex:"\'Ondansétron 4 mg IV STAT pour nausées post-opératoires.\'"},
{term:"AOD (Anticoagulants oraux directs)",alt:"DOAC / NOAK (DE) / nouveaux anticoagulants oraux",cat:"Médicaments / Cardiologie",def:"Anticoagulants oraux directs. Comprend : rivaroxaban (Xarelto), apixaban (Eliquis), dabigatran (Pradaxa), édoxaban (Lixiana). Ne nécessitent pas de surveillance INR. Antidotes : idarucizumab (dabigatran), andexanet alfa (inhibiteurs du Xa).",ex:"\'Rivaroxaban 20 mg 1×/j au cours du dîner débuté pour FA.\'"},
{term:"HBPM (Héparine de bas poids moléculaire)",alt:"LMWH / NMH (DE) / énoxaparine / nadroparine",cat:"Médicaments",def:"Héparine de bas poids moléculaire. Principale HBPM en France : Lovenox (énoxaparine). Aussi : Fraxiparine (nadroparine), Innohep (tinzaparine). Injection sous-cutanée.",ex:"\'Lovenox 40 mg SC 1×/j pour prophylaxie TVP post-chirurgicale.\'"},
{term:"INR (International Normalised Ratio)",alt:"",cat:"Médicaments / Hématologie",def:"Paramètre de surveillance des AVK : warfarine (Coumadine) et acénocoumarol (Sintrom) en France. Zones cibles selon indication : FA=2,0-3,0, valve mécanique=2,5-3,5. Suivi par réseau de coagulation.",ex:"\'INR 5,1 — warfarine suspendue, vitamine K 5 mg PO administrée.\'"},
{term:"DAPT / DAP (Double antiagrégation plaquettaire)",alt:"Dual antiplatelet therapy",cat:"Médicaments / Cardiologie",def:"Association aspirine + inhibiteur P2Y12 (clopidogrel, ticagrélor ou prasugrel). Standard après SCA ou stenting coronarien.",ex:"\'DAPT : aspirine 75 mg 1×/j + ticagrélor 90 mg 2×/j pendant 12 mois post-IDM.\'"},
{term:"Inhibiteurs SGLT2",alt:"Gliflozines / empagliflozine / dapagliflozine",cat:"Médicaments / Endocrinologie",def:"Inhibiteurs du cotransporteur sodium-glucose de type 2 — antidiabétiques oraux avec bénéfice cardio-rénal (HAS/ESC). Suspendre avant injection de PDC (risque d\'ACG). Exemples : Jardiance (empagliflozine), Forxiga (dapagliflozine).",ex:"\'Empagliflozine suspendue 48 h avant l\'intervention selon protocole.\'"},
{term:"Charrière (Ch / Fr)",alt:"French gauge / sonde",cat:"Médicaments / Matériel",def:"Unité de mesure du diamètre extérieur des sondes, cathéters et canules. 1 Ch = 0,33 mm. Utilisée pour les sondes urinaires, gastriques, drains pleuraux.",ex:"\'Sonde urinaire 16 Ch posée, 380 mL urine drainée.\'"},
{term:"Stupéfiants (liste des stupéfiants — CSP)",alt:"CD Controlled Drug (EN) / BtM (DE) / Opiumwet (NL)",cat:"Médicaments / Légal",def:"France : réglementés par le Code de la santé publique. Liste : morphine, oxycodone, fentanyl, hydromorphone, méthadone. Ordonnance sécurisée obligatoire (max 28 jours). Transcription : DCI, dosage, forme, posologie, fréquence, quantité totale.",ex:"\'Oxycodone LP 10 mg 2×/j — ordonnance sécurisée établie.\'"},
{term:"NFS / FNS (Numération formule sanguine)",alt:"FBC (EN) / BB Blutbild (DE) / VBB (NL)",cat:"Tests",def:"Numération formule sanguine. Comprend : Hb, GB (globules blancs), plaquettes, hématocrite + formule. Valeurs normales Hb : femme 12-16 g/dL, homme 13-17,5 g/dL.",ex:"\'NFS : Hb 9,8 g/dL, GB 14,2 × 10⁹/L, Plq 312 — anémie ferriprive.\'"},
{term:"GDS / GDA (Gaz du sang)",alt:"ABG / BGA Blutgasanalyse (DE) / arterieel BGA (NL)",cat:"Tests",def:"Gaz du sang artériels : pH, PaO2, PaCO2, bicarbonate, lactate. Essentiel dans l\'insuffisance respiratoire, les troubles acido-basiques, le choc.",ex:"\'GDS sous 2 L O2 : pH 7,28, PaO2 8,1 kPa, PaCO2 7,9 kPa — insuffisance respiratoire type 2.\'"},
{term:"HbA1c",alt:"Hémoglobine glyquée",cat:"Tests / Endocrinologie",def:"Marqueur du contrôle glycémique à long terme (moyenne 2-3 mois). Diagnostic diabète : >=48 mmol/mol (>=6,5%) à 2 reprises (critères OMS/HAS). Prédiabète : 42-47 mmol/mol.",ex:"\'HbA1c 71 mmol/mol — diabète déséquilibré, metformine titrée.\'"},
{term:"CRP (Protéine C-réactive)",alt:"Marqueur inflammatoire",cat:"Tests",def:"Marqueur inflammatoire. Normale : <5 mg/L. Élevée dans les infections, l\'inflammation, les cancers. Mesures sérielles utiles pour le suivi.",ex:"\'CRP 156 mg/L — antibiothérapie à large spectre débutée.\'"},
{term:"Dyspnée",alt:"Essoufflement / Dyspnoea (EN) / Dyspnoe (DE) / Dyspneu (NL)",cat:"Symptômes",def:"Difficulté à respirer. Échelle MRC 1-5. Au repos vs à l\'effort. Distinguer : tachypnée (fréquence rapide) et apnée (arrêt respiratoire).",ex:"\'Dyspnée grade 3 MRC — essoufflement sur terrain plat.\'"},
{term:"Orthopnée",alt:"Orthopnoea (EN) / Orthopnoe (DE/NL)",cat:"Symptômes",def:"Dyspnée en décubitus dorsal, soulagée en position assise. Signe d\'insuffisance cardiaque (congestion pulmonaire). Nombre d\'oreillers = proxy de sévérité.",ex:"\'Orthopnée à 3 oreillers — furosémide débuté, BNP 3400 pg/mL.\'"},
{term:"Syncope",alt:"PCT perte de connaissance transitoire / Synkope (DE)",cat:"Symptômes",def:"Perte de connaissance transitoire (PCT) par hypoperfusion cérébrale, avec récupération spontanée. Types : vasovagale, cardiaque, orthostatique, neurologique.",ex:"\'Syncope de 30 s témoignée — Holter ECG 24 h prescrit.\'"},
{term:"Méléna",alt:"Selles noires / Melena",cat:"Symptômes / Digestif",def:"Selles noires goudronneuses de sang digéré = saignement digestif haut. Distinguer de la rectorragie (sang rouge vif = saignement digestif bas).",ex:"\'3 jours de méléna, chute Hb de 2 g/dL — gastroscopie urgente.\'"},
{term:"Anaphylaxie",alt:"Anaphylaxis (EN) / Anaphylaxie (DE/NL)",cat:"Allergies",def:"Réaction allergique sévère multisystémique mettant en jeu le pronostic vital. Triade : obstruction des voies aériennes, bronchospasme, collapsus cardiovasculaire. Traitement : adrénaline IM 0,5 mg face antérolatérale de cuisse (SFAR). SAMU : 15.",ex:"\'Anaphylaxie à la pénicilline — adrénaline IM administrée, SAMU appelé.\'"},
{term:"EIM / EIG (Effet indésirable médicamenteux / grave)",alt:"ADR / UAW (DE) / bijwerking (NL) / Yellow Card (EN)",cat:"Allergies / Sécurité",def:"Effet indésirable médicamenteux grave. Doit être déclaré à l\'ANSM et au CRPV régional. Équivalent : BfArM/AGES (D/A), Lareb (NL), MHRA Yellow Card (UK).",ex:"\'EIG déclaré à l\'ANSM et au CRPV : choc anaphylactique post-céphalosporine.\'"},
{term:"DRESS (Drug Reaction with Eosinophilia and Systemic Symptoms)",alt:"Hypersensibilité médicamenteuse systémique",cat:"Allergies / Dermatologie",def:"Hypersensibilité médicamenteuse retardée sévère : fièvre, adénopathies, œdème facial, éruption, éosinophilie, atteinte multiviscérale. Délai 2-8 semaines. Mortalité ~10%. Médicaments en cause : carbamazépine, allopurinol, sulfamides, vancomycine.",ex:"\'DRESS 5 semaines après allopurinol — arrêt, avis dermatologie/hépatologie.\'"},
{term:"ATCD (Antécédents)",alt:"PMHx (EN) / VA (DE) / VG (NL)",cat:"Abréviations / France",def:"Antécédents médicaux, chirurgicaux, familiaux, gynéco-obstétricaux. Standard dans tous les comptes rendus médicaux en France.",ex:"\'ATCD : HTA, diabète type 2, Z.n. NSTEMI 2019.\'"},
{term:"RCP (Réunion de concertation pluridisciplinaire)",alt:"MDT / équipe multidisciplinaire",cat:"Abréviations / France",def:"Réunion de concertation pluridisciplinaire — équivalent français du MDT. Obligatoire en oncologie (circulaire DHOS). Décision collégiale consignée dans le dossier.",ex:"\'Dossier présenté en RCP de cancérologie thoracique — décision : chimiothérapie première.\'"},
{term:"HAS (Haute Autorité de Santé)",alt:"",cat:"Abréviations / France",def:"Organisme public indépendant français émettant les recommandations de bonnes pratiques, les évaluations de dispositifs médicaux et les certifications des établissements de santé.",ex:"\'Selon les recommandations HAS, atorvastatine 20 mg débutée en prévention primaire.\'"},
{term:"ANSM (Agence nationale de sécurité du médicament)",alt:"",cat:"Abréviations / France",def:"Agence française chargée de l\'autorisation des médicaments, de la pharmacovigilance et de la réception des déclarations d\'effets indésirables graves. Équivalent : BfArM (D), AGES (A), CBG-MEB (NL), MHRA (UK).",ex:"\'EIG déclaré à l\'ANSM et au CRPV régional.\'"},
{term:"ALAT / ASAT (Transaminases)",alt:"ALT/AST (EN) / GPT/GOT (DE) / ALAT/ASAT (NL)",cat:"Abréviations / France",def:"Enzymes hépatiques. En France : ALAT (= ALT, alanine aminotransférase) et ASAT (= AST, aspartate aminotransférase). En allemand : GPT et GOT. Toujours transcrire l\'abréviation dictée.",ex:"\'ALAT 156 UI/L, ASAT 98 UI/L, GGT 210 UI/L — hépatopathie alcoolique.\'"}]
};

{q:"Wie werden Insulineinheiten korrekt transkribiert?",opts:["Als 'E' allein","Als 'IE' allein","Als 'Einheiten' ausgeschrieben","Als 'U'"],ans:2,exp:"'E' allein kann als Null missverstanden werden — 10-fache Überdosierung möglich. Immer 'Einheiten' ausschreiben."},
{q:"Welches LMWH-Präparat ist in Deutschland am häufigsten im Einsatz?",opts:["Fraxiparine (Nadroparin)","Clexane (Enoxaparin)","Sintrom (Acenocoumarol)","Marcumar (Phenprocoumon)"],ans:1,exp:"Clexane (Enoxaparin) und Mono-Embolex (Certoparin) sind die gängigsten LMWH-Präparate in D."},
{q:"Methotrexat bei rheumatoider Arthritis wird gegeben:",opts:["Einmal täglich","Zweimal täglich","Einmal wöchentlich","Jeden zweiten Tag"],ans:2,exp:"Methotrexat wird EINMAL WÖCHENTLICH gegeben — tägliche Gabe hat Todesfälle verursacht (BtMG/AWMF)."},
{q:"Bisoprolol und Carvedilol gehören zur Klasse:",opts:["ACE-Hemmer","AT1-Blocker","Betablocker","Kalziumantagonisten"],ans:2,exp:"Bisoprolol und Carvedilol sind Betablocker - leitliniengerecht bei Herzinsuffizienz (ESC)."},
{q:"NOAK steht für:",opts:["Niedrig-organische Arzneimittelkombination","Neue Orale Antikoagulanzien","Nicht-operative Akutkoagulation","Notfall-orale Antikoagulanzien"],ans:1,exp:"NOAK = Neue Orale Antikoagulanzien (= DOAC; z.B. Rivaroxaban, Apixaban, Dabigatran)."},
{q:"SGLT2-Hemmer (z.B. Empagliflozin) sollten pausiert werden vor:",opts:["Blutabnahmen","CT mit Kontrastmittelgabe","EKG","Röntgenaufnahme"],ans:1,exp:"SGLT2-Hemmer erhöhen das DKA-Risiko bei KM-Gabe — pausieren (EMA/AWMF-Empfehlung)."},
{q:"Betäubungsmittelpflichtige Substanzen in Deutschland unterliegen:",opts:["Der Roten Liste","Dem BtMG (Betäubungsmittelgesetz)","Der Apothekenbetriebsordnung","AWMF-Leitlinien"],ans:1,exp:"Morphin, Oxycodon, Fentanyl etc. unterliegen dem BtMG. In Österreich gilt das Suchtmittelgesetz (SMG)."},
{q:"Amoxicillin/Clavulansaure (Co-Amoxiclav) enthalt:",opts:["Nur Amoxicillin","Amoxicillin + Clavulansäure","Amoxicillin + Metronidazol","Flucloxacillin + Clavulansäure"],ans:1,exp:"Amoxicillin/Clavulansäure = Amoxicillin + Clavulansäure (z.B. Augmentin). Beide Komponenten immer transkribieren."}
],
nl:[
{q:"'z.n.' / PRN betekent:",opts:["Elke ochtend","Zo nodig","Viermaal daags","Voor de maaltijd"],ans:1,exp:"z.n. / PRN = zo nodig (G-Standaard/NHG-standaard)."},
{q:"De standaard VKA in Nederland is:",opts:["Warfarine","Acenocoumarol (Sintrom)","Fenprocoumon (Marcoumar)","Rivaroxaban (Xarelto)"],ans:1,exp:"In Nederland is acenocoumarol (Sintrom) de standaard VKA, bewaakt door de trombosedienst."},
{q:"Insuline-eenheden worden correct getranscribeerd als:",opts:["'E' alleen","'IE' alleen","'eenheden' uitgeschreven","'U'"],ans:2,exp:"'E' alleen kan als nul worden gelezen - 10x overdosering mogelijk. Schrijf altijd 'eenheden' uit."},
{q:"Welk LMWH-preparaat wordt het meest gebruikt in Nederland?",opts:["Clexane (enoxaparine)","Fraxiparine (nadroparine)","Sintrom (acenocoumarol)","Marcoumar (fenprocoumon)"],ans:1,exp:"Fraxiparine (nadroparine) is het meest gebruikte LMWH in Nederland. Clexane (enoxaparine) ook veel gebruikt."},
{q:"Methotrexaat bij reumatoide artritis wordt gegeven:",opts:["Eenmaal daags","Tweemaal daags","Eenmaal per week","Om de dag"],ans:2,exp:"Methotrexaat wordt UITSLUITEND 1x PER WEEK gegeven - dagelijkse toediening is dodelijk."},
{q:"Bisoprolol en carvedilol behoren tot de klasse:",opts:["ACE-remmers","ARB's","Betablokkers","Calciumantagonisten"],ans:2,exp:"Bisoprolol en carvedilol zijn betablokkers - richtlijnmatig bij hartfalen (ESC/NHG)."},
{q:"DOAC staat voor:",opts:["Dagelijkse orale anticoagulantiacombinatie","Directe orale anticoagulantia","Dubbele orale anticoagulantia","Dosisberekening anticoagulantia"],ans:1,exp:"DOAC = directe orale anticoagulantia (bijv. rivaroxaban, apixaban, dabigatran, edoxaban)."},
{q:"SGLT2-remmers (bijv. empagliflozine) dienen te worden gestopt voor:",opts:["Bloedafname","CT met contrastmiddel","ECG","Rontgenopname"],ans:1,exp:"SGLT2-remmers verhogen het DKA-risico bij contrasttoediening - pauzeren (EMA/CBG-aanbeveling)."},
{q:"Geneesmiddelen onder de Opiumwet (lijst I) in Nederland omvatten:",opts:["Ibuprofen en paracetamol","Morfine, oxycodon en fentanyl","Metformine en gliclazide","Amoxicilline en cotrimoxazol"],ans:1,exp:"Morfine, oxycodon en fentanyl vallen onder de Opiumwet lijst I. Uitsluitend op UR-recept."},
{q:"Co-amoxiclav bevat:",opts:["Alleen amoxicilline","Amoxicilline + clavulaanzuur","Amoxicilline + metronidazol","Flucloxacilline + clavulaanzuur"],ans:1,exp:"Co-amoxiclav = amoxicilline + clavulaanzuur (bijv. Augmentin). Beide componenten altijd vermelden."}
],
fr:[
{q:"Que signifie 'PRN / si besoin' ?",opts:["Chaque matin","Au besoin","Quatre fois par jour","Avant les repas"],ans:1,exp:"PRN = au besoin (nomenclature Vidal/HAS)."},
{q:"L'anticoagulant oral de référence en France est :",opts:["La warfarine (Coumadine) et l'acénocoumarol (Sintrom)","Uniquement la warfarine","Uniquement le rivaroxaban","Le phénprocoumon (Marcumar)"],ans:0,exp:"En France, warfarine (Coumadine) ET acénocoumarol (Sintrom) sont tous deux utilisés, sous contrôle INR."},
{q:"Les unités d'insuline doivent être transcrites comme :",opts:["« U » seul","« UI » seul","'unités' en toutes lettres","« E »"],ans:2,exp:"Ne jamais écrire « U » seul — risque de confusion avec un zéro = surdosage ×10. Écrire « unités » en toutes lettres."},
{q:"Quel est le principal préparatif HBPM prescrit en France ?",opts:["Fraxiparine (nadroparine)","Lovenox (énoxaparine)","Sintrom (acénocoumarol)","Coumadine (warfarine)"],ans:1,exp:"Lovenox (énoxaparine) est l'HBPM la plus prescrite en France."},
{q:"Le méthotrexate pour la polyarthrite rhumatoïde est administré :",opts:["Une fois par jour","Deux fois par jour","Une fois par semaine","Un jour sur deux"],ans:2,exp:"Le méthotrexate est administré UNE FOIS PAR SEMAINE — l'administration quotidienne est mortelle."},
{q:"Bisoprolol et carvédilol appartiennent à la classe:",opts:["IEC","ARA II","Bêta-bloquants","Inhibiteurs calciques"],ans:2,exp:"Bisoprolol et carvédilol sont des bêta-bloquants — recommandés dans l'insuffisance cardiaque (ESC/HAS)."},
{q:"AOD signifie :",opts:["Anticoagulants oraux directs","Association orale diurétique","Antidote oral direct","Anticoagulants oraux dosés"],ans:0,exp:"AOD = anticoagulants oraux directs (ex. rivaroxaban, apixaban, dabigatran, édoxaban)."},
{q:"Les inhibiteurs SGLT2 (ex. empagliflozine) doivent être suspendus avant :",opts:["Des prises de sang","Une injection de produit de contraste (PDC)","Un ECG","Une radiographie"],ans:1,exp:"Les inhibiteurs SGLT2 augmentent le risque d'ACG lors de l'injection de PDC — suspendre (ANSM/recommandation EMA)."},
{q:"Les stupéfiants en France sont régis par :",opts:["La HAS","Le Code de la santé publique (CSP) — ordonnance sécurisée","Le Vidal","L'ANSM uniquement"],ans:1,exp:"Morphine, oxycodone, fentanyl : liste des stupéfiants CSP. Ordonnance sécurisée obligatoire (max 28 jours)."},
{q:"L'amoxicilline/acide clavulanique (Augmentin) contient:",opts:["Uniquement de l'amoxicilline","Amoxicilline + acide clavulanique","Amoxicilline + métronidazole","Flucloxacilline + acide clavulanique"],ans:1,exp:"Augmentin = amoxicilline + acide clavulanique. Toujours transcrire les deux composants."}
]
},
tests:{
en:[
{q:"WBC of 15 x 10^9/L most likely indicates:",opts:["Normal","Leukopenia","Leukocytosis - infection/inflammation","Thrombocytosis"],ans:2,exp:"Above 11 x 10^9/L = leukocytosis (NHS reference range)."},
{q:"TSH of 0.1 mIU/L (below normal) indicates:",opts:["Hypothyroidism","Hyperthyroidism","Normal thyroid","Diabetes"],ans:1,exp:"Low TSH = hyperthyroidism (excess thyroid hormone suppresses TSH)."},
{q:"Which imaging modality uses NO ionising radiation?",opts:["Chest X-ray","CT scan","MRI","DEXA scan"],ans:2,exp:"MRI uses magnetic fields and radio waves - no ionising radiation."},
{q:"Fazekas scale (0-3) grades:",opts:["Bone density","White matter lesions on brain MRI","Cardiac size","Liver fibrosis"],ans:1,exp:"Fazekas 0-3 grades the burden of white matter lesions (leukoaraiosis) on brain MRI."},
{q:"Haemoglobin of 95 g/L in a female patient indicates:",opts:["Normal","Polycythaemia","Anaemia","Dehydration"],ans:2,exp:"Normal female Hb in UK labs: 120-160 g/L. Below this = anaemia."},
{q:"In UK labs, liver enzymes are reported as:",opts:["GOT/GPT/GGT","ALT/AST/GGT","ALAT/ASAT/GGT","GPT/GOT/AP"],ans:1,exp:"UK/NHS labs use ALT (alanine aminotransferase), AST (aspartate aminotransferase), GGT. In German-speaking settings: GPT=ALT, GOT=AST."},
{q:"HbA1c >= 48 mmol/mol (>= 6.5%) on two occasions confirms:",opts:["Normal glucose control","Prediabetes","Diabetes mellitus","Hypoglycaemia"],ans:2,exp:"HbA1c >=48 mmol/mol on two occasions = diabetes mellitus (NICE/WHO criteria)."},
{q:"FDG accumulation on PET-CT indicates:",opts:["Bone fracture","Metabolically active tissue - tumour or active infection","Normal resting brain only","Fluid collection"],ans:1,exp:"FDG = fluorodeoxyglucose - taken up by metabolically active cells. High uptake seen in tumours and active inflammation."},
{q:"LDCT (low-dose CT) is used primarily for:",opts:["Emergency trauma imaging","Lung cancer screening in high-risk patients","Routine appendix assessment","Cardiac angiography"],ans:1,exp:"LDCT = low-dose CT - used for lung cancer screening (NELSON/NLST protocols)."}
],
de:[
{q:"WBC 15 × 10⁹/l bedeutet:",opts:["Normal","Leukopenie","Leukozytose – Infektion/Entzündung","Thrombozytose"],ans:2,exp:"Über 11 × 10⁹/l = Leukozytose (DGKL-Referenzbereiche)."},
{q:"TSH 0,1 mIU/l (erniedrigt) weist auf ... hin:",opts:["Hypothyreose","Hyperthyreose","Normale Schilddrüsenfunktion","Diabetes"],ans:1,exp:"Niedriger TSH = Hyperthyreose."},
{q:"Welches bildgebende Verfahren verwendet KEINE ionisierende Strahlung?",opts:["Röntgen-Thorax","CT","MRT","DEXA"],ans:2,exp:"MRT verwendet Magnetfelder und Radiowellen — keine ionisierende Strahlung."},
{q:"Die Fazekas-Skala (0-3) bewertet:",opts:["Knochendichte","Läsionen der weißen Substanz im MRT des Gehirns","Herzgröße","Leberfibrose"],ans:1,exp:"Fazekas 0–3 = Ausmaß der Weiße-Substanz-Läsionen (Leukoaraiose) im Gehirn-MRT."},
{q:"Hb 95 g/l bei einer Frau bedeutet:",opts:["Normal","Polyzythämie","Anämie","Dehydration"],ans:2,exp:"Normalwert bei Frauen in D/A: 120–160 g/l (DGKL-Referenzwerte). Darunter = Anämie."},
{q:"In deutschen Laboren werden Leberenzyme bezeichnet als:",opts:["ALT/AST/GGT","GPT/GOT/GGT","ALAT/ASAT/GGT","ALP/GOT/GPT"],ans:1,exp:"In D/A-Laboren: GPT = Glutamat-Pyruvat-Transaminase (= ALT), GOT = Glutamat-Oxalacetat-Transaminase (= AST), GGT. Diese Abkurzungen immer so transkribieren, wie diktiert."},
{q:"HbA1c ≥ 48 mmol/mol bei zwei Messungen bestätigt:",opts:["Normaler BZ","Prädiabetes","Diabetes mellitus","Hypoglykämie"],ans:2,exp:"HbA1c ≥ 48 mmol/mol bei 2 Messungen = Diabetes mellitus (DDG/ESC/DHL-Leitlinie)."},
{q:"FDG-Anreicherung im PET-CT zeigt:",opts:["Knochenfraktur","Metabolisch aktives Gewebe – Tumor oder aktive Infektion","Nur normale Hirnaktivität","Flüssigkeitsansammlung"],ans:1,exp:"FDG = Fluordesoxyglukose — wird von metabolisch aktiven Zellen aufgenommen. Hohe Aufnahme bei Tumoren und aktiver Entzündung."},
{q:"LDCT (Low-dose CT) wird primär eingesetzt für:",opts:["Notfall-Trauma-Diagnostik","Lungenkrebsscreening bei Hochrisikopatienten","Routine-Appendixdiagnostik","Kardiale Angiografie"],ans:1,exp:"LDCT = dosisreduziertes CT — für Lungenkrebsscreening (NELSON-Protokoll, AWMF/DGHO)."}
],
nl:[
{q:"WBC 15 x 10^9/L betekent:",opts:["Normaal","Leukopenie","Leukocytose - infectie/ontsteking","Trombocytose"],ans:2,exp:"Boven 11 x 10^9/L = leukocytose (NHG/NVKC-referentiewaarden)."},
{q:"TSH 0,1 mIU/L (te laag) wijst op:",opts:["Hypothyreoïdie","Hyperthyreoïdie","Normale schildklierfunctie","Diabetes"],ans:1,exp:"Laag TSH = hyperthyreoïdie."},
{q:"Welke methode gebruikt GEEN ioniserende straling?",opts:["Thoraxfoto","CT-scan","MRI","DEXA"],ans:2,exp:"MRI gebruikt magnetische velden en radiogolven - geen ioniserende straling."},
{q:"De Fazekas-schaal (0-3) beoordeelt:",opts:["Botdichtheid","Wittestofafwijkingen op MRI van de hersenen","Hartgrootte","Leverfibrose"],ans:1,exp:"Fazekas 0-3 = mate van wittestofafwijkingen (leukoaraiose) op hersen-MRI."},
{q:"Hemoglobine 6,9 mmol/L bij een vrouwelijke patiënt betekent:",opts:["Normaal","Polyglobulie","Anemie","Dehydratie"],ans:2,exp:"Normaalwaarde vrouwen in NL: 7,5–10,0 mmol/L (NVH/Hematologienederland.nl). 6,9 mmol/L ligt onder de ondergrens = anemie. In NL wordt Hb in mmol/L gerapporteerd, niet in g/dL."},
{q:"In Nederlandse laboratoria worden leverenzymen gerapporteerd als:",opts:["GOT/GPT/GGT","ALT/AST/GGT","ALAT/ASAT/GGT","ALP/GOT/GPT"],ans:2,exp:"In Nederlandse labs: ALAT (alanineaminotransferase = ALT), ASAT (aspartaataminotransferase = AST), GGT. Altijd de gebruikte afkorting transcriberen."},

{q:"HbA1c >= 48 mmol/mol bij twee metingen bevestigt:",opts:["Normale glucoseregulatie","Prediabetes","Diabetes mellitus","Hypoglykemie"],ans:2,exp:"HbA1c >=48 mmol/mol bij 2 metingen = diabetes mellitus (NHG-standaard Diabetes type 2)."},
{q:"FDG-stapeling op PET-CT wijst op:",opts:["Botfractuur","Metabolisch actief weefsel - tumor of actieve infectie","Alleen normale hersenactiviteit","Vochtcollectie"],ans:1,exp:"FDG = fluorodeoxyglucose - opgenomen door metabolisch actieve cellen. Hoge stapeling bij tumoren en actieve ontsteking."},
{q:"LDCT (low-dose CT) wordt primair ingezet voor:",opts:["Spoed-traumadiagnostiek","Longkankerschreening bij hoog-risicopatienten","Routine appendixdiagnostiek","Cardiale angiografie"],ans:1,exp:"LDCT = lage-dosis CT - voor longkankerschreening (NELSON-protocol, NHG/NVALT)."}
],
fr:[
{q:"Un taux de GB à 15 × 10⁹/L indique :",opts:["Normal","Leucopénie","Hyperleucocytose — infection/inflammation","Thrombocytose"],ans:2,exp:"Au-dessus de 11 × 10⁹/L = hyperleucocytose (valeurs de référence HAS)."},
{q:"Une TSH à 0,1 mIU/L (basse) indique :",opts:["Hypothyroïdie","Hyperthyroïdie","Fonction thyroïdienne normale","Diabète"],ans:1,exp:"TSH basse = hyperthyroïdie."},
{q:"Quel examen n'utilise AUCUNE radiation ionisante?",opts:["Radiographie thoracique","Scanner TDM","IRM","DEXA"],ans:2,exp:"L'IRM utilise des champs magnétiques et des ondes radio — pas de radiation ionisante."},
{q:"L'echelle de Fazekas (0-3) classe:",opts:["La densite osseuse","Les lesions de la substance blanche a l'IRM cerebrale","La taille cardiaque","La fibrose hepatique"],ans:1,exp:"Fazekas 0-3 grade la charge de lesions de la substance blanche (leucoaraiose) a l'IRM cerebrale."},
{q:"Une hémoglobine à 95 g/L chez une femme indique :",opts:["Normale","Polyglobulie","Anémie","Déshydratation"],ans:2,exp:"Hb normale chez la femme en France : 120–160 g/L. En dessous = anémie."},
{q:"Dans les laboratoires francais, les transaminases sont rapportees comme:",opts:["GOT/GPT/GGT","ALT/AST/GGT","ALAT/ASAT/GGT","ALP/GOT/GPT"],ans:2,exp:"En France: ALAT (= ALT) et ASAT (= AST). Le terme 'transaminases' est courant. GGT = gamma-GT. Toujours transcriref l'abreviation dictee."},
{q:"Le signe du tourbillon sur scanner dans un hematome indique:",opts:["Sang ancien organise","Saignement arteriel actif","Calcification","Air"],ans:1,exp:"Signe du tourbillon = sang tourbillonnant hyperdense = saignement arteriel actif dans un hematome - facteur predictif d'expansion."},
{q:"HbA1c ≥ 48 mmol/mol (≥ 6,5 %) à deux reprises confirme :",opts:["Contrôle glycémique normal","Prédiabète","Diabète mellitus","Hypoglycémie"],ans:2,exp:"HbA1c ≥48 mmol/mol à 2 occasions = diabète mellitus (critères HAS/OMS)."},
{q:"La fixation du FDG au TEP-TDM indique:",opts:["Une fracture osseuse","Un tissu metaboliquement actif - tumeur ou infection active","Uniquement l'activite cerebrale normale","Une collection liquidienne"],ans:1,exp:"FDG = fluorodeoxyglucose - capte par les cellules metaboliquement actives. Forte fixation dans les tumeurs et inflammations actives."},
{q:"Le scanner faible dose (LDCT) est utilisé principalement pour :",opts:["L'imagerie de traumatisme en urgence","Le dépistage du cancer du poumon chez les patients à haut risque","Le bilan d'appendicite de routine","L'angiographie cardiaque"],ans:1,exp:"LDCT = scanner faible dose — utilisé pour le dépistage du cancer du poumon (protocole NELSON, recommandations HAS/SPLF)."}
]
},
symptoms:{
en:[
{q:"'Dyspnoea' means:",opts:["Chest pain","Difficulty breathing","Difficulty swallowing","Irregular heartbeat"],ans:1,exp:"Dyspnoea = difficulty breathing / breathlessness."},
{q:"Orthopnoea is best described as:",opts:["Pain on breathing","Breathlessness when lying flat, relieved by sitting up","Coughing up blood","Respiratory rate below 12/min"],ans:1,exp:"Orthopnoea = dyspnoea in the recumbent position, relieved by sitting upright. Key sign of heart failure."},
{q:"'Swirl sign' on CT in a haematoma indicates:",opts:["Old organised clot","Active arterial bleeding","Pulmonary embolism","Calcification"],ans:1,exp:"Swirl sign = hyperdense swirling blood = active arterial bleeding - important in TBI."},
{q:"Micrographia is a classic feature of:",opts:["Stroke","Multiple sclerosis","Parkinson's disease","Cerebellar ataxia"],ans:2,exp:"Micrographia = progressively smaller handwriting - one of the cardinal Parkinson's features."},
{q:"The Parkinson's acronym TRAP stands for:",opts:["Tremor, rigidity, akinesia, postural instability","Tremor, rash, ataxia, pain","Tachycardia, rigidity, aphasia, paralysis","Temperature, RR, activity, pulse"],ans:0,exp:"TRAP = Tremor (resting, pill-rolling), Rigidity, Akinesia/bradykinesia, Postural instability."},
{q:"'Haemoptysis' means:",opts:["Blood in urine","Vomiting blood","Coughing up blood","Black tarry stools"],ans:2,exp:"Haemoptysis = coughing up blood from the respiratory tract. Distinguish from haematemesis (vomited blood)."},
{q:"A thunderclap headache must raise suspicion of:",opts:["Tension headache","Migraine","Subarachnoid haemorrhage (SAH)","Cluster headache"],ans:2,exp:"Thunderclap = sudden severe headache reaching max intensity within seconds = SAH until proven otherwise (red flag). CT head urgently."},
{q:"'Dysphagia' means difficulty:",opts:["Breathing","Speaking","Swallowing","Urinating"],ans:2,exp:"Dysphagia = difficulty swallowing. Odynophagia = painful swallowing. Progressive dysphagia = malignancy until proven otherwise."},
{q:"Melaena refers to:",opts:["Blood in urine","Coughing up blood","Black tarry stools from digested blood","Fresh red blood per rectum"],ans:2,exp:"Melaena = black tarry stools = digested blood = upper GI bleeding source."},
{q:"'PERLA' in a clinical note means:",opts:["Patient extremely restless, limited activity","Pupils equal and reactive to light and accommodation","Peripheral erythema, rash, limb affected","Pulmonary embolism risk level assessment"],ans:1,exp:"PERLA = Pupils Equal and Reactive to Light and Accommodation - documented on neurological examination."}
],
de:[
{q:"'Dyspnoe' bedeutet:",opts:["Brustschmerzen","Atemnot","Schluckstörung","Herzrhythmusstörung"],ans:1,exp:"Dyspnoe = Atemnot / erschwertes Atmen."},
{q:"Orthopnoe beschreibt:",opts:["Schmerzen beim Atmen","Atemnot im Liegen, Besserung beim Aufsetzen","Bluthusten","AF unter 12/min"],ans:1,exp:"Orthopnoe = Dyspnoe im Liegen, Besserung durch aufrechte Haltung. Wichtiges Herzinsuffizienz-Zeichen."},
{q:"Das Swirl Sign im CT-Hämatom weist auf ... hin:",opts:["Altes organisiertes Blut","Aktive arterielle Blutung","Lungenembolie","Verkalkung"],ans:1,exp:"Swirl Sign = aktive Blutung im Hämatom — prädiziert Hämatom-Expansion (wichtig beim SHT)."},
{q:"Mikrographie ist ein klassisches Zeichen von:",opts:["Schlaganfall","Multipler Sklerose","Morbus Parkinson","Zerebellären Ataxie"],ans:2,exp:"Mikrographie = kleiner werdende Handschrift — eines der kardinalen Parkinson-Zeichen."},
{q:"Das Parkinson-Akronym TRAP steht fur:",opts:["Tremor, Rigor, Akinese, Posturale Instabilität","Tremor, Rash, Ataxie, Schmerz","Tachykardie, Rigor, Aphasie, Lähmung","Temperatur, RR, Aktivität, Puls"],ans:0,exp:"TRAP = Tremor (Ruhe, Pillendreher), Rigor, Akinese/Bradykinese, Posturale Instabilität."},
{q:"'Hämoptyse' bedeutet:",opts:["Blut im Urin","Bluterbrechen","Bluthusten","Schwarzer Teerstuhl"],ans:2,exp:"Hämoptyse = Bluthusten aus den Atemwegen. Abgrenzen von Hämatemesis (Bluterbrechen)."},
{q:"Ein Vernichtungskopfschmerz muss Verdacht auf ... wecken:",opts:["Spannungskopfschmerz","Migräne","Subarachnoidalblutung (SAB)","Clusterkopfschmerz"],ans:2,exp:"Vernichtungskopfschmerz = plötzlich maximaler Kopfschmerz = SAB ausschließen (Red Flag). Sofort CT-Schädel."},
{q:"'Dysphagie' bedeutet Schwierigkeit beim:",opts:["Atmen","Sprechen","Schlucken","Wasserlassen"],ans:2,exp:"Dysphagie = Schluckstorung. Odynophagie = schmerzhaftes Schlucken. Progrediente Dysphagie = Malignom ausschliessen."},
{q:"Meläna bezeichnet:",opts:["Blut im Urin","Bluthusten","Schwarzer Teerstuhl aus verdautem Blut","Frisches rotes Blut ab ano"],ans:2,exp:"Meläna = Teerstuhl = verdautes Blut = obere GI-Blutungsquelle."},
{q:"'PERLA' in einer klinischen Notiz bedeutet:",opts:["Patient ernsthaft erkrankt, limitierte Aktivität","Pupillen isokor und prompt reagierend auf Licht und Akkommodation","Periphere Erythema, Rash, Limb Affected","Lungenembolie-Risikoabschätzung"],ans:1,exp:"PERLA = Pupils Equal and Reactive to Light and Accommodation = isokor, prompte Lichtreaktion und Konvergenzreaktion."}
],
nl:[
{q:"'Dyspneu' betekent:",opts:["Pijn op de borst","Kortademigheid","Slikstoornis","Onregelmatige hartslag"],ans:1,exp:"Dyspneu = kortademigheid / benauwdheid."},
{q:"Orthopneu beschrijft:",opts:["Pijn bij ademen","Kortademigheid in rugligging, verlicht door rechtop zitten","Bloed ophoesten","AF onder 12/min"],ans:1,exp:"Orthopneu = dyspneu in rugligging, verlicht in zittende houding. Belangrijk teken van hartfalen."},
{q:"Swirl sign op CT in een hematoom duidt op:",opts:["Oud georganiseerd stolsel","Actieve arteriele bloeding","Longembolie","Verkalking"],ans:1,exp:"Swirl sign = actieve arterielebloeding in hematoom - voorspelt hematoomexpansie (belangrijk bij schedelhersenletsel)."},
{q:"Micrografie is een klassiek kenmerk van:",opts:["Beroerte","Multiple sclerose","Ziekte van Parkinson","Cerebellaire ataxie"],ans:2,exp:"Micrografie = steeds kleiner wordend handschrift - een van de kardinale Parkinson-kenmerken."},
{q:"Het Parkinson-acroniem TRAP staat voor:",opts:["Tremor, Rigiditeit, Akinesie, Posturale instabiliteit","Tremor, Rash, Ataxie, Pijn","Tachycardie, Rigiditeit, Afasie, Paralyse","Temperatuur, RR, Activiteit, Pols"],ans:0,exp:"TRAP = Tremor (rust, pil-draaien), Rigiditeit, Akinesie/bradykinesie, Posturale instabiliteit."},
{q:"'Hemoptysis' betekent:",opts:["Bloed in urine","Bloed braken","Bloed ophoesten","Zwarte teerachtige ontlasting"],ans:2,exp:"Hemoptysis = bloed ophoesten vanuit de luchtwegen. Onderscheiden van haematemesis (bloed braken)."},
{q:"Donderslaghoofdpijn moet verdenking wekken op:",opts:["Spanningshoofdpijn","Migraine","Subarachnoïdale bloeding (SAB)","Clusterhoofdpijn"],ans:2,exp:"Donderslaghoofdpijn = plotseling maximale hoofdpijn = SAB uitsluiten (red flag). Direct CT-cerebrum."},
{q:"'Dysfagie' betekent moeite met:",opts:["Ademen","Spreken","Slikken","Urineren"],ans:2,exp:"Dysfagie = moeite met slikken. Odynofagie = pijn bij slikken. Progressieve dysfagie = maligniteit uitsluiten."},
{q:"Melaena verwijst naar:",opts:["Bloed in urine","Bloed ophoesten","Zwarte teerachtige ontlasting van verteerd bloed","Vers rood bloed per anum"],ans:2,exp:"Melaena = zwarte teerachtige ontlasting = verteerd bloed = bovenste maag-darmbloeding."},
{q:"'PERLA' in een klinische notitie betekent:",opts:["Patïent ernstig ziek, beperkte activiteit","Pupillen isocoor en prompte reactie op licht en accommodatie","Perifeer erytheem, huiduitslag, aangedaan lidmaat","Longembolie risicobeoordeling"],ans:1,exp:"PERLA = Pupils Equal and Reactive to Light and Accommodation = isocoor, prompte lichtreactie en convergentiereactie."}
],
fr:[
{q:"'Dyspnée' signifie :",opts:["Douleur thoracique","Difficulté à respirer","Difficulté à avaler","Battements irréguliers"],ans:1,exp:"Dyspnée = difficulté à respirer / essoufflement."},
{q:"L'orthopnée se définit comme :",opts:["Douleur à la respiration","Dyspnée en décubitus dorsal, soulagée par la position assise","Crachats de sang","FR inférieure à 12/min"],ans:1,exp:"Orthopnée = dyspnée en décubitus, soulagée en position assise. Signe important d'insuffisance cardiaque."},
{q:"Le signe du tourbillon sur scanner dans un hematome indique:",opts:["Sang ancien organise","Saignement arteriel actif","Embolie pulmonaire","Calcification"],ans:1,exp:"Signe du tourbillon = saignement arteriel actif dans un hematome - facteur predictif d'expansion (important dans le TCE)."},
{q:"La micrographie est un signe classique de:",opts:["L'AVC","La sclerose en plaques","La maladie de Parkinson","L'ataxie cerebelleuse"],ans:2,exp:"Micrographie = ecriture progressivement plus petite - l'un des signes cardinaux de Parkinson."},
{q:"L'acronyme TRAP (Parkinson) signifie :",opts:["Tremblement, Rigidité, Akinésie, Posture instable","Tremblement, Rash, Ataxie, Douleur","Tachycardie, Rigidité, Aphasie, Paralysie","Température, FR, Activité, Pouls"],ans:0,exp:"TRAP = Tremblement (repos, émiettement), Rigidité, Akinésie/bradykinésie, Posture instable."},
{q:"'Hemoptysie' signifie:",opts:["Sang dans les urines","Vomissements de sang","Crachats de sang","Selles noires"],ans:2,exp:"Hemoptysie = crachats de sang provenant des voies respiratoires. Distinguer de l'hematemese (vomissements de sang)."},
{q:"Une céphalée en coup de tonnerre doit faire suspecter :",opts:["Céphalée de tension","Migraine","Hémorragie sous-arachnoïdienne (HSA)","Algie vasculaire de la face"],ans:2,exp:"Céphalée en coup de tonnerre = début brutal, intensité maximale d'emblée = HSA jusqu'à preuve du contraire (signe d'alerte). TDM cérébral en urgence."},
{q:"'Dysphagie' signifie difficulté à :",opts:["Respirer","Parler","Avaler","Uriner"],ans:2,exp:"Dysphagie = trouble de la déglutition. Odynophagie = déglutition douloureuse. Dysphagie progressive = éliminer un néoplasme."},
{q:"Le méléna désigne :",opts:["Du sang dans les urines","Des crachats de sang","Des selles noires goudronneuses de sang digéré","Du sang rouge vif rectal"],ans:2,exp:"Méléna = selles noires goudronneuses = sang digéré = saignement digestif haut."},
{q:"'PERLA' dans une note clinique signifie :",opts:["Patient extrêmement restraint, activité limitée","Pupilles isocores et réactives à la lumière et à l'accommodation","Érythème périphérique, éruption, membre affecté","Évaluation du risque d'embolie pulmonaire"],ans:1,exp:"PERLA = Pupils Equal and Reactive to Light and Accommodation = pupilles isocores, réactives à la lumière et à l'accommodation."}
]
},
allergies:{
en:[
{q:"'NKDA' means:",opts:["No known drug allergies","New kidney disease assessment","Normal kidney drug analysis","Non-kinetic drug administration"],ans:0,exp:"NKDA = No Known Drug Allergies (NHS standard)."},
{q:"Which is a true IgE-mediated allergic reaction?",opts:["Dry cough from ACE inhibitor","GI upset from ibuprofen","Anaphylaxis after penicillin","Headache from caffeine"],ans:2,exp:"Anaphylaxis after penicillin = true IgE-mediated allergy. Dry cough from ACEi = pharmacological intolerance (bradykinin-mediated). IgE = immunoglobulin E — the antibody class responsible for immediate hypersensitivity reactions."},
{q:"The UK standard VKA warfarin causes angioedema via which mechanism?",opts:["IgE-mediated","Bradykinin accumulation (non-IgE)","T-cell reaction","Complement activation"],ans:1,exp:"ACE inhibitors (not warfarin) cause angioedema via bradykinin accumulation - a non-IgE, non-allergic mechanism."},
{q:"SJS (Stevens-Johnson Syndrome) is:",opts:["A mild skin rash","A severe mucocutaneous drug reaction with mucosal erosions","An antibiotic class","A type of urticaria"],ans:1,exp:"SJS = severe mucocutaneous reaction with mucosal erosions and skin blistering affecting less than 10% BSA (body surface area). When more than 30% BSA is affected, this is classified as TEN (Toxic Epidermal Necrolysis). Medical emergency."},
{q:"Which allergen cross-reacts with latex (latex-fruit syndrome)?",opts:["Penicillin","Banana, avocado, kiwi","Aspirin","Codeine"],ans:1,exp:"Latex cross-reacts with proteins in banana, avocado, and kiwi - latex-fruit syndrome (BSACI guideline)."},
{q:"DRESS syndrome typically appears after starting a culprit drug after:",opts:["Within 1 hour","Within 24 hours","2-8 weeks","6 months"],ans:2,exp:"DRESS has a delayed onset of 2-8 weeks - important to recognise in outpatient setting."},
{q:"In the NHS, adverse drug reactions should be reported via:",opts:["The BNF","The Yellow Card scheme (MHRA)","NICE directly","The hospital pharmacist only"],ans:1,exp:"Yellow Card scheme (MHRA) = national UK ADR reporting system for healthcare professionals and patients."},
{q:"When transcribing an allergy, you must always record:",opts:["Drug name only","Drug name, exact reaction type, severity, and whether confirmed or suspected","Only whether it was fatal","Only the patient's own description"],ans:1,exp:"NHS best practice: record drug name, exact reaction, severity, date if known, confirmed/suspected. Example: 'Penicillin - anaphylaxis 2019, confirmed by allergy clinic.'"},
{q:"Grade 4 allergic reaction (anaphylaxis) affects:",opts:["Skin only","Skin and GI tract","Multiple systems - airway, breathing, AND circulation","Joints only"],ans:2,exp:"Anaphylaxis = grade 4 = multi-system reaction affecting airway, breathing, and circulation simultaneously."},
{q:"'Pseudoallergy' to aspirin is caused by:",opts:["IgE antibodies to aspirin","Non-immune mast cell activation / COX-1 inhibition","T-cell hypersensitivity","Complement activation"],ans:1,exp:"Aspirin pseudoallergy = non-immune mast cell activation via COX-1 inhibition - not a true IgE allergy."}
],
de:[
{q:"NKDA bedeutet:",opts:["Keine bekannten Medikamentenallergien","Neue Nierenbeurteilung","Normales Assessment","Nicht-kinetische Medikamentengabe"],ans:0,exp:"NKDA = keine bekannten Medikamentenallergien (D/A-Dokumentationsstandard)."},
{q:"Echte IgE-vermittelte allergische Reaktion:",opts:["Reizhusten unter ACE-Hemmer","GI-Beschwerden durch Ibuprofen","Anaphylaxie nach Penicillin","Kopfschmerzen durch Koffein"],ans:2,exp:"Anaphylaxie nach Penicillin = echte IgE-vermittelte Allergie. Reizhusten unter ACE-Hemmer = pharmakologische Intoleranz (Bradykinin)."},
{q:"SJS (Stevens-Johnson-Syndrom) ist:",opts:["Ein milder Hautausschlag","Eine schwere mukokutane Arzneimittelreaktion mit Schleimhauterosionen","Eine Antibiotikaklasse","Eine Form von Urtikaria"],ans:1,exp:"SJS = schwere mukokutane Reaktion mit Schleimhauterosionen und Hautblasen (<10% KOF). Notfall."},
{q:"Das Allergen bei einer Latex-Frucht-Kreuzreaktion ist:",opts:["Penicillin","Banane, Avocado, Kiwi","Aspirin","Codein"],ans:1,exp:"Latex kreuzreagiert mit Proteinen in Banane, Avocado und Kiwi - Latex-Frucht-Syndrom (DGAKI-Leitlinie)."},
{q:"DRESS-Syndrom tritt typischerweise auf nach:",opts:["Innerhalb 1 Stunde","Innerhalb 24 Stunden","2-8 Wochen","6 Monaten"],ans:2,exp:"DRESS hat einen verzogerten Beginn von 2-8 Wochen nach Therapiebeginn."},
{q:"Unerwünschte Arzneimittelwirkungen (UAW) werden in Deutschland gemeldet an:",opts:["Die Rote Liste","Das BfArM","Die AWMF","Den Hersteller direkt"],ans:1,exp:"BfArM = Bundesinstitut für Arzneimittel und Medizinprodukte — zentrales UAW-Meldesystem in Deutschland. In A: AGES."},
{q:"Bei der Transkription einer Allergie muss immer dokumentiert werden:",opts:["Nur der Medikamentenname","Medikamentenname, genaue Reaktion, Schwere und ob bestätigt oder Verdacht","Nur ob sie letal war","Nur das Patientenwort"],ans:1,exp:"D/A-Dokumentationsstandard: Medikament, genaue Reaktion, Schwere, Datum wenn bekannt, bestätigt/Verdacht."},
{q:"Eine Grad-IV-Reaktion (Anaphylaxie) betrifft:",opts:["Nur die Haut","Haut und Magen-Darm-Trakt","Mehrere Systeme - Atemwege, Atmung UND Kreislauf","Nur Gelenke"],ans:2,exp:"Anaphylaxie = Grad IV = multisystemische Reaktion mit Beteiligung von Atemwegen, Atmung und Kreislauf (AWMF-Leitlinie)."},
{q:"Angioödempseudo bei ACE-Hemmern entsteht durch:",opts:["IgE-Antikörper","Bradykinin-Akkumulation (nicht-IgE)","T-Zell-Reaktion","Komplementaktivierung"],ans:1,exp:"ACE-Hemmer bedingen Angioödem über Bradykinin-Akkumulation — nicht-IgE-vermittelt, keine echte Allergie."},
{q:"'Pseudoallergie' auf Aspirin entsteht durch:",opts:["IgE-Antikörper gegen Aspirin","Nicht-immunologische Mastzellaktivierung / COX-1-Hemmung","T-Zell-Überempfindlichkeit","Komplementaktivierung"],ans:1,exp:"Aspirin-Pseudoallergie = nicht-immunologische Mastzellaktivierung über COX-1-Hemmung — keine echte IgE-Allergie."}
],
nl:[
{q:"NKDA betekent:",opts:["Geen bekende medicatie-allergieen","Nieuwe nierziektebeoordeling","Normale analyse","Niet-kinetische toediening"],ans:0,exp:"NKDA = geen bekende medicatie-allergieen (NHG/KNMG-documentatiestandaard)."},
{q:"Echte IgE-gemedieerde allergische reactie:",opts:["Droge hoest door ACE-remmer","Maagklachten door ibuprofen","Anafylaxie na penicilline","Hoofdpijn door cafeine"],ans:2,exp:"Anafylaxie na penicilline = echte IgE-gemedieerde allergie. Droge hoest bij ACEi = farmacologische intolerantie (bradykinine)."},
{q:"SJS (Stevens-Johnson-syndroom) is:",opts:["Een milde huiduitslag","Een ernstige mucocutane geneesmiddelreactie met erosies van slijmvliezen","Een antibiotikaklasse","Een vorm van urticaria"],ans:1,exp:"SJS = ernstige mucocutane reactie met slijmvlioserosies en huidblaren (<10% KOO). Spoedgeval."},
{q:"Het allergeen bij het latex-fruitsyndroom is:",opts:["Penicilline","Banaan, avocado, kiwi","Aspirine","Codeïne"],ans:1,exp:"Latex heeft kruisreactiviteit met eiwitten in banaan, avocado en kiwi - latex-fruitsyndroom (NVVAA-richtlijn)."},
{q:"DRESS-syndroom treedt typisch op na:",opts:["Binnen 1 uur","Binnen 24 uur","2-8 weken","6 maanden"],ans:2,exp:"DRESS heeft een vertraagde onset van 2-8 weken na aanvang van het geneesmiddel."},
{q:"Ongewenste bijwerkingen worden in Nederland gemeld bij:",opts:["De G-Standaard","Lareb (Netherlands Pharmacovigilance Centre)","De NHG","De fabrikant direct"],ans:1,exp:"Lareb = Nederlands bijwerkingencentrum - centraal meldpunt voor bijwerkingen in Nederland."},
{q:"Bij het transcriberen van een allergie moet altijd worden gedocumenteerd:",opts:["Alleen de medicijnnaam","Medicijnnaam, exacte reactie, ernst en of bevestigd of verdacht","Alleen of het fataal was","Alleen wat de patïent zei"],ans:1,exp:"NL documentatiestandaard: geneesmiddel, exacte reactie, ernst, datum indien bekend, bevestigd/verdacht."},
{q:"Een graad IV-reactie (anafylaxie) treft:",opts:["Alleen de huid","Huid en maag-darmkanaal","Meerdere systemen - luchtwegen, ademhaling EN circulatie","Alleen gewrichten"],ans:2,exp:"Anafylaxie = graad IV = multisysteemreactie met betrokkenheid van luchtwegen, ademhaling en circulatie."},
{q:"Angio-oedeem door ACE-remmers ontstaat via:",opts:["IgE-antilichamen","Bradykinine-accumulatie (niet-IgE)","T-celreactie","Complementactivatie"],ans:1,exp:"ACE-remmers veroorzaken angio-oedeem via bradykinine-accumulatie - niet-IgE-gemedieerd, geen echte allergie."},
{q:"'Pseudo-allergie' voor aspirine ontstaat door:",opts:["IgE-antilichamen tegen aspirine","Niet-immunologische mestcelactivatie / COX-1-remming","T-cel overgevoeligheid","Complementactivatie"],ans:1,exp:"Aspirine pseudo-allergie = niet-immunologische mestcelactivatie via COX-1-remming - geen echte IgE-allergie."}
],
fr:[
{q:"AUCDA signifie:",opts:["Aucune allergie connue aux medicaments","Nouvelle evaluation renale","Analyse normale","Administration non cinetique"],ans:0,exp:"AUCDA = aucune allergie connue aux medicaments (standard documentation HAS/France)."},
{q:"Vraie reaction mediee par IgE:",opts:["Toux seche sous IEC","Troubles GI sous ibuprofene","Anaphylaxie a la penicilline","Cephalee a la cafeine"],ans:2,exp:"Anaphylaxie a la penicilline = vraie allergie IgE-mediee. Toux sous IEC = intolerance pharmacologique (bradykinine)."},
{q:"Le SJS (syndrome de Stevens-Johnson) est:",opts:["Une eruption legere","Une reaction mucocutanee severe avec erosions muqueuses","Une classe d'antibiotiques","Une forme d'urticaire"],ans:1,exp:"SJS = reaction mucocutanee severe avec erosions muqueuses et decollement cutane (<10% SC). Urgence medicale."},
{q:"L'allergene incrimine dans le syndrome latex-fruit est:",opts:["La penicilline","La banane, l'avocat, le kiwi","L'aspirine","La codeine"],ans:1,exp:"Le latex presente une reactivite croisee avec les proteines de banane, avocat et kiwi - syndrome latex-fruit (SFAR)."},
{q:"Le DRESS apparait typiquement apres:",opts:["Dans l'heure","Dans les 24 heures","2 a 8 semaines","6 mois"],ans:2,exp:"Le DRESS a un delai d'apparition de 2 a 8 semaines - important pour la surveillance ambulatoire."},
{q:"En France, les effets indesirables medicamenteux graves doivent etre declares a:",opts:["La HAS","L'ANSM et au CRPV regional","L'EMA directement","Le fabricant uniquement"],ans:1,exp:"ANSM + CRPV regional = systeme national de pharmacovigilance en France. Declaration obligatoire pour les EIG."},
{q:"Lors de la transcription d'une allergie, il faut toujours consigner:",opts:["Uniquement le nom du medicament","La DCI, le type exact de reaction, la severite et si confirmee ou suspectee","Uniquement si elle a ete fatale","Uniquement les termes du patient"],ans:1,exp:"Standard HAS: DCI, reaction exacte, severite, date si connue, confirmee (test cutane, ISAC) ou suspectee."},
{q:"Une reaction de grade IV (anaphylaxie) affecte:",opts:["Uniquement la peau","Peau et tube digestif","Plusieurs systemes - voies aeriennes, respiration ET circulation","Uniquement les articulations"],ans:2,exp:"Anaphylaxie = grade IV = reaction multisystemique atteignant simultanement les voies aeriennes, la respiration et la circulation."},
{q:"L'angio-oedeme aux IEC est provoque par:",opts:["Des anticorps IgE","L'accumulation de bradykinine (non-IgE)","Une reaction T cellulaire","L'activation du complement"],ans:1,exp:"Les IEC causent un angio-oedeme par accumulation de bradykinine - non-IgE, non allergique."},
{q:"La 'pseudo-allergie' a l'aspirine est provoquee par:",opts:["Des IgE anti-aspirine","L'activation mastocytaire non immune via inhibition COX-1","Une hypersensibilite T cellulaire","L'activation du complement"],ans:1,exp:"Pseudo-allergie a l'aspirine = activation mastocytaire non immune via inhibition de COX-1 - pas une vraie allergie IgE."}
]
},
abbr:{
en:[
{q:"'PRN' means:",opts:["Before meals","As required","At night","Four times daily"],ans:1,exp:"PRN = pro re nata = as required (BNF standard)."},
{q:"'O/E' in a clinical note means:",opts:["On examination","Oral entry","Overnight evaluation","Other evidence"],ans:0,exp:"O/E = On Examination (NHS standard)."},
{q:"MDT stands for:",opts:["Medical drug testing","Multidisciplinary team","Managed dose treatment","Minimal dose therapy"],ans:1,exp:"MDT = Multidisciplinary Team."},
{q:"pDMS assesses:",opts:["Blood glucose","Peripheral circulation, motor function, and sensibility","Pupil response","Pulmonary diffusion"],ans:1,exp:"pDMS = Peripheral circulation (Durchblutung), Motor function, Sensibility - standard neurovascular check in orthopaedics and trauma."},
{q:"'TTO' in a discharge letter stands for:",opts:["To treat outpatient","To take out (discharge medications)","Transfer to other ward","Total therapy order"],ans:1,exp:"TTO = To Take Out = discharge medications prescribed for the patient to take home (NHS)."},
{q:"In UK labs, liver enzymes are abbreviated as:",opts:["GOT/GPT","ALT/AST/GGT","ALAT/ASAT","AP/GOT"],ans:1,exp:"NHS labs use ALT, AST, GGT (not GPT/GOT which are the German equivalents)."},
{q:"DOAC stands for:",opts:["Daily oral anticoagulant","Direct oral anticoagulant","Dual oral anticoagulant","Dose-optimised anticoagulant"],ans:1,exp:"DOAC = direct oral anticoagulant (rivaroxaban, apixaban, dabigatran, edoxaban)."},
{q:"NICE is responsible for:",opts:["Registering doctors","Issuing clinical guidelines and technology appraisals","Regulating medicines","Running NHS hospitals"],ans:1,exp:"NICE = National Institute for Health and Care Excellence - issues clinical guidelines, technology appraisals, and quality standards for the NHS."},
{q:"U&Es refers to:",opts:["Ultrasound and echocardiogram","Urea and electrolytes (renal function)","Urinalysis and electrophysiology","Upper and lower endoscopy"],ans:1,exp:"U&Es = urea and electrolytes - the standard renal function panel in NHS labs."},
{q:"ReSPECT document replaces which older form in many NHS trusts?",opts:["TTO","DNACPR","MDT","TTA"],ans:1,exp:"ReSPECT (Recommended Summary Plan for Emergency Care and Treatment) has replaced DNACPR forms in many NHS trusts."}
],
de:[
{q:"'b.B.' / PRN bedeutet:",opts:["Vor den Mahlzeiten","Nach Bedarf","Nachts","Viermal täglich"],ans:1,exp:"b.B. / PRN = nach Bedarf (D/A-Standard)."},
{q:"'Z.n.' in einem Arztbrief bedeutet:",opts:["Zustand nach (Status nach einer Erkrankung/OP)","Zeichen nach","Zielnorm","Zeitnah"],ans:0,exp:"Z.n. = Zustand nach — beschreibt einen früheren Zustand oder eine überstandene Erkrankung/Operation (D/A-Standard)."},
{q:"'MDT' steht für:",opts:["Medizinischer Drogentest","Multidisziplinäres Team","Dosierungstherapie","Minimale Therapie"],ans:1,exp:"MDT = Multidisziplinäres Team."},
{q:"'pDMS' bedeutet:",opts:["Blutzucker","Periphere Durchblutung, Motorik und Sensibilität","Pupillenreaktion","Pulmonale Diffusionskapazität"],ans:1,exp:"pDMS = periphere Durchblutung, Motorik und Sensibilität — Standard-Gefäß-/Nervenstatus in Orthopädie und Unfallchirurgie."},
{q:"Leberenzyme werden in deutschen Laboren bezeichnet als:",opts:["ALT/AST/GGT","GOT/GPT/GGT bzw. GPT/GOT/GGT","ALAT/ASAT/GGT","ALP/GOT/GPT"],ans:1,exp:"In D/A-Laboren: GPT = Glutamat-Pyruvat-Transaminase (= ALT), GOT = Glutamat-Oxalacetat-Transaminase (= AST), GGT. Diese Abkurzungen genau so transkribieren wie diktiert."},
{q:"NOAK steht für:",opts:["Niedrig-organische Arzneimittelkombination","Neue Orale Antikoagulanzien","Nicht-operative Akutkoagulation","Notfall-orale Antikoagulanzien"],ans:1,exp:"NOAK = Neue Orale Antikoagulanzien (= DOAC; z.B. Rivaroxaban, Apixaban, Dabigatran, Edoxaban)."},
{q:"Die AWMF steht für:",opts:["Ärztliche Weiterbildung im Medizinischen Fach","Arbeitsgemeinschaft der Wissenschaftlichen Medizinischen Fachgesellschaften","Allgemeine Weiterbildung Medizinischer Fachkräfte","Amt für Wohlfahrt und Medizinische Fürsorge"],ans:1,exp:"AWMF = Arbeitsgemeinschaft der Wissenschaftlichen Medizinischen Fachgesellschaften — gibt medizinische Leitlinien heraus (D)."},
{q:"'V.a.' in einem Befund bedeutet:",opts:["Vor allem","Verdacht auf","Vollständig ausgeprüft","Vorderes Feld"],ans:1,exp:"V.a. = Verdacht auf — kennzeichnet eine Verdachtsdiagnose, die noch nicht gesichert ist."},
{q:"Der Arztbrief (Epikrise) enthalt standardmassig:",opts:["Nur Diagnose und Medikation","Aufnahme-/Entlassdiagnose, Anamnese, Befunde, Therapie, weiteres Procedere","Nur Laborbefunde","Nur OP-Bericht"],ans:1,exp:"Der Arztbrief (Entlassungsbrief) enthält: Diagnosen, Anamnese, Befunde, Therapie, Verlauf und weiteres Procedere (KBV-Standard)."},
{q:"BfArM steht für:",opts:["Bundesinstitut für Arzneimittel und Medizinprodukte","Bundesfachamt für Ärztliche Rundfunkmedizin","Berufsverband für Ärzte und Medizinische Fachberufe","Bundesamt für Rehabilitation und Medizin"],ans:0,exp:"BfArM = Bundesinstitut für Arzneimittel und Medizinprodukte — zuständig für Arzneimittelsicherheit und UAW-Meldungen in Deutschland."}
],
nl:[
{q:"'z.n.' / PRN betekent:",opts:["Voor de maaltijd","Zo nodig","'s Nachts","Viermaal daags"],ans:1,exp:"z.n. / PRN = zo nodig (NHG/G-Standaard)."},
{q:"'St.n.' in een ontslagbrief betekent:",opts:["Status na (voorgeschiedenis van een aandoening/ingreep)","Standaard normaal","Stabiele toestand normaal","Staat naar"],ans:0,exp:"St.n. = status na - beschrijft een doorgemaakte aandoening of ingreep in de voorgeschiedenis (NL-standaard)."},
{q:"'MDT' staat voor:",opts:["Medicatiedosistest","Multidisciplinair team","Gemanagede dosistherapie","Minimale dosistherapie"],ans:1,exp:"MDT = multidisciplinair team."},
{q:"'pDMS' staat voor:",opts:["Bloedglucose","Perifere Doorbloeding, Motoriek en Sensibiliteit","Pupilreactie","Pulmonale diffusiecapaciteit"],ans:1,exp:"pDMS = perifere doorbloeding, motoriek en sensibiliteit - standaard neurovasculaire controle in orthopedisch en traumachirurgisch beleid."},
{q:"Leverenzymen worden in Nederlandse labs gerapporteerd als:",opts:["ALT/AST/GGT","GOT/GPT/GGT","ALAT/ASAT/GGT","ALP/GOT/GPT"],ans:2,exp:"In NL labs: ALAT (= ALT), ASAT (= AST), GGT. Altijd de gebruikte afkorting transcriberen."},
